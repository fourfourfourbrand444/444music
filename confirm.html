<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation Required — 444Music Distribution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="confirm.css">
</head>
<body>

<div class="overlay">

  <!-- Ambient background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- Header -->
    <div class="modal-header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
        <span class="brand-name">444Music</span>
      </div>
      <button class="close-btn" aria-label="Close dialog">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Title block -->
    <div class="title-block">
      <div class="shield-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div>
        <h2 id="modal-title">Confirmation Required</h2>
        <p class="sub-text">Read and confirm all terms below before distributing your release.</p>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Progress indicator -->
    <div class="progress-row">
      <span class="progress-label">Agreement Progress</span>
      <span class="progress-count" id="progressCount">0 of 3</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <!-- Terms -->
    <div class="terms-list">

      <label class="terms-box" tabindex="0">
        <input type="checkbox" class="term-checkbox" hidden>
        <div class="custom-check" aria-hidden="true">
          <svg class="check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="term-content">
          <div class="term-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M9 9h6M9 13h6M9 17h4"/>
            </svg>
          </div>
          <div class="term-text">
            <strong>Copyright Ownership</strong>
            <span>I own or have legally licensed all copyrights to the sound recordings, compositions and artwork embodied in this release and agree to all terms in the distribution agreement.</span>
          </div>
        </div>
      </label>

      <label class="terms-box" tabindex="0">
        <input type="checkbox" class="term-checkbox" hidden>
        <div class="custom-check" aria-hidden="true">
          <svg class="check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="term-content">
          <div class="term-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div class="term-text">
            <strong>Track Accuracy</strong>
            <span>I confirm that I have truthfully indicated the Track Origin and Track Properties for each track to ensure full compliance with DSP requirements.</span>
          </div>
        </div>
      </label>

      <label class="terms-box" tabindex="0">
        <input type="checkbox" class="term-checkbox" hidden>
        <div class="custom-check" aria-hidden="true">
          <svg class="check-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="term-content">
          <div class="term-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <div class="term-text">
            <strong>Streaming Integrity</strong>
            <span>I acknowledge that artificial streaming and misleading promotion violates platform policies and may result in content removal, withheld royalties, or account penalties.</span>
          </div>
        </div>
      </label>

    </div>

    <!-- Notice -->
    <div class="notice">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>This agreement is legally binding once confirmed. Review all terms carefully.</span>
    </div>

    <!-- Buttons -->
    <div class="button-group">
      <button class="cancel-btn" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Cancel
      </button>
      <button class="confirm-btn" id="confirmBtn" disabled type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Confirm &amp; Distribute
      </button>
    </div>

  </div>
</div>

<script>
  const checkboxes = document.querySelectorAll(".term-checkbox");
  const confirmBtn = document.getElementById("confirmBtn");
  const progressFill = document.getElementById("progressFill");
  const progressCount = document.getElementById("progressCount");
  const termBoxes = document.querySelectorAll(".terms-box");

  function updateProgress() {
    const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
    const total = checkboxes.length;
    const pct = (checked / total) * 100;

    progressFill.style.width = pct + "%";
    progressCount.textContent = checked + " of " + total;

    confirmBtn.disabled = checked < total;
    if (checked === total) {
      confirmBtn.classList.add("ready");
    } else {
      confirmBtn.classList.remove("ready");
    }
  }

  // Click/keyboard on label
  termBoxes.forEach((box, i) => {
    const cb = checkboxes[i];
    const check = box.querySelector(".custom-check");

    cb.addEventListener("change", () => {
      if (cb.checked) {
        box.classList.add("checked");
      } else {
        box.classList.remove("checked");
      }
      updateProgress();
    });

    // Keyboard support
    box.addEventListener("keydown", (e) => {
      if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event("change"));
      }
    });
  });

  confirmBtn.addEventListener("click", () => {
    if (!confirmBtn.disabled) {
      confirmBtn.innerHTML = `
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Submitting...`;
      confirmBtn.disabled = true;
      setTimeout(() => {
        window.location.href = "after-submission.html";
      }, 1200);
    }
  });

  document.querySelector(".close-btn").addEventListener("click", () => {
    document.querySelector(".modal").classList.add("closing");
    setTimeout(() => window.location.href = "javascript:history.back()", 300);
  });

  document.querySelector(".cancel-btn").addEventListener("click", () => {
    document.querySelector(".modal").classList.add("closing");
    setTimeout(() => window.location.href = "javascript:history.back()", 300);
  });
</script>
</body>
</html>
