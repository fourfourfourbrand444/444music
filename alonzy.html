<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>444Music Distribution</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="background-glow"></div>

<header class="navbar">
    <div class="logo">
        <div class="logo-circle"></div>
        <span>444Music</span>
    </div>

    <nav class="desktop-nav">
        <a href="#">Home</a>
        <a href="#">Tools</a>
        <a href="#">Pricing</a>
        <a href="#">Analytics</a>
        <a href="#">Support</a>
    </nav>

    <div class="nav-icons">
        <i class="fas fa-search"></i>
        <i class="fas fa-bars" id="menuBtn"></i>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-container">

        <h1>
            Cultural + <br>
            Industry Builder
        </h1>

        <p>
            444Music Distribution is powering independent artists
            with global streaming access and industry-grade tools.
        </p>

        <div class="hero-buttons">
            <a href="login.html" class="btn-primary">
                Login
                <span class="circle white">→</span>
            </a>

            <a href="register.html" class="btn-outline">
                Create Account
                <span class="circle purple">→</span>
            </a>
        </div>

        <div class="hero-list">
            <p><i class="fas fa-check"></i> Start Releasing Music</p>
            <p><i class="fas fa-check"></i> Partner With 444Music</p>
        </div>

    </div>
</section>

<script>
// Button press animation
document.querySelectorAll(".btn-primary, .btn-outline").forEach(btn=>{
    btn.addEventListener("click",function(){
        this.classList.add("press");
        setTimeout(()=>this.classList.remove("press"),150);
    });
});
</script>

</body>
</html>
