<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>444Music — Duplicate User Cleanup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #999;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .status-pill {
    display: inline-block;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    color: #ccc;
    margin-bottom: 20px;
  }
  .btn {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent;
    color: #fff;
    border: 1px solid #444;
  }
  .btn-danger {
    background: #d32f2f;
    color: #fff;
  }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .group {
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .group-header {
    background: #161616;
    padding: 12px 16px;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .group-header .count {
    background: #d32f2f;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 10px;
  }
  .doc-row {
    padding: 12px 16px;
    border-top: 1px solid #222;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .doc-row:hover {
    background: #131313;
  }
  .doc-row input[type="checkbox"] {
    margin-top: 4px;
    width: 18px;
    height: 18px;
    accent-color: #d32f2f;
  }
  .doc-info {
    flex: 1;
    font-size: 13px;
    color: #ccc;
    line-height: 1.5;
  }
  .doc-info .name {
    color: #fff;
    font-weight: 600;
    font-size: 14px;
  }
  .doc-info .uid {
    color: #666;
    font-family: monospace;
    font-size: 11px;
    word-break: break-all;
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    margin-right: 6px;
    margin-top: 4px;
  }
  .tag-newest {
    background: #1b5e20;
    color: #a5d6a7;
  }
  .tag-oldest {
    background: #3a2a00;
    color: #ffcc80;
  }
  .tag-warning {
    background: #4a0e0e;
    color: #ff8a80;
    font-weight: 700;
  }
  .empty-state {
    color: #888;
    text-align: center;
    padding: 60px 20px;
    font-size: 14px;
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  #selectedCount {
    font-size: 13px;
    color: #ccc;
    margin-bottom: 16px;
  }
  .confirm-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .confirm-box {
    background: #161616;
    border: 1px solid #333;
    border-radius: 14px;
    padding: 24px;
    max-width: 400px;
    width: 100%;
  }
  .confirm-box h3 {
    margin-bottom: 10px;
    font-size: 17px;
  }
  .confirm-box p {
    color: #ccc;
    font-size: 14px;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .confirm-box .btn-row {
    margin-bottom: 0;
  }
</style>
</head>
<body>

<h1>Duplicate User Cleanup</h1>
<div class="subtitle">usersubmissionsportal · users collection</div>
<div class="status-pill" id="statusPill">Loading users…</div>

<div class="btn-row">
  <button class="btn" id="scanBtn">Scan for Duplicates</button>
  <button class="btn btn-secondary" id="expandAllBtn" style="display:none;">Select All Duplicates (keep newest)</button>
</div>

<div id="selectedCount" style="display:none;"></div>
<div class="btn-row" id="deleteRow" style="display:none;">
  <button class="btn btn-danger" id="deleteBtn" disabled>Delete Selected</button>
  <button class="btn btn-secondary" id="clearSelectionBtn">Clear Selection</button>
</div>

<div id="results">
  <div class="loading">Click "Scan for Duplicates" to begin.</div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Confirm deletion</h3>
    <p id="confirmText"></p>
    <div class="btn-row">
      <button class="btn btn-danger" id="confirmDeleteBtn">Yes, Delete</button>
      <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
  authDomain: "usersubmissionsportal.firebaseapp.com",
  projectId: "usersubmissionsportal",
  storageBucket: "usersubmissionsportal.firebasestorage.app",
  messagingSenderId: "734783502459",
  appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const statusPill = document.getElementById('statusPill');
const scanBtn = document.getElementById('scanBtn');
const expandAllBtn = document.getElementById('expandAllBtn');
const resultsEl = document.getElementById('results');
const deleteRow = document.getElementById('deleteRow');
const deleteBtn = document.getElementById('deleteBtn');
const clearSelectionBtn = document.getElementById('clearSelectionBtn');
const selectedCountEl = document.getElementById('selectedCount');
const confirmOverlay = document.getElementById('confirmOverlay');
const confirmText = document.getElementById('confirmText');
const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');

let duplicateGroups = []; // [{email, docs: [{id, data, hasMeaningfulData}]}]
let selectedIds = new Set();
let docIndex = {}; // id -> {data, hasMeaningfulData, email}

function fmtDate(createdAt) {
  if (!createdAt) return 'no date';
  try {
    if (createdAt.toDate) return createdAt.toDate().toLocaleString();
    return new Date(createdAt).toLocaleString();
  } catch (e) {
    return 'no date';
  }
}

async function scanForDuplicates() {
  statusPill.textContent = 'Scanning…';
  scanBtn.disabled = true;
  resultsEl.innerHTML = '<div class="loading">Fetching all users…</div>';

  const snap = await getDocs(collection(db, 'users'));
  const byEmail = {};

  snap.forEach(d => {
    const data = d.data();
    const email = (data.email || '').toLowerCase().trim();
    if (!email) return;
    if (!byEmail[email]) byEmail[email] = [];
    byEmail[email].push({ id: d.id, data });
  });

  duplicateGroups = Object.entries(byEmail)
    .filter(([email, docs]) => docs.length > 1)
    .map(([email, docs]) => {
      docs.forEach(d => {
        const earnings = Number(d.data.earnings) || 0;
        const hasSubscription = d.data.subscription && d.data.subscription !== 'free';
        const hasSubmissions = Array.isArray(d.data.submissions) && d.data.submissions.length > 0;
        d.hasMeaningfulData = earnings > 0 || hasSubscription || hasSubmissions;
      });
      docs.sort((a, b) => {
        const aTime = a.data.createdAt && a.data.createdAt.toMillis ? a.data.createdAt.toMillis() : 0;
        const bTime = b.data.createdAt && b.data.createdAt.toMillis ? b.data.createdAt.toMillis() : 0;
        return bTime - aTime; // newest first
      });
      return { email, docs };
    });

  docIndex = {};
  duplicateGroups.forEach(group => {
    group.docs.forEach(d => {
      docIndex[d.id] = { data: d.data, hasMeaningfulData: d.hasMeaningfulData, email: group.email };
    });
  });

  statusPill.textContent = `Scanned ${snap.size} total users · ${duplicateGroups.length} duplicate emails found`;
  scanBtn.disabled = false;
  renderResults();
}

function renderResults() {
  selectedIds.clear();
  updateSelectionUI();

  if (duplicateGroups.length === 0) {
    resultsEl.innerHTML = '<div class="empty-state">No duplicate emails found. Everything is clean.</div>';
    expandAllBtn.style.display = 'none';
    deleteRow.style.display = 'none';
    return;
  }

  expandAllBtn.style.display = 'inline-block';
  deleteRow.style.display = 'flex';

  resultsEl.innerHTML = '';
  duplicateGroups.forEach(group => {
    const groupEl = document.createElement('div');
    groupEl.className = 'group';

    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `<span>${group.email}</span><span class="count">${group.docs.length} docs</span>`;
    groupEl.appendChild(header);

    group.docs.forEach((docItem, idx) => {
      const row = document.createElement('div');
      row.className = 'doc-row';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.dataset.id = docItem.id;
      checkbox.addEventListener('change', () => {
        if (checkbox.checked) selectedIds.add(docItem.id);
        else selectedIds.delete(docItem.id);
        updateSelectionUI();
      });

      const info = document.createElement('div');
      info.className = 'doc-info';
      const name = docItem.data.displayName || docItem.data.name || '(no name)';
      let tag;
      if (docItem.hasMeaningfulData) {
        tag = '<span class="tag tag-warning">⚠ Has earnings/subscription/submissions — review before deleting</span>';
      } else if (idx === 0) {
        tag = '<span class="tag tag-newest">Newest, empty — likely keep</span>';
      } else {
        tag = '<span class="tag tag-oldest">Older, empty — likely safe to delete</span>';
      }
      info.innerHTML = `
        <div class="name">${name}</div>
        <div>Created: ${fmtDate(docItem.data.createdAt)}</div>
        <div>Subscription: ${docItem.data.subscription || 'n/a'} · Earnings: ${docItem.data.earnings ?? 'n/a'}</div>
        <div class="uid">doc id: ${docItem.id}</div>
        ${tag}
      `;

      row.appendChild(checkbox);
      row.appendChild(info);
      groupEl.appendChild(row);
    });

    resultsEl.appendChild(groupEl);
  });
}

function updateSelectionUI() {
  selectedCountEl.style.display = duplicateGroups.length ? 'block' : 'none';
  selectedCountEl.textContent = `${selectedIds.size} document(s) selected for deletion`;
  deleteBtn.disabled = selectedIds.size === 0;
}

scanBtn.addEventListener('click', scanForDuplicates);

expandAllBtn.addEventListener('click', () => {
  selectedIds.clear();
  duplicateGroups.forEach(group => {
    // Only auto-select older docs that have NO real data. Never auto-select
    // a doc with earnings/subscription/submissions, even if it's older.
    group.docs.slice(1).forEach(d => {
      if (!d.hasMeaningfulData) selectedIds.add(d.id);
    });
  });
  document.querySelectorAll('.doc-row input[type="checkbox"]').forEach(cb => {
    cb.checked = selectedIds.has(cb.dataset.id);
  });
  updateSelectionUI();
});

clearSelectionBtn.addEventListener('click', () => {
  selectedIds.clear();
  document.querySelectorAll('.doc-row input[type="checkbox"]').forEach(cb => cb.checked = false);
  updateSelectionUI();
});

deleteBtn.addEventListener('click', () => {
  if (selectedIds.size === 0) return;

  const protectedSelected = Array.from(selectedIds).filter(id => docIndex[id] && docIndex[id].hasMeaningfulData);

  if (protectedSelected.length > 0) {
    const emails = protectedSelected.map(id => docIndex[id].email).join(', ');
    confirmText.textContent = `⚠ WARNING: ${protectedSelected.length} of your selected document(s) have real earnings, a paid subscription, or submissions (${emails}). Deleting these will permanently erase that data. Only continue if you've manually verified this is the wrong/duplicate account. Delete ${selectedIds.size} document(s) anyway?`;
  } else {
    confirmText.textContent = `This will permanently delete ${selectedIds.size} user document(s) from Firestore. This cannot be undone. Continue?`;
  }

  confirmOverlay.style.display = 'flex';
});

cancelDeleteBtn.addEventListener('click', () => {
  confirmOverlay.style.display = 'none';
});

confirmDeleteBtn.addEventListener('click', async () => {
  confirmOverlay.style.display = 'none';
  deleteBtn.disabled = true;
  deleteBtn.textContent = 'Deleting…';

  const ids = Array.from(selectedIds);
  let deleted = 0;
  for (const id of ids) {
    try {
      await deleteDoc(doc(db, 'users', id));
      deleted++;
    } catch (e) {
      console.error('Failed to delete', id, e);
    }
  }

  deleteBtn.textContent = 'Delete Selected';
  statusPill.textContent = `Deleted ${deleted} of ${ids.length} selected documents. Re-scan to refresh.`;
  await scanForDuplicates();
});
</script>

</body>
</html>
