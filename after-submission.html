<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saving Release • 444Music</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --black:      #000000;
  --black-1:    #080808;
  --black-2:    #0d0d0d;
  --black-3:    #111111;
  --black-4:    #161616;
  --white:      #ffffff;
  --white-90:   rgba(255,255,255,0.90);
  --white-70:   rgba(255,255,255,0.70);
  --white-40:   rgba(255,255,255,0.40);
  --white-20:   rgba(255,255,255,0.20);
  --white-10:   rgba(255,255,255,0.10);
  --white-06:   rgba(255,255,255,0.06);
  --grey:       #888888;
  --grey-dark:  #444444;
  --green:      #22c55e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  padding: 40px 20px;
  color: var(--white);
}

.card {
  width: 100%;
  max-width: 400px;
  background: var(--black-2);
  border-radius: 20px;
  border: 1px solid var(--white-10);
  padding: 40px 32px;
  text-align: center;
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  margin-bottom: 36px;
}

.brand-icon {
  width: 32px;
  height: 32px;
  background: var(--white);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--black);
}
.brand-icon svg { width: 17px; height: 17px; }

.brand-name {
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 800;
  color: var(--white-90);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* Ring */
.upload-ring {
  position: relative;
  width: 80px;
  height: 80px;
  margin: 0 auto 28px;
}

.upload-ring svg.ring-svg {
  width: 80px;
  height: 80px;
  transform: rotate(-90deg);
}

.ring-bg {
  fill: none;
  stroke: var(--black-4);
  stroke-width: 3;
}

.ring-fill {
  fill: none;
  stroke: var(--white);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 220;
  stroke-dashoffset: 220;
  animation: fillRing 3.5s ease forwards;
}

@keyframes fillRing {
  0%   { stroke-dashoffset: 220; }
  100% { stroke-dashoffset: 0; }
}

.ring-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--white-70);
  display: flex; align-items: center; justify-content: center;
}
.ring-icon svg { width: 22px; height: 22px; }

/* Headings */
.title {
  font-family: 'Outfit', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}

.subtitle {
  font-size: 13px;
  color: var(--grey);
  margin-bottom: 32px;
  font-weight: 500;
}

/* Steps */
.steps {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.step {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid transparent;
  background: var(--black-3);
  transition: all 0.4s ease;
  text-align: left;
}

.step.active {
  background: var(--black-4);
  border-color: var(--white-20);
}

.step.done {
  background: rgba(34,197,94,0.06);
  border-color: rgba(34,197,94,0.25);
}

.step-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--black-4);
  border: 1px solid var(--white-10);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--grey-dark);
  transition: all 0.4s ease;
}
.step-dot svg { width: 14px; height: 14px; }

.step.active .step-dot {
  background: var(--white);
  border-color: var(--white);
  color: var(--black);
}

.step.done .step-dot {
  background: var(--green);
  border-color: var(--green);
  color: var(--black);
}

.step-pulse {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--white);
  animation: pulse 1.2s ease infinite;
  display: none;
  flex-shrink: 0;
}

.step.active .step-pulse {
  display: block;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.6); }
}

.step-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--grey-dark);
  flex: 1;
  transition: color 0.4s ease;
}

.step.active .step-label { color: var(--white-90); }
.step.done  .step-label  { color: var(--green); }

/* Progress bar */
.progress-bar {
  width: 100%;
  height: 2px;
  background: var(--black-4);
  border-radius: 2px;
  margin-top: 28px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--white);
  border-radius: 2px;
  width: 0%;
  animation: progressFill 3.5s ease forwards;
}

@keyframes progressFill {
  0%   { width: 0%; }
  100% { width: 100%; }
}

</style>
</head>
<body>

<div class="card">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    </div>
    <span class="brand-name">444Music</span>
  </div>

  <!-- Ring -->
  <div class="upload-ring">
    <svg class="ring-svg" viewBox="0 0 80 80">
      <circle class="ring-bg"   cx="40" cy="40" r="35"/>
      <circle class="ring-fill" cx="40" cy="40" r="35"/>
    </svg>
    <div class="ring-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
        <path d="M12 12v9"/>
        <path d="m16 16-4-4-4 4"/>
      </svg>
    </div>
  </div>

  <p class="title">Saving Your Release</p>
  <p class="subtitle">Please wait while we process your submission</p>

  <!-- Steps -->
  <div class="steps">

    <div class="step active" id="s1">
      <div class="step-dot" id="s1-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
          <path d="M12 12v9"/><path d="m16 16-4-4-4 4"/>
        </svg>
      </div>
      <span class="step-label">Uploading release files</span>
      <div class="step-pulse"></div>
    </div>

    <div class="step" id="s2">
      <div class="step-dot" id="s2-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="step-label">Checking metadata</span>
      <div class="step-pulse"></div>
    </div>

    <div class="step" id="s3">
      <div class="step-dot" id="s3-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <span class="step-label">Preparing distribution</span>
      <div class="step-pulse"></div>
    </div>

    <div class="step" id="s4">
      <div class="step-dot" id="s4-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
          <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
          <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
          <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
        </svg>
      </div>
      <span class="step-label">Finalizing submission</span>
      <div class="step-pulse"></div>
    </div>

  </div>

  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

</div>

<script type="module">

import { initializeApp }        from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
  authDomain:        "usersubmissionsportal.firebaseapp.com",
  projectId:         "usersubmissionsportal",
  storageBucket:     "usersubmissionsportal.firebasestorage.app",
  messagingSenderId: "734783502459",
  appId:             "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const allSteps = ['s1','s2','s3','s4'];
const checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

function setStep(id) {
  allSteps.forEach(sid => {
    const el = document.getElementById(sid);
    const idx = allSteps.indexOf(sid);
    const active = allSteps.indexOf(id);
    if (idx < active) {
      el.classList.remove('active');
      el.classList.add('done');
      document.getElementById(sid + '-dot').innerHTML = checkIcon;
    } else if (sid === id) {
      el.classList.add('active');
      el.classList.remove('done');
    }
  });
}

const submission = {
  title: "Test Release"
};

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  try {

    setStep("s1");
    await new Promise(r => setTimeout(r, 1000));

    setStep("s2");
    await new Promise(r => setTimeout(r, 1000));

    setStep("s3");
    await new Promise(r => setTimeout(r, 1000));

    await addDoc(collection(db, "sharp"), {
      ...submission,
      userId:    user.uid,
      status:    "Pending",
      createdAt: Date.now()
    });

    setStep("s4");

    setTimeout(() => {
      window.location.href = "a.html";
    }, 1200);

  } catch (err) {
    console.error(err);
    alert("Submission failed. Please try again.");
  }

});

</script>
</body>
</html>
