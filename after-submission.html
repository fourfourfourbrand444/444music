<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Processing Release • 444Music</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Inter", sans-serif;
}

body{

height:100vh;

background:
linear-gradient(135deg,#2a0845,#6441a5);

display:flex;
justify-content:center;
align-items:center;

color:white;

}

/* Glass Container */

.glass{

width:92%;
max-width:420px;

padding:40px 30px;

border-radius:25px;

background:rgba(255,255,255,0.08);

backdrop-filter: blur(25px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:0 10px 50px rgba(0,0,0,0.6);

text-align:center;

}

/* Icon */

.top-icon{

font-size:50px;

color:#a66cff;

margin-bottom:20px;

}

/* Title */

h1{

font-size:26px;

margin-bottom:10px;

}

/* Description */

p{

color:#d1cfe5;

font-size:14px;

line-height:1.5;

margin-bottom:30px;

}

/* Loading spinner */

.spinner{

width:60px;
height:60px;

margin:auto;

border-radius:50%;

border:4px solid rgba(255,255,255,0.2);

border-top:4px solid #a66cff;

animation:spin 1s linear infinite;

margin-bottom:25px;

}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

/* Steps */

.steps{

text-align:left;

}

.step{

display:flex;

align-items:center;

gap:12px;

padding:14px;

border-radius:12px;

margin-bottom:12px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

font-size:14px;

}

.step i{

color:#a66cff;

}

</style>

</head>

<body>

<div class="glass">

<div class="top-icon">
<i class="fa-solid fa-cloud-arrow-up"></i>
</div>

<h1>Saving Your Release</h1>

<p>
Please wait while we securely process your submission
and prepare it for distribution.
</p>

<div class="spinner"></div>

<div class="steps">

<div class="step">
<i class="fa-solid fa-upload"></i>
Uploading release files
</div>

<div class="step">
<i class="fa-solid fa-check-circle"></i>
Checking metadata
</div>

<div class="step">
<i class="fa-solid fa-globe"></i>
Preparing distribution
</div>

<div class="step">
<i class="fa-solid fa-rocket"></i>
Finalizing submission
</div>

</div>

</div>

</body>
</html>
