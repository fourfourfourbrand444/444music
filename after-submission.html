<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saving Release • 444Music</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

height:100vh;

background:linear-gradient(135deg,#3a0d5d,#5f2c82);

display:flex;
align-items:center;
justify-content:center;

color:white;

}

/* Glass container */

.glass{

width:92%;
max-width:420px;

padding:40px 30px;

border-radius:25px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:0 20px 60px rgba(0,0,0,0.5);

text-align:center;

}

/* Icon */

.top-icon{

font-size:50px;

color:#c084ff;

margin-bottom:20px;

}

/* Text */

h1{

font-size:26px;

margin-bottom:10px;

}

p{

color:#ddd;

font-size:14px;

margin-bottom:30px;

}

/* Spinner */

.spinner{

width:60px;
height:60px;

border-radius:50%;

border:4px solid rgba(255,255,255,0.2);

border-top:4px solid #c084ff;

animation:spin 1s linear infinite;

margin:auto;
margin-bottom:25px;

}

@keyframes spin{

to{transform:rotate(360deg);}

}

/* Steps */

.step{

display:flex;
align-items:center;

gap:12px;

padding:16px;

border-radius:14px;

margin-bottom:14px;

background:rgba(255,255,255,0.12);   /* stronger glass */

border:1px solid rgba(255,255,255,0.25);

font-size:15px;

color:#ffffff;

opacity:0.9;
transition:all 0.3s ease;

}


.step.active{

background:rgba(192,132,255,0.35);

border:1px solid rgba(192,132,255,0.7);

box-shadow:0 0 15px rgba(192,132,255,0.4);

color:#fff;

}

.step i{

color:#d8b4fe;

font-size:16px;

}

</style>

</head>

<body>

<div class="glass">

<div class="top-icon">
<i class="fa-solid fa-cloud-arrow-up"></i>
</div>

<h1>Saving Your Release</h1>

<p>Please wait while we process your submission.</p>

<div class="spinner"></div>

<div class="step active" id="s1">
<i class="fa-solid fa-upload"></i>
Uploading release files
</div>

<div class="step" id="s2">
<i class="fa-solid fa-check"></i>
Checking metadata
</div>

<div class="step" id="s3">
<i class="fa-solid fa-globe"></i>
Preparing distribution
</div>

<div class="step" id="s4">
<i class="fa-solid fa-rocket"></i>
Finalizing submission
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function step(id){

document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

const submission = {
title:"Test Release"
};

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";
return;

}

try{

step("s1");

await new Promise(r=>setTimeout(r,1000));

step("s2");

await new Promise(r=>setTimeout(r,1000));

step("s3");

await new Promise(r=>setTimeout(r,1000));

await addDoc(collection(db,"sharp"),{

...submission,

userId:user.uid,

status:"Pending",

createdAt:Date.now()

});

step("s4");

setTimeout(()=>{

window.location.href="a.html";

},1200);

}catch(err){

console.error(err);

alert("Submission failed");

}

});

</script>

</body>
</html>
