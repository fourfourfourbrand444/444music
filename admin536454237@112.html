<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>444Music — Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void:      #06060d;
  --surface:   #0c0c18;
  --card:      #0f0f1e;
  --border:    rgba(120,100,255,0.14);
  --border-md: rgba(120,100,255,0.28);
  --purple:       #a278f5;
  --purple-soft:  #c4a8ff;
  --purple-dim:   rgba(162,120,245,0.12);
  --purple-glow:  0 0 40px rgba(162,120,245,0.28);
  --green:  #34d399;
  --text:     #eeedf5;
  --text-sec: #7b7a8e;
  --ff-head: 'Syne', sans-serif;
  --ff-body: 'DM Sans', sans-serif;
}

html { -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--ff-body);
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(100,70,200,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 85% 90%, rgba(80,50,180,0.08) 0%, transparent 55%);
}

/* Animated grid */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(120,100,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,100,255,0.035) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 80%);
}

/* noise */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.5;
}

.center {
  position: relative; z-index: 1;
  text-align: center;
  padding: 40px 20px;
  animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

/* Logo mark */
.logo-ring {
  width: 80px; height: 80px; border-radius: 22px;
  background: linear-gradient(135deg, #6a3fc8 0%, #a278f5 100%);
  box-shadow: var(--purple-glow), 0 8px 40px rgba(100,60,200,0.4);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 28px;
  font-family: var(--ff-head); font-size: 2rem; font-weight: 800;
  color: #fff; letter-spacing: -0.02em;
  position: relative;
}

.logo-ring::before {
  content: '';
  position: absolute; inset: -1px; border-radius: 23px;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
  pointer-events: none;
}

.site-title {
  font-family: var(--ff-head);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.05;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #eeedf5 30%, #a278f5 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.site-sub {
  font-size: 0.92rem;
  color: var(--text-sec);
  margin-bottom: 52px;
  letter-spacing: 0.02em;
}

/* Portal cards */
.portals {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.portal-card {
  position: relative; overflow: hidden;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 28px 24px;
  width: 220px;
  text-align: left;
  text-decoration: none;
  display: block;
  transition: border-color 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
  cursor: pointer;
}

.portal-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(162,120,245,0.4), transparent);
  opacity: 0; transition: opacity 0.22s ease;
}

.portal-card:hover {
  border-color: var(--border-md);
  transform: translateY(-4px);
  box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(162,120,245,0.1);
}

.portal-card:hover::before { opacity: 1; }

.portal-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; margin-bottom: 18px;
}

.icon-admin  { background: rgba(162,120,245,0.15); border: 1px solid rgba(162,120,245,0.25); }
.icon-submit { background: rgba(52,211,153,0.1);   border: 1px solid rgba(52,211,153,0.2); }
.icon-stats  { background: rgba(96,165,250,0.1);   border: 1px solid rgba(96,165,250,0.2); }

.portal-label {
  font-family: var(--ff-head);
  font-size: 0.95rem; font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.portal-desc {
  font-size: 0.75rem;
  color: var(--text-sec);
  line-height: 1.55;
}

.portal-arrow {
  position: absolute; right: 20px; bottom: 22px;
  color: var(--purple); opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  font-size: 1.1rem;
}

.portal-card:hover .portal-arrow {
  opacity: 1;
  transform: translateX(3px);
}

/* Pulse badge */
.live-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.2);
  border-radius: 999px;
  padding: 5px 14px;
  font-size: 0.72rem;
  color: var(--green);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 32px;
  font-family: var(--ff-head); font-weight: 700;
}

.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px rgba(52,211,153,0.6);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: none; }
}

@keyframes pulse {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.2); }
}

@media (max-width: 520px) {
  .portals { flex-direction: column; align-items: center; }
  .portal-card { width: 100%; max-width: 320px; }
}
</style>
</head>
<body>

<div class="center">
  <div class="logo-ring">4</div>

  <div class="live-badge">
    <div class="live-dot"></div>
    444Music Portal
  </div>

  <div class="site-title">444Music</div>
  <div class="site-sub">Distribution platform for independent African artists</div>

  <div class="portals">
    <a class="portal-card" href="adminpage.html">
      <div class="portal-icon icon-admin">🛡️</div>
      <div class="portal-label">Admin Panel</div>
      <div class="portal-desc">Manage submissions, update statuses, verify payments.</div>
      <div class="portal-arrow">→</div>
    </a>

    <a class="portal-card" href="#" onclick="return false;" style="opacity:0.5;cursor:default;">
      <div class="portal-icon icon-submit">🎵</div>
      <div class="portal-label">Submit Release</div>
      <div class="portal-desc">Artist submission form for new distribution requests.</div>
      <div class="portal-arrow">→</div>
    </a>

    <a class="portal-card" href="#" onclick="return false;" style="opacity:0.5;cursor:default;">
      <div class="portal-icon icon-stats">📊</div>
      <div class="portal-label">Analytics</div>
      <div class="portal-desc">Real-time royalty and stream analytics dashboard.</div>
      <div class="portal-arrow">→</div>
    </a>
  </div>
</div>

</body>
</html>
