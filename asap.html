<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
:root {
  --purple:       #a278f5;
  --purple-soft:  #c4a8ff;
  --purple-deep:  #7c55d4;
  --purple-dim:   rgba(162,120,245,0.15);
  --void:         #06060d;
}
 
html, body {
  height: 100%;
  -webkit-font-smoothing: antialiased;
}
 
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--void);
  font-family: 'Syne', sans-serif;
  overflow: hidden;
 
  background-image:
    radial-gradient(ellipse 65% 50% at 50% 50%, rgba(100,70,200,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 80% 20%, rgba(162,120,245,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 35% 25% at 20% 80%, rgba(100,70,200,0.05) 0%, transparent 55%);
}
 
/* ── NOISE ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  opacity: 0.65;
}
 
/* ── FLOATING ORBS ── */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none; z-index: 0;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb-1 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(124,85,212,0.18), transparent 70%);
  top: -80px; left: -80px; animation-delay: 0s;
}
.orb-2 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(162,120,245,0.12), transparent 70%);
  bottom: -60px; right: -60px; animation-delay: -4s;
}
.orb-3 {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(196,168,255,0.08), transparent 70%);
  top: 40%; left: 10%; animation-delay: -2s;
}
 
/* ── CENTER STAGE ── */
.stage {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 32px;
  animation: stageIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
 
/* ── LOGO MARK ── */
.logo-wrap {
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
 
.logo-ring {
  position: absolute;
  width: 90px; height: 90px;
  border-radius: 50%;
  border: 1px solid rgba(162,120,245,0.2);
  animation: ringPulse 2.4s ease-in-out infinite;
}
 
.logo-ring-2 {
  width: 110px; height: 110px;
  border-color: rgba(162,120,245,0.1);
  animation-delay: 0.6s;
}
 
.logo-ring-3 {
  width: 130px; height: 130px;
  border-color: rgba(162,120,245,0.06);
  animation-delay: 1.2s;
}
 
.logo-badge {
  width: 68px; height: 68px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(124,85,212,0.4) 0%, rgba(162,120,245,0.25) 100%);
  border: 1px solid rgba(162,120,245,0.35);
  box-shadow:
    0 0 32px rgba(162,120,245,0.3),
    0 0 80px rgba(100,70,200,0.15),
    inset 0 1px 0 rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; font-weight: 800; color: var(--purple-soft);
  letter-spacing: -0.02em;
  animation: badgePulse 2.4s ease-in-out infinite;
}
 
/* ── SPINNER ── */
.spinner-wrap {
  position: relative;
  width: 72px; height: 72px;
  display: flex; align-items: center; justify-content: center;
}
 
.track {
  position: absolute;
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 2px solid rgba(162,120,245,0.1);
}
 
.arc {
  position: absolute;
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  border-top-color: var(--purple-soft);
  border-right-color: rgba(162,120,245,0.4);
  animation: arcSpin 1.1s cubic-bezier(0.4,0,0.2,1) infinite;
  box-shadow: 0 0 14px rgba(162,120,245,0.35);
}
 
.arc-inner {
  position: absolute;
  width: 50px; height: 50px;
  border-radius: 50%;
  border: 1.5px solid transparent;
  border-bottom-color: rgba(196,168,255,0.45);
  animation: arcSpin 1.6s cubic-bezier(0.4,0,0.2,1) infinite reverse;
}
 
/* ── TEXT ── */
.text-group {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  text-align: center;
}
 
.brand-name {
  font-size: 1.3rem; font-weight: 800;
  letter-spacing: -0.01em;
  color: transparent;
  background: linear-gradient(135deg, var(--purple-soft) 0%, var(--purple) 60%, var(--purple-deep) 100%);
  -webkit-background-clip: text; background-clip: text;
  animation: shimmer 3s ease-in-out infinite;
  background-size: 200% 100%;
}
 
.loading-text {
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(162,120,245,0.5);
  display: flex; align-items: center; gap: 6px;
}
 
.dots span {
  display: inline-block;
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(162,120,245,0.5);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
 
/* ── PROGRESS BAR ── */
.progress-wrap {
  width: 180px; height: 2px;
  background: rgba(162,120,245,0.1);
  border-radius: 999px; overflow: hidden;
}
 
.progress-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--purple-deep), var(--purple-soft));
  box-shadow: 0 0 10px rgba(162,120,245,0.5);
  animation: progressFill 1.4s cubic-bezier(0.4,0,0.2,1) forwards;
}
 
/* ═══════════════════════════════
   KEYFRAMES
═══════════════════════════════ */
@keyframes stageIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: none; }
}
 
@keyframes orbFloat {
  0%, 100% { transform: translateY(0px) scale(1); }
  50%       { transform: translateY(-24px) scale(1.04); }
}
 
@keyframes ringPulse {
  0%, 100% { transform: scale(1);    opacity: 0.6; }
  50%       { transform: scale(1.06); opacity: 1; }
}
 
@keyframes badgePulse {
  0%, 100% { box-shadow: 0 0 32px rgba(162,120,245,0.3), 0 0 80px rgba(100,70,200,0.15), inset 0 1px 0 rgba(255,255,255,0.08); }
  50%       { box-shadow: 0 0 44px rgba(162,120,245,0.45), 0 0 100px rgba(100,70,200,0.22), inset 0 1px 0 rgba(255,255,255,0.08); }
}
 
@keyframes arcSpin {
  from { transform: rotate(0deg);   }
  to   { transform: rotate(360deg); }
}
 
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
  40%            { transform: scale(1.2); opacity: 1; }
}
 
@keyframes progressFill {
  0%   { width: 0%; }
  60%  { width: 75%; }
  85%  { width: 90%; }
  100% { width: 100%; }
}
 
@keyframes shimmer {
  0%, 100% { background-position: 0% 50%;   }
  50%       { background-position: 100% 50%; }
}
</style>
</head>
 
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
 
  <div class="stage">
 
    <!-- Logo with pulse rings -->
    <div class="logo-wrap">
      <div class="logo-ring logo-ring-3"></div>
      <div class="logo-ring logo-ring-2"></div>
      <div class="logo-ring"></div>
      <div class="logo-badge">4</div>
    </div>
 
    <!-- Dual arc spinner -->
    <div class="spinner-wrap">
      <div class="track"></div>
      <div class="arc"></div>
      <div class="arc-inner"></div>
    </div>
 
    <!-- Text -->
    <div class="text-group">
      <div class="brand-name">444Music</div>
      <div class="loading-text">
        Loading
        <span class="dots">
          <span></span><span></span><span></span>
        </span>
      </div>
    </div>
 
    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-fill"></div>
    </div>
 
  </div>
 
  <script>
    setTimeout(() => { window.location.href = "aa.html"; }, 1500);
  </script>
</body>
</html>
