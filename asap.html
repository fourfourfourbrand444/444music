<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:#f2f2f2;

}

/* spinner */

.loader{

width:70px;
height:70px;

animation:rotate 2s linear infinite;

}

.loader circle{

fill:none;

stroke:#3f51ff;

stroke-width:6;

stroke-linecap:round;

stroke-dasharray:1,200;

stroke-dashoffset:0;

animation:dash 1.5s ease-in-out infinite;

}

/* rotation */

@keyframes rotate{

100%{
transform:rotate(360deg);
}

}

/* arc animation */

@keyframes dash{

0%{
stroke-dasharray:1,200;
stroke-dashoffset:0;
}

50%{
stroke-dasharray:90,200;
stroke-dashoffset:-35;
}

100%{
stroke-dasharray:90,200;
stroke-dashoffset:-124;
}

}

</style>

</head>

<body>

<svg class="loader" viewBox="25 25 50 50">
<circle cx="50" cy="50" r="20"></circle>
</svg>

<script>

/* redirect after loading */

setTimeout(()=>{

window.location.href="aa.html"

},1500)

</script>

</body>
</html>
