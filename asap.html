<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#3a0d5d,#5f2c82);

font-family:Arial, Helvetica, sans-serif;

}

/* Glass container */

.glass{

width:200px;
height:200px;

display:flex;
align-items:center;
justify-content:center;

border-radius:25px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 20px 60px rgba(0,0,0,0.5);

}

/* Circular Loader */

.loader{

width:70px;
height:70px;

border-radius:50%;

border:5px solid rgba(255,255,255,0.15);

border-top:5px solid #c084ff;

animation:spin 1s linear infinite;

}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

</style>

</head>

<body>

<div class="glass">

<div class="loader"></div>

</div>

<script>

/* redirect after short loading */

setTimeout(()=>{

window.location.href="aa.html"

},1500)

</script>

</body>
</html>
