<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:#f2f2f2;

}

/* Loader circle */

.loader{

width:70px;
height:70px;

border-radius:50%;

border:6px solid #dcdcdc;

border-bottom:6px solid #3f3cff;

animation:spin 1s linear infinite;

}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

</style>

</head>

<body>

<div class="loader"></div>

<script>

setTimeout(()=>{

window.location.href="aa.html"

},1500)

</script>

</body>
</html>
