<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Login | 444Music</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0118;
      --card:         #150222;
      --input-bg:     #1e0a30;
      --input-border: rgba(255,255,255,0.10);
      --input-focus:  rgba(138,80,220,0.55);
      --purple:       #7c3aed;
      --purple-light: #9d5ff5;
      --purple-social:#3b1a6b;
      --text:         #ffffff;
      --text-muted:   rgba(255,255,255,0.45);
      --divider:      rgba(255,255,255,0.18);
      --accent:       #f0c040;
      --danger:       #ff5f5f;
      --success:      #4cd68a;
      --warn:         #f0c040;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      width: 100%;
      height: 42vh;
      min-height: 220px;
      max-height: 340px;
      overflow: hidden;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      background:
        url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=900&q=85')
        center 30% / cover no-repeat;
      filter: brightness(0.62) saturate(1.1);
    }

    /* purple colour grade */
    .hero-grade {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(100,30,180,0.45) 0%,
        rgba(60,10,120,0.30) 60%,
        transparent 100%
      );
    }

    /* fade to page background at the bottom */
    .hero-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to bottom, transparent, var(--bg));
    }

    /* logo centred inside hero */
    .hero-logo {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      z-index: 2;
    }

    .hero-logo img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(160,80,255,0.55));
    }

    .hero-logo span {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    /* ─── FORM AREA ─── */
    .form-area {
      padding: 8px 24px 48px;
      display: flex;
      flex-direction: column;
    }

    /* field */
    .field { margin-bottom: 18px; }

    .field-label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 9px;
    }

    .input-wrap { position: relative; }

    .field-input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      padding: 16px 20px;
      outline: none;
      transition: border-color 0.22s, background 0.22s, box-shadow 0.22s;
      -webkit-appearance: none;
    }

    .field-input::placeholder { color: rgba(255,255,255,0.25); }

    .field-input:focus {
      border-color: var(--purple-light);
      background: #220d38;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
    }

    /* password eye */
    .pw-input { padding-right: 52px; }

    .pw-eye {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .pw-eye:hover { color: rgba(255,255,255,0.7); }

    /* forgot */
    .forgot-row {
      text-align: right;
      margin-top: 10px;
      margin-bottom: 26px;
    }

    .forgot-row a {
      font-size: 0.83rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-row a:hover { color: #fff; }

    /* ── PRIMARY LOGIN BUTTON ── */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed 0%, #9d5ff5 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 17px;
      cursor: pointer;
      letter-spacing: 0.03em;
      box-shadow: 0 6px 28px rgba(124,58,237,0.45);
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      margin-bottom: 30px;
    }

    .btn-login:hover {
      opacity: 0.93;
      transform: translateY(-1px);
      box-shadow: 0 10px 36px rgba(124,58,237,0.55);
    }

    .btn-login:active { transform: translateY(0); opacity: 1; }
    .btn-login.loading { pointer-events: none; opacity: 0.65; }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner  { display: block; }

    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin: 0 auto;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .divider-line {
      flex: 1;
      height: 1.5px;
      background: var(--divider);
      border-radius: 1px;
    }

    .divider span {
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    /* ── SOCIAL BUTTONS ── */
    .social-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }

    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--purple-social);
      border: 1.5px solid rgba(138,80,220,0.28);
      border-radius: 14px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 15px 20px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }

    .btn-social:hover {
      background: #4e2490;
      border-color: rgba(138,80,220,0.5);
      transform: translateY(-1px);
    }

    .btn-social:active { transform: translateY(0); }

    .btn-social .icon {
      width: 22px; height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── MESSAGE ── */
    .msg {
      font-size: 0.8rem;
      text-align: center;
      min-height: 20px;
      margin-top: -18px;
      margin-bottom: 16px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .msg.visible { opacity: 1; }
    .msg.error   { color: var(--danger); }
    .msg.success { color: var(--success); }
    .msg.warn    { color: var(--warn); }

    /* ── SIGN UP ── */
    .signup-row {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .signup-row a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      font-size: 0.96rem;
      transition: opacity 0.2s;
    }

    .signup-row a:hover { opacity: 0.75; }

    /* error state */
    .field.err .field-input {
      border-color: rgba(255,95,95,0.5);
      background: rgba(255,95,95,0.05);
    }

    /* ── ANIMATIONS ── */
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }

    .shake { animation: shake 0.38s ease; }

    @keyframes up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-logo   { animation: up 0.6s 0.05s ease both; }
    .field:nth-child(1) { animation: up 0.5s 0.12s ease both; }
    .field:nth-child(2) { animation: up 0.5s 0.20s ease both; }
    .forgot-row  { animation: up 0.5s 0.26s ease both; }
    .btn-login   { animation: up 0.5s 0.32s ease both; }
    .divider     { animation: up 0.5s 0.38s ease both; }
    .social-group{ animation: up 0.5s 0.44s ease both; }
    .signup-row  { animation: up 0.5s 0.50s ease both; }

    /* ── RESPONSIVE ── */
    @media (min-width: 520px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        background: #06000f;
      }

      .shell {
        width: 100%;
        max-width: 430px;
        background: var(--bg);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(138,80,220,0.12);
      }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ── HERO ── -->
  <div class="hero">
    <div class="hero-img"></div>
    <div class="hero-grade"></div>
    <div class="hero-fade"></div>

    <div class="hero-logo">
      <img src="https://444music-distribution.vercel.app/logo.png" alt="444Music">
      <span>444Music</span>
    </div>
  </div>

  <!-- ── FORM ── -->
  <div class="form-area">
    <form id="loginForm" novalidate>

      <div class="field" id="fEmail">
        <label class="field-label" for="email">Email Address</label>
        <div class="input-wrap">
          <input class="field-input" type="email" id="email"
            placeholder="Enter your email" autocomplete="email" required>
        </div>
      </div>

      <div class="field" id="fPass">
        <label class="field-label" for="password">Password</label>
        <div class="input-wrap">
          <input class="field-input pw-input" type="password" id="password"
            placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="pw-eye" id="pwToggle" aria-label="Show/hide password">
            <svg id="eyeShow" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eyeHide" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
              style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="forgot-row">
        <a href="#" id="forgotPass">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-login" id="submitBtn">
        <span class="btn-text">Login</span>
        <div class="spinner"></div>
      </button>

      <div class="msg" id="msg"></div>

    </form>

    <!-- divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span>Or continue with</span>
      <div class="divider-line"></div>
    </div>

    <!-- social -->
    <div class="social-group">

      <a href="#" class="btn-social" id="appleBtn">
        <span class="icon">
          <svg width="19" height="19" viewBox="0 0 814 1000" fill="white">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.1 269-317.1 70.6 0 129.5 46.4 174.4 46.4 43 0 110.1-50.9 193.1-50.9 31.2 0 113.8 2.6 177.4 100.5zm-238-181.6c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
          </svg>
        </span>
        Continue with Apple
      </a>

      <button type="button" class="btn-social" id="googleBtn">
        <span class="icon">
          <svg width="20" height="20" viewBox="0 0 18 18">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.233 17.64 11.925 17.64 9.2z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
        </span>
        Continue with Google
      </button>

    </div>

    <div class="signup-row">
      Don't have an account? <a href="register.html">Sign Up</a>
    </div>

  </div><!-- /form-area -->
</div><!-- /shell -->

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, sendPasswordResetEmail,
    GoogleAuthProvider, signInWithPopup
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const app  = initializeApp({
    apiKey:            "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
    authDomain:        "usersubmissionsportal.firebaseapp.com",
    projectId:         "usersubmissionsportal",
    storageBucket:     "usersubmissionsportal.firebasestorage.app",
    messagingSenderId: "734783502459",
    appId:             "1:734783502459:web:cfa2cc5de6976003b24ade"
  });
  const auth = getAuth(app);
  const $ = id => document.getElementById(id);

  const showMsg = (txt, type) => {
    const el = $('msg');
    el.textContent = txt;
    el.className = `msg visible ${type}`;
  };
  const clearMsg = () => { $('msg').className = 'msg'; };
  const setLoading = on => $('submitBtn').classList.toggle('loading', on);

  function shakeField(id) {
    const el = $(id);
    el.classList.add('shake', 'err');
    el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
  }

  // password toggle
  $('pwToggle').addEventListener('click', () => {
    const inp = $('password');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    $('eyeShow').style.display = show ? 'none'  : 'block';
    $('eyeHide').style.display = show ? 'block' : 'none';
  });

  // clear errors on type
  ['email','password'].forEach(id => $(id).addEventListener('input', () => {
    clearMsg();
    $('fEmail').classList.remove('err');
    $('fPass').classList.remove('err');
  }));

  // login
  $('loginForm').addEventListener('submit', async e => {
    e.preventDefault(); clearMsg();
    const email = $('email').value.trim();
    const pass  = $('password').value;
    if (!email)  { shakeField('fEmail'); showMsg('Please enter your email.', 'warn'); return; }
    if (!pass)   { shakeField('fPass');  showMsg('Please enter your password.', 'warn'); return; }
    setLoading(true);
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      showMsg('Signing you in…', 'success');
      setTimeout(() => { window.location.href = 'asap.html'; }, 700);
    } catch (err) {
      setLoading(false);
      const c = err.code || '';
      if (['auth/user-not-found','auth/wrong-password','auth/invalid-credential'].includes(c)) {
        shakeField('fEmail'); shakeField('fPass');
        showMsg('Incorrect email or password.', 'error');
      } else if (c === 'auth/too-many-requests') {
        showMsg('Too many attempts — try again later.', 'error');
      } else {
        showMsg('Something went wrong. Please try again.', 'error');
      }
    }
  });

  // forgot password
  $('forgotPass').addEventListener('click', async e => {
    e.preventDefault(); clearMsg();
    const email = $('email').value.trim();
    if (!email) { shakeField('fEmail'); showMsg('Enter your email first.', 'warn'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg('Reset link sent — check your inbox.', 'success');
    } catch (err) { showMsg(err.message, 'error'); }
  });

  // Google
  const gProvider = new GoogleAuthProvider();
  $('googleBtn').addEventListener('click', async () => {
    clearMsg();
    try {
      await signInWithPopup(auth, gProvider);
      window.location.href = 'asap.html';
    } catch (err) { showMsg('Google sign-in failed. Try again.', 'error'); }
  });
</script>

</body>
</html>
