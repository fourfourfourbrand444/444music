<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | 444Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-dark:   #1a0b2e;
      --purple-mid:    #2d1458;
      --purple-btn:    #5b2d8e;
      --purple-input:  #2a1250;
      --purple-social: #3a1a6e;
      --accent:        #f5c842;
      --text:          #ffffff;
      --text-muted:    rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%;
      background: #000;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: var(--purple-dark);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Hero */
    .hero {
      position: relative;
      height: 280px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(10,0,20,0.25) 0%, rgba(26,11,46,0.55) 65%, var(--purple-dark) 100%),
        url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=800&q=80') center/cover no-repeat;
    }

    .hero-tint {
      position: absolute;
      inset: 0;
      background: rgba(80,20,140,0.4);
      mix-blend-mode: multiply;
    }

    .hero-wave {
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
    }

    .hero-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -56%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .hero-logo img {
      width: 88px;
      height: 88px;
      object-fit: contain;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.55));
      animation: fadeIn 0.7s ease both;
    }

    /* Form body */
    .form-body {
      flex: 1;
      background: var(--purple-dark);
      padding: 28px 24px 44px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .field-group {
      margin-bottom: 16px;
    }

    .field-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      display: block;
    }

    .field-input {
      width: 100%;
      background: var(--purple-input);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 15px 18px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .field-input::placeholder { color: rgba(255,255,255,0.28); }

    .field-input:focus {
      border-color: rgba(255,255,255,0.22);
      background: #301460;
    }

    .pw-wrap { position: relative; }
    .pw-wrap .field-input { padding-right: 50px; }

    .pw-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.38);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px;
      transition: color 0.2s;
    }

    .pw-toggle:hover { color: rgba(255,255,255,0.65); }

    .forgot-row {
      text-align: right;
      margin-top: 10px;
      margin-bottom: 24px;
    }

    .forgot-row a {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-row a:hover { color: #fff; }

    .login-btn {
      width: 100%;
      background: var(--purple-btn);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .login-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    .login-btn:hover { background: #6e38a8; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn.loading { pointer-events: none; opacity: 0.7; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .login-btn.loading .btn-text { display: none; }
    .login-btn.loading .spinner  { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .divider::before,
    .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.14);
    }

    .divider span {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--purple-social);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      font-weight: 500;
      padding: 15px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
      margin-bottom: 12px;
    }

    .social-btn:last-of-type { margin-bottom: 0; }

    .social-btn:hover {
      background: #46248a;
      border-color: rgba(255,255,255,0.16);
    }

    .social-btn:active { transform: scale(0.99); }

    .msg {
      font-size: 0.78rem;
      text-align: center;
      min-height: 18px;
      margin-top: 12px;
      font-weight: 500;
      transition: opacity 0.3s;
      opacity: 0;
    }

    .msg.visible { opacity: 1; }
    .msg.error   { color: #ff6b6b; }
    .msg.success { color: #4caf7d; }
    .msg.warn    { color: #f5c842; }

    .signup-row {
      text-align: center;
      margin-top: 30px;
      font-size: 0.86rem;
      color: var(--text-muted);
    }

    .signup-row a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      display: block;
      margin-top: 3px;
      transition: opacity 0.2s;
    }

    .signup-row a:hover { opacity: 0.75; }

    .field-group.has-error .field-input {
      border-color: rgba(224,85,85,0.5);
      background: rgba(224,85,85,0.06);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -48%); }
      to   { opacity: 1; transform: translate(-50%, -56%); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(6px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }

    .shake { animation: shake 0.4s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field-group:nth-child(1) { animation: fadeUp 0.5s 0.15s ease both; }
    .field-group:nth-child(2) { animation: fadeUp 0.5s 0.22s ease both; }
    .forgot-row  { animation: fadeUp 0.5s 0.28s ease both; }
    .login-btn   { animation: fadeUp 0.5s 0.34s ease both; }
    .divider     { animation: fadeUp 0.5s 0.4s  ease both; }
    .social-btn  { animation: fadeUp 0.5s 0.46s ease both; }
    .signup-row  { animation: fadeUp 0.5s 0.52s ease both; }

    @media (min-width: 480px) {
      body { align-items: flex-start; padding: 20px; }
      .phone {
        min-height: auto;
        border-radius: 28px;
        box-shadow: 0 32px 80px rgba(0,0,0,0.75);
        margin: 40px auto;
      }
    }
  </style>
</head>
<body>

  <div class="phone">

    <!-- Hero -->
    <div class="hero">
      <div class="hero-bg"></div>
      <div class="hero-tint"></div>

      <div class="hero-logo">
        <img src="https://444music-distribution.vercel.app/logo.png" alt="444Music Logo">
      </div>

      <svg class="hero-wave" viewBox="0 0 420 50" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,22 C100,50 300,4 420,30 L420,50 L0,50 Z" fill="#1a0b2e"/>
      </svg>
    </div>

    <!-- Form -->
    <div class="form-body">

      <form id="loginForm" novalidate>

        <div class="field-group" id="fieldEmail">
          <label class="field-label" for="email">Email Address</label>
          <input class="field-input" type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
        </div>

        <div class="field-group" id="fieldPass">
          <label class="field-label" for="password">Password</label>
          <div class="pw-wrap">
            <input class="field-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1" aria-label="Toggle password">
              <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeClosed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="forgot-row">
          <a href="#" id="forgotPass">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn" id="submitBtn">
          <span class="btn-text">Login</span>
          <div class="spinner"></div>
        </button>

        <div class="msg" id="errorMsg"></div>

      </form>

      <div class="divider"><span>Or continue with</span></div>

      <a href="#" class="social-btn" id="appleLoginBtn">
        <svg width="18" height="18" viewBox="0 0 814 1000" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.1 269-317.1 70.6 0 129.5 46.4 174.4 46.4 43 0 110.1-50.9 193.1-50.9 31.2 0 113.8 2.6 177.4 100.5zm-238-181.6c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
        </svg>
        Continue with Apple
      </a>

      <button class="social-btn" id="googleLoginBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="signup-row">
        Don't have an account?
        <a href="register.html">Sign Up</a>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      GoogleAuthProvider,
      signInWithPopup,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
      authDomain: "usersubmissionsportal.firebaseapp.com",
      projectId: "usersubmissionsportal",
      storageBucket: "usersubmissionsportal.firebasestorage.app",
      messagingSenderId: "734783502459",
      appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const $ = id => document.getElementById(id);

    function showMsg(text, type) {
      const el = $('errorMsg');
      el.textContent = text;
      el.className = `msg visible ${type}`;
    }

    function clearMsg() {
      const el = $('errorMsg');
      el.className = 'msg';
      el.textContent = '';
    }

    function setLoading(on) { $('submitBtn').classList.toggle('loading', on); }

    function shakeField(id) {
      const el = $(id);
      el.classList.add('shake', 'has-error');
      el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
    }

    $('pwToggle').addEventListener('click', () => {
      const input = $('password');
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      $('eyeOpen').style.display   = isText ? 'block' : 'none';
      $('eyeClosed').style.display = isText ? 'none'  : 'block';
    });

    ['email','password'].forEach(id => {
      $(id).addEventListener('input', () => {
        clearMsg();
        $('fieldEmail').classList.remove('has-error');
        $('fieldPass').classList.remove('has-error');
      });
    });

    $('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      clearMsg();
      const email    = $('email').value.trim();
      const password = $('password').value;

      if (!email)    { shakeField('fieldEmail'); showMsg('Please enter your email address.', 'warn'); return; }
      if (!password) { shakeField('fieldPass');  showMsg('Please enter your password.', 'warn');      return; }

      setLoading(true);
      try {
        await signInWithEmailAndPassword(auth, email, password);
        showMsg('Signing you in…', 'success');
        setTimeout(() => { window.location.href = 'asap.html'; }, 600);
      } catch (err) {
        setLoading(false);
        const code = err.code || '';
        if (['auth/user-not-found','auth/wrong-password','auth/invalid-credential'].includes(code)) {
          shakeField('fieldEmail'); shakeField('fieldPass');
          showMsg('Incorrect email or password.', 'error');
        } else if (code === 'auth/too-many-requests') {
          showMsg('Too many attempts. Try again later.', 'error');
        } else {
          showMsg('Something went wrong. Please try again.', 'error');
        }
      }
    });

    $('forgotPass').addEventListener('click', async e => {
      e.preventDefault();
      clearMsg();
      const email = $('email').value.trim();
      if (!email) { shakeField('fieldEmail'); showMsg('Enter your email address first.', 'warn'); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        showMsg('Reset link sent — check your inbox.', 'success');
      } catch (err) {
        showMsg(err.message, 'error');
      }
    });

    const provider = new GoogleAuthProvider();
    $('googleLoginBtn').addEventListener('click', async () => {
      clearMsg();
      try {
        await signInWithPopup(auth, provider);
        window.location.href = 'asap.html';
      } catch (err) {
        showMsg('Google sign-in failed. Please try again.', 'error');
      }
    });
  </script>

</body>
</html>
