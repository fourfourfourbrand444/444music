<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>444Music – Verify Email</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #020203;
      color: #e8e8f0;
      overflow: hidden;
    }

    .screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #020203;
    }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 26px 36px;
      overflow-y: auto;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.015) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(255,255,255,0.01) 0%, transparent 60%),
        #020203;
    }

    .back-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 4px;
      font-size: 22px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #c4b5fd; }

    .icon-box {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #14101f;
      border: 1px solid rgba(167,139,250,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 4px 24px rgba(139,92,246,0.12);
    }

    .icon-box svg { width: 26px; height: 26px; }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 13.5px;
      color: rgba(255,255,255,0.45);
      line-height: 1.55;
      margin-bottom: 36px;
    }
    .subtitle strong { color: #c4b5fd; font-weight: 600; }

    .code-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .code-box {
      width: 100%;
      aspect-ratio: 1 / 1.15;
      background: #14101f;
      border: 1px solid rgba(167,139,250,0.16);
      border-radius: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #e8e8f0;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      caret-color: #a78bfa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .code-box:focus {
      border-color: rgba(167,139,250,0.65);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
    }
    .code-row.error .code-box { border-color: rgba(248,113,113,0.5); }

    @keyframes shake {
      0%,100% { transform:translateX(0); }
      20%      { transform:translateX(-6px); }
      40%      { transform:translateX(6px); }
      60%      { transform:translateX(-4px); }
      80%      { transform:translateX(4px); }
    }
    .code-row.shake { animation:shake 0.35s ease; }

    .msg {
      font-size: 12.5px;
      margin-top: 16px;
      min-height: 16px;
      opacity: 0;
      transition: opacity 0.3s;
      font-weight: 500;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .msg.visible { opacity:1; }
    .msg.error   { color: #f87171; }
    .msg.success { color: #4ade80; }
    .msg.warn    { color: #fb923c; }
    .msg svg { flex-shrink: 0; margin-top: 1px; }

    .submit-btn {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 32px;
      box-shadow: 0 4px 24px rgba(139,92,246,0.28);
    }
    .submit-btn:hover:not(:disabled) {
      opacity: 0.94;
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(139,92,246,0.36);
    }
    .submit-btn:active:not(:disabled) { opacity:1; transform:translateY(0); }
    .submit-btn:disabled { opacity:0.2; cursor:not-allowed; }

    .btn-text { display:block; }
    .spinner {
      display:none;
      width:18px; height:18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #ffffff;
      border-radius:50%;
      animation: spin 0.65s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .submit-btn.loading .btn-text { display:none; }
    .submit-btn.loading .spinner  { display:block; }

    .resend-row {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }
    .resend-row a, .resend-row span.link {
      color: #a78bfa;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .resend-row span.link:hover { color: #c4b5fd; }
    .resend-row span.disabled { color: rgba(255,255,255,0.2); cursor: not-allowed; }

    .spam-note {
      text-align: center;
      margin-top: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.01em;
    }

    .body::-webkit-scrollbar { width:3px; }
    .body::-webkit-scrollbar-track { background:transparent; }
    .body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); border-radius:3px; }
  </style>
</head>
<body>

<div class="screen">
  <div class="body">

    <button class="back-btn" onclick="window.location.href='login.html'" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>

    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c4b5fd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16v16H4z" opacity="0"/>
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M22 6l-10 7L2 6"/>
      </svg>
    </div>

    <h1>Verify your email</h1>
    <p class="subtitle">
      We sent a 6-digit code to <strong id="emailDisplay">your email</strong>.
      If you don't see it within a minute, check your spam or junk folder.
    </p>

    <div class="code-row" id="codeRow">
      <input type="text" inputmode="numeric" maxlength="1" class="code-box" data-i="0">
      <input type="text" inputmode="numeric" maxlength="1" class="code-box" data-i="1">
      <input type="text" inputmode="numeric" maxlength="1" class="code-box" data-i="2">
      <input type="text" inputmode="numeric" maxlength="1" class="code-box" data-i="3">
      <input type="text" inputmode="numeric" maxlength="1" class="code-box" data-i="4">
      <input type="text" inputmode="numeric" maxlength="1" class="code-box" data-i="5">
    </div>

    <div class="msg" id="verifyMsg"></div>

    <button class="submit-btn" id="verifyBtn" onclick="doVerify()">
      <span class="btn-text">Verify</span>
      <div class="spinner"></div>
    </button>

    <div class="resend-row">
      Didn't get a code?
      <span class="link" id="resendLink" onclick="doResend()">Resend code</span>
    </div>
    <div class="spam-note">Remember to check spam/junk before resending.</div>

  </div>
</div>

<script type="module">
  import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
    authDomain: "usersubmissionsportal.firebaseapp.com",
    projectId: "usersubmissionsportal",
    storageBucket: "usersubmissionsportal.firebasestorage.app",
    messagingSenderId: "734783502459",
    appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
  };
  const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const BACKEND = 'https://444music-backend.bonto.run';
  const $ = id => document.getElementById(id);

  const uid   = sessionStorage.getItem('pendingVerifyUid');
  const email = sessionStorage.getItem('pendingVerifyEmail');
  const name  = sessionStorage.getItem('pendingVerifyName');

  if (!uid || !email) {
    // Nothing to verify — bounce back to signup
    window.location.href = 'login.html';
  } else {
    $('emailDisplay').textContent = email;
  }

  const boxes = Array.from(document.querySelectorAll('.code-box'));
  const codeRow = $('codeRow');

  function getCode() { return boxes.map(b => b.value).join(''); }

  function clearBoxes() {
    boxes.forEach(b => b.value = '');
    boxes[0].focus();
  }

  function shakeRow() {
    codeRow.classList.add('shake', 'error');
    codeRow.addEventListener('animationend', () => codeRow.classList.remove('shake'), { once: true });
  }

  function clearError() { codeRow.classList.remove('error'); }

  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/[^0-9]/g, '');
      clearError();
      if (box.value && i < boxes.length - 1) boxes[i + 1].focus();
      if (getCode().length === 6) doVerify();
    });
    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !box.value && i > 0) boxes[i - 1].focus();
    });
    box.addEventListener('paste', (e) => {
      e.preventDefault();
      const digits = (e.clipboardData.getData('text') || '').replace(/[^0-9]/g, '').slice(0, 6);
      digits.split('').forEach((d, idx) => { if (boxes[idx]) boxes[idx].value = d; });
      if (digits.length === 6) doVerify();
    });
  });

  function showMsg(text, type, iconSvg) {
    const el = $('verifyMsg');
    el.innerHTML = (iconSvg || '') + `<span>${text}</span>`;
    el.className = `msg visible ${type}`;
  }
  function setLoad(on) {
    const btn = $('verifyBtn');
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  const iconWarn = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  const iconCheck = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';

  window.doVerify = async () => {
    const code = getCode();
    if (code.length !== 6) {
      shakeRow();
      showMsg('Enter the full 6-digit code.', 'warn', iconWarn);
      return;
    }
    setLoad(true);
    try {
      const res = await fetch(`${BACKEND}/api/verification/verify-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, code })
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok && data.success) {
        await updateDoc(doc(db, 'users', uid), { emailVerified: true }).catch(() => {});
        showMsg('Email verified.', 'success', iconCheck);
        sessionStorage.removeItem('pendingVerifyUid');
        sessionStorage.removeItem('pendingVerifyEmail');
        sessionStorage.removeItem('pendingVerifyName');
        setTimeout(() => window.location.href = 'loading.html', 900);
      } else {
        setLoad(false);
        shakeRow();
        clearBoxes();
        const reason = (data.message || '').toLowerCase();
        if (reason.includes('expired')) {
          showMsg('Code expired. Tap resend below.', 'error', iconWarn);
        } else {
          showMsg('Incorrect code. Try again.', 'error', iconWarn);
        }
      }
    } catch (err) {
      setLoad(false);
      shakeRow();
      showMsg('Network error. Check your connection.', 'error', iconWarn);
    }
  };

  let cooldown = 0;
  let cooldownTimer = null;

  function startCooldown() {
    cooldown = 45;
    updateResendUI();
    clearInterval(cooldownTimer);
    cooldownTimer = setInterval(() => {
      cooldown--;
      updateResendUI();
      if (cooldown <= 0) clearInterval(cooldownTimer);
    }, 1000);
  }

  function updateResendUI() {
    const link = $('resendLink');
    if (cooldown > 0) {
      link.textContent = `Resend in ${cooldown}s`;
      link.className = 'disabled';
    } else {
      link.textContent = 'Resend code';
      link.className = 'link';
    }
  }

  window.doResend = async () => {
    if (cooldown > 0) return;
    try {
      const res = await fetch(`${BACKEND}/api/verification/send-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid, email, name })
      });
      if (res.ok) {
        clearBoxes();
        clearError();
        showMsg('New code sent. Check your inbox — or spam/junk folder.', 'success', iconCheck);
        startCooldown();
      } else {
        showMsg('Could not resend. Try again shortly.', 'error', iconWarn);
      }
    } catch (err) {
      showMsg('Network error. Try again.', 'error', iconWarn);
    }
  };

  startCooldown();
  boxes[0].focus();
</script>

</body>
</html>
