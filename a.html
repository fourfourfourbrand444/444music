<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Submitted • 444Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --black:      #000000;
  --black-1:    #080808;
  --black-2:    #0d0d0d;
  --black-3:    #111111;
  --black-4:    #161616;
  --white:      #ffffff;
  --white-90:   rgba(255,255,255,0.90);
  --white-70:   rgba(255,255,255,0.70);
  --white-40:   rgba(255,255,255,0.40);
  --white-20:   rgba(255,255,255,0.20);
  --white-10:   rgba(255,255,255,0.10);
  --white-06:   rgba(255,255,255,0.06);
  --grey:       #888888;
  --grey-dark:  #444444;
  --green:      #22c55e;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height: 100vh;
  background: var(--black);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif;
  padding: 32px 20px;
  color: var(--white);
}

.card {
  width: 100%; max-width: 400px;
  background: var(--black-2);
  border: 1px solid var(--white-10);
  border-radius: 22px;
  padding: 34px 30px 30px;
  text-align: center;
  opacity: 0; transform: translateY(16px);
  animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
}
@keyframes cardIn { to { opacity:1; transform: translateY(0); } }

.check-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
  border-radius: 999px; padding: 6px 14px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--green); margin-bottom: 22px;
}
.check-badge svg { width: 13px; height: 13px; flex-shrink: 0; }

.cover-frame {
  width: 168px; height: 168px; margin: 0 auto 22px;
  border-radius: 18px; overflow: hidden;
  background: var(--black-3); border: 1px solid var(--white-10);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.cover-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cover-frame svg { width: 40px; height: 40px; color: var(--grey-dark); }

.skeleton { background: linear-gradient(90deg, var(--black-3) 25%, rgba(255,255,255,0.05) 50%, var(--black-3) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 21px; font-weight: 800; letter-spacing: -0.3px;
  color: var(--white); margin-bottom: 5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.artist-line {
  font-size: 13.5px; color: var(--grey); font-weight: 600; margin-bottom: 22px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.date-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: var(--black-3); border: 1px solid var(--white-10);
  border-radius: 14px; padding: 14px 16px; margin-bottom: 22px;
}
.date-icon {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  background: var(--white-06); border: 1px solid var(--white-10);
  display: flex; align-items: center; justify-content: center; color: var(--white-70);
}
.date-icon svg { width: 16px; height: 16px; }
.date-text { text-align: left; flex: 1; min-width: 0; }
.date-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--grey-dark); }
.date-value { font-size: 14px; font-weight: 700; color: var(--white); margin-top: 2px; }
.date-chip {
  font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 8px;
  background: var(--white-06); border: 1px solid var(--white-10); color: var(--white-70);
  white-space: nowrap; flex-shrink: 0;
}

p.note {
  font-size: 13px; color: var(--grey); line-height: 1.6; margin-bottom: 26px;
}

.btn {
  width: 100%; padding: 15px; border-radius: 13px;
  background: var(--white); border: none; color: var(--black);
  font-family: 'Nunito', sans-serif; font-size: 14.5px; font-weight: 800;
  cursor: pointer; letter-spacing: 0.2px;
  transition: opacity 0.2s, transform 0.15s;
}
.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.btn:active { transform: scale(0.98); }

.link-row { margin-top: 16px; }
.link-row a {
  font-size: 12.5px; color: var(--grey); text-decoration: none; font-weight: 700;
  transition: color 0.15s;
}
.link-row a:hover { color: var(--white); }

@media(max-width:400px){
  .card { padding: 28px 20px 24px; }
  h1 { font-size: 19px; }
  .cover-frame { width: 140px; height: 140px; }
}
</style>
</head>
<body>

<div class="card">

  <div class="check-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    Submitted
  </div>

  <div class="cover-frame skeleton" id="coverFrame"></div>

  <h1 id="releaseTitleEl">Loading…</h1>
  <p class="artist-line" id="artistLineEl">&nbsp;</p>

  <div class="date-row">
    <div class="date-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <div class="date-text">
      <div class="date-label">Release Date</div>
      <div class="date-value" id="releaseDateEl">—</div>
    </div>
    <div class="date-chip" id="countdownChip" style="display:none;"></div>
  </div>

  <p class="note">Your release is in and under review. We'll notify you once it goes live.</p>

  <button class="btn" onclick="window.location.href='wey.html'">Go to Dashboard</button>

  <div class="link-row">
    <a href="wey.html">View all my releases</a>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
  authDomain:        "usersubmissionsportal.firebaseapp.com",
  projectId:         "usersubmissionsportal",
  storageBucket:     "usersubmissionsportal.firebasestorage.app",
  messagingSenderId: "734783502459",
  appId:             "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Pulls the release this person just submitted — cover art comes from
// the upload step, title/artist/date come from the release-info step;
// both were saved together on the same Firestore submission doc.
async function fetchLatestSubmission(uid) {
  try {
    const q = query(
      collection(db, "submissions"),
      where("userId", "==", uid),
      orderBy("createdAt", "desc"),
      limit(1)
    );
    const snap = await getDocs(q);
    if (!snap.empty) return snap.docs[0].data();
    return null;
  } catch (e) {
    // Fallback if a composite index isn't available yet — pick the
    // most recent one client-side instead.
    try {
      const q2 = query(collection(db, "submissions"), where("userId", "==", uid));
      const snap2 = await getDocs(q2);
      if (snap2.empty) return null;
      let latest = null;
      snap2.forEach(d => {
        const v = d.data();
        if (!latest || (v.createdAt || 0) > (latest.createdAt || 0)) latest = v;
      });
      return latest;
    } catch (e2) {
      console.error(e2);
      return null;
    }
  }
}

function countdownLabel(releaseDateStr) {
  if (!releaseDateStr) return null;
  const releaseDate = new Date(releaseDateStr);
  if (isNaN(releaseDate.getTime())) return null;
  const now = new Date();
  const startOfToday   = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startOfRelease = new Date(releaseDate.getFullYear(), releaseDate.getMonth(), releaseDate.getDate());
  const diffDays = Math.round((startOfRelease - startOfToday) / (1000 * 60 * 60 * 24));
  if (diffDays > 1) return `In ${diffDays} days`;
  if (diffDays === 1) return `Tomorrow`;
  if (diffDays === 0) return `Today`;
  return `Live`;
}

function renderOverview(data) {
  const coverFrame = document.getElementById('coverFrame');
  coverFrame.classList.remove('skeleton');
  if (data.coverURL) {
    coverFrame.innerHTML = `<img src="${escHtml(data.coverURL)}" alt="Cover art">`;
  } else {
    coverFrame.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
  }

  document.getElementById('releaseTitleEl').textContent = data.releaseTitle || 'Untitled Release';
  const featuring = data.featuring && data.featuring.trim() ? ` ft. ${data.featuring}` : '';
  document.getElementById('artistLineEl').textContent = (data.artistName || 'Unknown Artist') + featuring;

  const releaseDateEl = document.getElementById('releaseDateEl');
  if (data.releaseDate) {
    const d = new Date(data.releaseDate);
    releaseDateEl.textContent = isNaN(d.getTime())
      ? 'Not set'
      : d.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
    const cd = countdownLabel(data.releaseDate);
    if (cd) {
      const chip = document.getElementById('countdownChip');
      chip.textContent = cd;
      chip.style.display = 'inline-block';
    }
  } else {
    releaseDateEl.textContent = 'Not set';
  }
}

function renderEmptyState() {
  const coverFrame = document.getElementById('coverFrame');
  coverFrame.classList.remove('skeleton');
  coverFrame.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
  document.getElementById('releaseTitleEl').textContent = 'Release Submitted';
  document.getElementById('artistLineEl').textContent = '';
  document.getElementById('releaseDateEl').textContent = '—';
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  const data = await fetchLatestSubmission(user.uid);
  if (data) renderOverview(data); else renderEmptyState();
});
</script>
</body>
</html>
