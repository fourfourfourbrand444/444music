<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Submitted • 444Music</title>

<link rel="stylesheet" href="a.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
  <div class="card">

    <div class="icon-box">
      <i class="ri-upload-cloud-2-fill"></i>
    </div>

    <h1>Your release has been submitted</h1>
    <p class="subtitle">
      Our team is now reviewing your music. This usually takes a short time.
      You’ll be notified once your release goes live on streaming platforms.
    </p>
    <div class="status-box">
      <div class="status-item">
        <i class="ri-checkbox-circle-line"></i>
        Files Uploaded
      </div>

      <div class="status-item">
        <i class="ri-time-line"></i>
        Review in Progress
      </div>

      <div class="status-item pending">
        <i class="ri-global-line"></i>
        Distribution Pending
      </div>
    </div>

    <div class="info-grid">

      <div class="info">
        <i class="ri-spotify-fill"></i>
        Spotify Delivery
      </div>
      <div class="info">
        <i class="ri-apple-fill"></i>
        Apple Music Delivery
      </div>

      <div class="info">
        <i class="ri-youtube-fill"></i>
        YouTube Music
      </div>

      <div class="info">
        <i class="ri-tiktok-fill"></i>
        TikTok Library
      </div>

    </div>

    <button class="btn" onclick="goDashboard()">
      <i class="ri-dashboard-line"></i>
      Go to Dashboard
    </button>

  </div>
</div>
<script>
function goDashboard(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
