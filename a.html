<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Submitted • 444Music</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #07070d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
}

.card {
  width: 92%;
  max-width: 380px;
  background: #0e0e1a;
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: 24px;
  padding: 44px 32px 36px;
  text-align: center;
  opacity: 0;
  transform: translateY(20px) scale(0.97);
  animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) 0.15s forwards;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 24px;
  background: linear-gradient(150deg, rgba(139,92,246,0.06) 0%, transparent 55%);
  pointer-events: none;
}
@keyframes cardIn {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* brand */
.brand {
  display: flex; align-items: center; justify-content: center;
  gap: 7px; margin-bottom: 36px;
}
.brand-dot { width: 7px; height: 7px; border-radius: 50%; background: #8b5cf6; }
.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700;
  color: #4a4a65; letter-spacing: 2.5px; text-transform: uppercase;
}

/* icon */
.icon-wrap {
  position: relative;
  width: 110px; height: 110px;
  margin: 0 auto 28px;
}

.icon-glow {
  position: absolute; inset: -16px; border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.28) 0%, transparent 68%);
  animation: glowPulse 2.8s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { transform: scale(1);    opacity: 0.6; }
  50%      { transform: scale(1.15); opacity: 1; }
}

.icon-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1px solid rgba(139,92,246,0.45);
  animation: ringOut 2.6s ease-out infinite;
}
.icon-ring-2 { animation-delay: 1.3s; }
@keyframes ringOut {
  0%   { transform: scale(1);   opacity: 0.5; }
  100% { transform: scale(1.8); opacity: 0; }
}

.icon-circle {
  position: relative; z-index: 2;
  width: 110px; height: 110px; border-radius: 50%;
  background: linear-gradient(145deg, #160f2e, #0e0a1e);
  border: 1px solid rgba(139,92,246,0.28);
  display: flex; align-items: center; justify-content: center;
  animation: float 3.8s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

/* sparkles */
.sp {
  position: absolute; border-radius: 50%;
  background: #c4b5fd; z-index: 3; pointer-events: none;
}
.sp1 { width:5px;height:5px; top:-5px; left:calc(50% - 2px); animation: sp 2.8s 1.0s ease-in-out infinite; }
.sp2 { width:4px;height:4px; top:14px; right:-7px;            animation: sp 3.1s 1.5s ease-in-out infinite; }
.sp3 { width:5px;height:5px; bottom:-4px; left:16px;          animation: sp 2.5s 1.9s ease-in-out infinite; }
.sp4 { width:3px;height:3px; bottom:12px; right:-6px;         animation: sp 3.4s 0.8s ease-in-out infinite; }
.sp5 { width:4px;height:4px; top:26px; left:-9px;             animation: sp 2.9s 2.2s ease-in-out infinite; }
.sp6 { width:3px;height:3px; top:-8px; left:28px;             animation: sp 3.2s 1.6s ease-in-out infinite; }
.sp7 { width:4px;height:4px; bottom:20px; right:-9px;         animation: sp 2.7s 0.6s ease-in-out infinite; background:#a5f3fc; }
@keyframes sp {
  0%,100% { opacity:0; transform:scale(0.3); }
  45%,55%  { opacity:1; transform:scale(1); }
}

/* SVG */
.check-svg { width: 52px; height: 52px; overflow: visible; }

.arc-track { fill:none; stroke:rgba(139,92,246,0.15); stroke-width:2; }
.arc-fill {
  fill: none; stroke: url(#arcGrad); stroke-width: 2.5; stroke-linecap: round;
  stroke-dasharray: 157; stroke-dashoffset: 157;
  animation: drawArc 0.9s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
}
@keyframes drawArc { to { stroke-dashoffset: 0; } }

.check-mark {
  fill: none; stroke: #a78bfa; stroke-width: 4;
  stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 90; stroke-dashoffset: 90;
  animation: drawCheck 0.5s cubic-bezier(0.4,0,0.2,1) 1.1s forwards;
}
@keyframes drawCheck { to { stroke-dashoffset: 0; } }

.ray {
  stroke: #7c3aed; stroke-width: 1.5; stroke-linecap: round;
  opacity: 0; animation: rayBlink 2.2s ease-in-out infinite;
}
.r1{animation-delay:1.4s} .r2{animation-delay:1.7s}
.r3{animation-delay:1.2s} .r4{animation-delay:2.0s} .r5{animation-delay:0.9s}
@keyframes rayBlink {
  0%,100%{opacity:0} 40%,60%{opacity:0.75}
}

/* particle canvas sits behind icon */
#pcv {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 260px; height: 260px;
  pointer-events: none; z-index: 1;
}

/* text */
h2 {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  color: #f0eeff; margin-bottom: 8px; letter-spacing: -0.3px;
}
p {
  font-size: 13.5px; color: #5e5d78;
  line-height: 1.65; margin-bottom: 32px;
}

/* button */
.btn {
  width: 100%; padding: 14px; border-radius: 12px;
  background: #8b5cf6; border: none; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.2px;
  transition: background 0.2s, box-shadow 0.25s, transform 0.15s;
}
.btn:hover {
  background: #7c3aed;
  box-shadow: 0 0 28px rgba(139,92,246,0.45);
}
.btn:active { transform: scale(0.98); }

@media(max-width:400px){
  .card { padding: 36px 20px 28px; }
  h2 { font-size: 19px; }
  .icon-wrap { width:90px; height:90px; }
  .icon-circle { width:90px; height:90px; }
  .check-svg { width:42px; height:42px; }
}
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">444Music</span>
  </div>

  <div class="icon-wrap">
    <canvas id="pcv"></canvas>
    <div class="icon-glow"></div>
    <div class="icon-ring"></div>
    <div class="icon-ring icon-ring-2"></div>

    <div class="sp sp1"></div>
    <div class="sp sp2"></div>
    <div class="sp sp3"></div>
    <div class="sp sp4"></div>
    <div class="sp sp5"></div>
    <div class="sp sp6"></div>
    <div class="sp sp7"></div>

    <div class="icon-circle">
      <svg class="check-svg" viewBox="0 0 52 52" fill="none">
        <defs>
          <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#e879f9"/>
          </linearGradient>
        </defs>
        <circle class="arc-track" cx="26" cy="26" r="25"/>
        <circle class="arc-fill"  cx="26" cy="26" r="25" transform="rotate(-90 26 26)"/>
        <line class="ray r1" x1="26" y1="1"  x2="26" y2="6"/>
        <line class="ray r2" x1="44" y1="8"  x2="40.5" y2="11.5"/>
        <line class="ray r3" x1="8"  y1="8"  x2="11.5" y2="11.5"/>
        <line class="ray r4" x1="49" y1="26" x2="44"   y2="26"/>
        <line class="ray r5" x1="3"  y1="26" x2="8"    y2="26"/>
        <polyline class="check-mark" points="13,27 22,36 39,17"/>
      </svg>
    </div>
  </div>

  <h2>Release Submitted</h2>
  <p>Your release is in and under review.<br>We'll notify you once it goes live.</p>

  <button class="btn" onclick="window.location.href='wey.html'">
    Go to Dashboard
  </button>

</div>

<script>
(function(){
  const c = document.getElementById('pcv');
  const x = c.getContext('2d');
  c.width = 260; c.height = 260;
  const cx = 130, cy = 130;
  const cols = ['#8b5cf6','#c084fc','#a78bfa','#e879f9','#818cf8','#fbbf24','#34d399','#a5f3fc'];

  function r(a,b){ return Math.random()*(b-a)+a; }

  function P(){ this.rst(); }
  P.prototype.rst = function(){
    const angle = r(0, Math.PI*2);
    const dist  = r(42, 75);
    this.x  = cx + Math.cos(angle)*dist;
    this.y  = cy + Math.sin(angle)*dist;
    this.vx = Math.cos(angle)*r(.06,.22);
    this.vy = Math.sin(angle)*r(.06,.22) - r(.1,.38);
    this.rad = r(1,2.8);
    this.life = Math.floor(r(0,120));
    this.maxL = Math.floor(r(80,140));
    this.col  = cols[Math.floor(r(0,cols.length))];
  };
  P.prototype.tick = function(){
    this.x += this.vx; this.y += this.vy; this.vy -= .003; this.life++;
    const t = this.life/this.maxL;
    this.a = t<.2 ? t/.2 : t<.7 ? 1 : 1-(t-.7)/.3;
    if(this.life >= this.maxL) this.rst();
  };
  P.prototype.draw = function(){
    x.save(); x.globalAlpha = Math.max(0,this.a)*.85;
    x.fillStyle = this.col; x.shadowColor = this.col; x.shadowBlur = 6;
    x.beginPath(); x.arc(this.x,this.y,this.rad,0,Math.PI*2); x.fill(); x.restore();
  };

  const pts = Array.from({length:28}, ()=> new P());
  (function loop(){
    x.clearRect(0,0,260,260);
    pts.forEach(p=>{ p.tick(); p.draw(); });
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
