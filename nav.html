<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>444 Navigation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #0B0A0E;
  --surface:       #161319;
  --surface-hover: #1F1A26;
  --border:        #2A2530;
  --border-strong: #3A3344;

  --purple:        #8B5CF6;
  --purple-deep:   #6D28D9;
  --purple-wash:   #1E1730;

  --text:          #F3F1F6;
  --text-soft:     #A6A1AE;
  --text-mute:     #6E6877;

  --ff-display: 'Poppins', sans-serif;
  --ff-body:    'Inter', sans-serif;

  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --t: 0.18s cubic-bezier(0.4,0,0.2,1);
}

html, body {
  height: 100%;
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ============ BACKGROUND (flat, no gradients) ============ */
.animated-bg {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 0;
}
.animated-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.18;
  mask-image: radial-gradient(circle at center, black 0%, transparent 75%);
  -webkit-mask-image: radial-gradient(circle at center, black 0%, transparent 75%);
}

/* ============ PARTICLES — flat dots, gentle float, no gradient ============ */
.particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background-image:
    radial-gradient(var(--purple) 1.5px, transparent 1.5px),
    radial-gradient(var(--border-strong) 1.5px, transparent 1.5px),
    radial-gradient(var(--purple) 1px, transparent 1px);
  background-size: 220px 220px, 160px 160px, 300px 300px;
  background-position: 20px 30px, 90px 140px, 200px 60px;
  opacity: 0.35;
  animation: drift 18s linear infinite;
}
@keyframes drift {
  0%   { background-position: 20px 30px, 90px 140px, 200px 60px; }
  100% { background-position: 20px 250px, 90px 360px, 200px 280px; }
}

/* ============ OVERLAY ============ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(11,10,14,0.4);
  z-index: 2;
}

/* ============ NAV MODAL ============ */
.nav-modal {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  margin: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px 28px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.55);
}

.nav-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.nav-header h2 {
  font-family: var(--ff-display);
  font-weight: 700;
  font-size: 1.3rem;
  letter-spacing: -0.01em;
  color: var(--text);
}
.nav-header i {
  font-size: 1.3rem;
  color: var(--purple);
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--purple-wash);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
}

.section-title {
  font-family: var(--ff-body);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin: 22px 0 12px;
}
.section-title:first-of-type { margin-top: 0; }

.nav-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.nav-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
  text-decoration: none;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px 16px;
  transition: border-color var(--t), background var(--t), transform var(--t);
}
.nav-card i {
  font-size: 1.2rem;
  color: var(--purple);
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--purple-wash);
  border-radius: var(--radius-sm);
  transition: background var(--t), color var(--t);
}
.nav-card span {
  font-family: var(--ff-body);
  font-size: 0.86rem;
  font-weight: 600;
  color: var(--text-soft);
  transition: color var(--t);
}
.nav-card:hover {
  border-color: var(--purple-deep);
  background: var(--surface-hover);
  transform: translateY(-2px);
}
.nav-card:hover span { color: var(--text); }
.nav-card:focus-visible {
  outline: 2px solid var(--purple);
  outline-offset: 2px;
}

.switch-link {
  display: block;
  text-decoration: none;
  margin-top: 22px;
}
.switch-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  background: var(--purple);
  color: #0B0A0E;
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px;
  font-family: var(--ff-body);
  font-weight: 600;
  font-size: 0.88rem;
  cursor: pointer;
  transition: background var(--t), transform var(--t);
}
.switch-btn i { font-size: 1rem; }
.switch-btn:hover { background: var(--purple-deep); color: var(--text); }
.switch-btn:active { transform: scale(0.98); }

/* ============ MOTION SAFETY ============ */
@media (prefers-reduced-motion: reduce) {
  .particles { animation: none; }
}

/* ============ RESPONSIVE ============ */
@media (max-width: 480px) {
  .nav-modal { padding: 26px 20px 22px; }
  .nav-grid { gap: 8px; }
  .nav-card { padding: 16px 14px; }
}
</style>
</head>
<body>
<!-- Animated Gradient Background -->
<div class="animated-bg"></div>
<!-- Floating Particles -->
<div class="particles"></div>
<!-- Overlay -->
<div id="navOverlay" class="overlay"></div>
<!-- NAV MODAL -->
<div id="navModal" class="nav-modal">
<div class="nav-header">
<h2>444Music</h2>
<i class="ri-sound-module-line"></i>
</div>
<p class="section-title">WHERE TO?</p>
<div class="nav-grid">
<a href="about.html" class="nav-card">
<i class="ri-information-line"></i>
<span>About Us</span>
</a>
<a href="login.html" class="nav-card">
<i class="ri-login-circle-line"></i>
<span>Login</span>
</a>
<a href="faq.html" class="nav-card">
<i class="ri-question-line"></i>
<span>FAQ</span>
</a>
<a href="https://444musicblog.vercel.app/" class="nav-card">
<i class="ri-music-line"></i>
<span> Playlist/Promote</span>
</a>
</div>
<p class="section-title">RESOURCES</p>
<div class="nav-grid">
<a href="register.html" class="nav-card">
<i class="ri-user-star-line"></i>
<span>Account</span>
</a>
</div>
<a href="support.html" class="switch-link">
<button class="switch-btn">
<i class="ri-customer-service-2-line"></i>
Contact Support/Help
</button>
</a>
</div>
</body>
</html>
