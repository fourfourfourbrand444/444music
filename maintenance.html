<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>We'll be right back</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:      #000000;
    --black-1:    #0A0A0A;
    --black-2:    #111111;
    --white:      #FFFFFF;
    --white-70:   rgba(255,255,255,0.70);
    --white-40:   rgba(255,255,255,0.40);
    --white-10:   rgba(255,255,255,0.10);
    --white-06:   rgba(255,255,255,0.06);
    --grey:       #888888;
    --grey-dark:  #444444;
    --green:      #22C55E;
    --green-dim:  rgba(34,197,94,0.12);
    --green-border: rgba(34,197,94,0.2);
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 460px;
    text-align: center;
    animation: fadeUp 0.7s cubic-bezier(0.34, 1.1, 0.64, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .icon-ring {
    width: 76px;
    height: 76px;
    margin: 0 auto 28px;
    border-radius: 50%;
    background: var(--white-06);
    border: 1px solid var(--white-10);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-ring i {
    font-size: 28px;
    color: var(--white-70);
    animation: spinSlow 3.5s linear infinite;
  }
  @keyframes spinSlow { to { transform: rotate(360deg); } }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white-70);
    background: var(--white-06);
    border: 1px solid var(--white-10);
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 22px;
  }

  h1 {
    font-size: clamp(26px, 5vw, 34px);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 14px;
  }

  p {
    font-size: 14.5px;
    color: var(--grey);
    line-height: 1.65;
    font-weight: 500;
    margin-bottom: 32px;
  }

  .status-strip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green-dim);
    border: 1px solid var(--green-border);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 36px;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { opacity: 0.6; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
  }

  .footer-note {
    font-size: 12px;
    color: var(--grey-dark);
    font-weight: 500;
  }
  .footer-note a {
    color: var(--grey);
    text-decoration: none;
    font-weight: 700;
    border-bottom: 1px solid var(--white-10);
  }
  .footer-note a:hover { color: var(--white); }

  .brand {
    margin-top: 44px;
    font-size: 13px;
    font-weight: 800;
    color: var(--white-40);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon-ring"><i class="fa-solid fa-gear"></i></div>

  <div class="eyebrow"><i class="fa-solid fa-screwdriver-wrench"></i> Scheduled Maintenance</div>

  <h1>We'll be right back.</h1>
  <p>We're making some improvements behind the scenes to make things better for you. This won't take long — thanks for your patience.</p>

  <div class="status-strip">
    <span class="status-dot"></span>
    Working on it now
  </div>

  <p class="footer-note">Need something urgent? <a href="mailto:support@444musicdistro.com">Contact support</a></p>

  <div class="brand">444Music</div>
</div>

</body>
</html>
