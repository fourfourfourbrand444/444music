<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>444Music — Upload Your Music</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base:        #080810;
  --bg-surface:     #0e0e18;
  --bg-card:        #111120;
  --bg-input:       #171725;
  --bg-input-focus: #1c1c2c;
  --border:         rgba(130,80,200,0.07);
  --border-focus:   rgba(130,80,200,0.35);
  --border-accent:  rgba(130,80,200,0.13);
  --accent:         #8a52c8;
  --accent-light:   #9b65d8;
  --accent-bright:  #b08fe0;
  --accent-dim:     rgba(130,80,200,0.05);
  --accent-glow:    0 0 24px rgba(130,80,200,0.1);
  --text-primary:   #e8e8e8;
  --text-secondary: #888888;
  --text-muted:     #444444;
  --success:        #4ade80;
  --danger:         #f87171;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --t: 0.2s cubic-bezier(0.4,0,0.2,1);
  --font-display: 'Outfit', sans-serif;
  --font-body:    'Inter', sans-serif;
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ─── ANIMATED BACKGROUND ─── */
.bg-scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

/* Pure dark — no color effects */
.bg-mesh, .bg-beam, .bg-orb-1, .bg-orb-2, .bg-orb-3 { display: none; }

/* Subtle grid only */
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
  background-size: 52px 52px;
  mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 30%, transparent 100%);
}

/* ─── LAYOUT ─── */
#root { position: relative; z-index: 1; }

.wrapper {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 0 80px;
  animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
@keyframes spin   { to { transform:rotate(360deg); } }

/* ─── HEADER ─── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 0 1.75rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  position: sticky;
  top: 0;
  z-index: 100;
  margin-bottom: 40px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-primary);
}

.logo-mark {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, #9b5de5 0%, #7c3aed 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 800; color: white;
  letter-spacing: 0.02em; flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(124,58,237,0.4);
}

.header-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(160,100,255,0.06);
  border: 1px solid var(--border-accent);
  border-radius: 999px;
  padding: 5px 13px;
  font-family: var(--font-display);
  font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent-light);
}

/* ─── PAGE TITLE AREA ─── */
.page-header {
  padding: 0 1.75rem;
  margin-bottom: 32px;
  animation: fadeUp 0.5s 0.05s cubic-bezier(0.22,1,0.36,1) both;
}

.page-title {
  font-family: var(--font-display);
  font-size: clamp(1.9rem, 5vw, 2.7rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.08;
  margin-bottom: 8px;
  color: var(--text-primary);
}

.page-title span {
  background: linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.page-sub {
  font-size: 0.875rem;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.01em;
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}

.page-sub-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--text-muted);
}

/* ─── MAIN CONTENT ─── */
.main { padding: 0 1.75rem; }

/* ─── CARD ─── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: clamp(20px,4vw,40px);
  position: relative; overflow: hidden;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 40px 100px rgba(0,0,0,0.35);
  margin-bottom: 16px;
  animation: fadeUp 0.5s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  transition: border-color var(--t);
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent-light) 60%, transparent 100%);
}
.card:focus-within { border-color: var(--border-accent); }

/* ─── SECTION HEADER ─── */
.section-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  background: rgba(160,100,255,0.06);
  border: 1px solid var(--border-accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.section-title {
  font-family: var(--font-display);
  font-size: 0.9rem; font-weight: 700;
  letter-spacing: 0.03em;
  color: var(--text-primary);
}

.section-desc {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ─── COVER ART ─── */
.cover-row {
  display: flex;
  align-items: center;
  gap: 20px;
}

@media (max-width: 440px) {
  .cover-row { flex-direction: column; align-items: flex-start; }
}

.cover-thumb {
  position: relative;
  width: 100px; height: 100px;
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid var(--border-accent);
  cursor: pointer;
  transition: border-color var(--t), box-shadow var(--t);
  background: var(--bg-input);
}
.cover-thumb:hover {
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(160,100,255,0.2);
}
.cover-thumb img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.cover-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
}
.cover-placeholder svg { color: #333; }
.cover-placeholder-text {
  font-family: var(--font-display);
  font-size: 0.52rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #333;
}
.cover-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.72);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  opacity: 0; transition: opacity var(--t);
}
.cover-thumb:hover .cover-overlay { opacity: 1; }
.cover-overlay-text {
  font-family: var(--font-display);
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: white;
}

.cover-info { flex: 1; min-width: 0; }
.cover-info-title {
  font-family: var(--font-display);
  font-size: 0.85rem; font-weight: 700;
  color: var(--text-primary); margin-bottom: 4px;
}
.cover-info-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  line-height: 1.6; margin-bottom: 12px;
  font-family: var(--font-body);
}

.cover-upload-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: transparent;
  border: 1px solid var(--border-accent);
  color: var(--text-primary);
  border-radius: 999px;
  padding: 0.45rem 1rem;
  font-family: var(--font-display);
  font-size: 0.72rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: all var(--t);
}
.cover-upload-btn:hover {
  border-color: var(--accent);
  color: var(--accent-bright);
  background: rgba(160,100,255,0.06);
}

.cover-set-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.65rem; font-family: var(--font-display);
  font-weight: 600; letter-spacing: 0.06em;
  color: var(--success); margin-top: 8px;
}

/* ─── TRACK NUMBER BADGE ─── */
.track-badge {
  font-family: var(--font-display);
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent);
  background: rgba(160,100,255,0.08);
  border: 1px solid rgba(160,100,255,0.18);
  border-radius: 999px;
  padding: 3px 12px;
  display: inline-flex; align-items: center;
}

.card-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.remove-btn {
  background: rgba(248,113,113,0.05);
  border: 1px solid rgba(248,113,113,0.15);
  color: rgba(248,113,113,0.45);
  width: 30px; height: 30px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--t);
}
.remove-btn:hover {
  background: rgba(248,113,113,0.12);
  border-color: rgba(248,113,113,0.35);
  color: var(--danger);
  transform: scale(1.08);
}

/* ─── FORM GRID ─── */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.col-full { grid-column: 1 / -1; }
@media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }

/* ─── FIELD ─── */
.field { display: flex; flex-direction: column; gap: 7px; }

.field label {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-display);
  font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-secondary);
}
.req-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}
.opt-tag {
  font-weight: 400; text-transform: none; letter-spacing: 0;
  font-size: 0.62rem; color: var(--text-muted);
}

.field input {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-body); font-size: 0.9rem;
  padding: 12px 15px; outline: none; width: 100%;
  transition: border-color var(--t), background var(--t), box-shadow var(--t);
}
.field input::placeholder { color: var(--text-muted); font-size: 0.85rem; }
.field input:hover { border-color: var(--border-accent); background: var(--bg-input-focus); }
.field input:focus { border-color: var(--accent); background: var(--bg-input-focus); box-shadow: 0 0 0 3px rgba(160,100,255,0.1); }
.field input:disabled { opacity: 0.4; cursor: not-allowed; }

.field-error {
  font-family: var(--font-display);
  font-size: 0.65rem; font-weight: 600;
  color: var(--danger);
  display: flex; align-items: center; gap: 5px;
  letter-spacing: 0.04em;
}

/* ─── FILE ZONE ─── */
.file-zone {
  border: 1px dashed rgba(160,100,255,0.2);
  border-radius: var(--radius-md);
  padding: 28px 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; cursor: pointer;
  transition: all var(--t); text-align: center;
  min-height: 120px; background: var(--bg-surface);
  position: relative; overflow: hidden;
}
.file-zone::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(160,100,255,0.04) 0%, transparent 70%);
  opacity: 0; transition: opacity var(--t);
}
.file-zone:hover, .file-zone.drag-over {
  border-color: var(--accent);
  background: rgba(160,100,255,0.05);
}
.file-zone:hover::before, .file-zone.drag-over::before { opacity: 1; }

.file-zone-icon { color: #444; transition: color var(--t); }
.file-zone:hover .file-zone-icon { color: var(--accent-light); }

.file-zone-text {
  font-family: var(--font-display);
  font-size: 0.8rem; font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
}
.file-zone-sub {
  font-size: 0.68rem;
  color: var(--text-muted);
  font-family: var(--font-body);
}

.file-selected { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.file-name {
  font-family: var(--font-display);
  font-size: 0.82rem; font-weight: 600;
  color: var(--text-primary);
  max-width: 240px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.file-size {
  font-size: 0.65rem; color: var(--accent-light);
  font-family: var(--font-body);
  letter-spacing: 0.06em;
}

/* ─── PROGRESS ─── */
.progress-wrap { margin-top: 4px; }
.progress-label {
  display: flex; justify-content: space-between;
  font-family: var(--font-display);
  font-size: 0.65rem; font-weight: 600;
  color: var(--text-muted); margin-bottom: 7px;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.progress-track {
  height: 3px;
  background: rgba(160,100,255,0.1);
  border-radius: 999px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #9b5de5, #b06ef3);
  border-radius: 999px;
  transition: width 0.15s ease;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 30px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
  animation: shimmer 1s ease infinite;
}
@keyframes shimmer { 0%,100%{opacity:0;} 50%{opacity:1;} }

/* ─── BANNERS ─── */
.success-banner {
  grid-column: 1 / -1;
  background: rgba(74,222,128,0.05);
  border: 1px solid rgba(74,222,128,0.18);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
}
.success-text {
  font-family: var(--font-display);
  font-size: 0.82rem; font-weight: 700;
  color: var(--success); letter-spacing: 0.03em;
}
.success-sub {
  font-size: 0.67rem; color: rgba(74,222,128,0.5);
  margin-top: 2px; font-family: var(--font-body);
}

.error-banner {
  grid-column: 1 / -1;
  background: rgba(248,113,113,0.05);
  border: 1px solid rgba(248,113,113,0.18);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-size: 0.78rem; color: var(--danger);
  font-family: var(--font-body); line-height: 1.5;
  display: flex; align-items: flex-start; gap: 8px;
}

/* ─── UPLOAD BUTTON ─── */
.upload-btn {
  grid-column: 1 / -1;
  margin-top: 4px;
  background: linear-gradient(135deg, #9b5de5 0%, #7c3aed 50%, #6d28d9 100%);
  color: white; border: none;
  border-radius: var(--radius-md);
  padding: 14px 24px;
  font-family: var(--font-display);
  font-size: 0.82rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer;
  transition: transform var(--t), box-shadow var(--t), filter var(--t);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(124,58,237,0.35);
  position: relative; overflow: hidden;
}
.upload-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  opacity: 0; transition: opacity var(--t);
}
.upload-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(124,58,237,0.5);
  filter: brightness(1.08);
}
.upload-btn:hover:not(:disabled)::before { opacity: 1; }
.upload-btn:active:not(:disabled) { transform: translateY(0); }
.upload-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ─── ADD TRACK BUTTON ─── */
.add-track-btn {
  width: 100%;
  background: transparent;
  border: 1px dashed rgba(160,100,255,0.2);
  color: var(--text-muted);
  border-radius: var(--radius-lg);
  padding: 1rem;
  font-family: var(--font-display);
  font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; transition: all var(--t);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-bottom: 16px;
}
.add-track-btn:hover {
  border-color: rgba(160,100,255,0.4);
  color: var(--accent-bright);
  background: rgba(160,100,255,0.05);
}

/* ─── FOOTER NOTE ─── */
.footer-note {
  display: flex; align-items: center; justify-content: center; gap: 22px;
  padding-top: 22px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
  margin-top: 4px;
}
.footer-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.68rem; color: var(--text-muted);
  letter-spacing: 0.04em;
}
.footer-item svg { color: var(--accent); opacity: 0.6; }

/* ─── SPINNER ─── */
.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}

input[type="file"] { display: none; }

@media (max-width: 380px) {
  .wrapper { padding-bottom: 60px; }
  .main, .page-header { padding-left: 1rem; padding-right: 1rem; }
  .header { padding: 0 1rem; }
}

/* ─── HIDE SMALL TEXTS ─── */
.section-desc,
.page-sub,
.cover-info-sub,
.file-zone-sub,
.footer-note,
.success-sub,
.opt-tag { display: none !important; }
</style>
</head>
<body>

<!-- BACKGROUND SCENE -->
<div class="bg-scene">
  <div class="bg-mesh"></div>
  <div class="bg-beam"></div>
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

const SUPABASE_URL = 'https://uaylyvdheqaxvsidkaxu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6RTU8FDXWed6qs0Oh-F0GA_6Tb3U4RL';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let idCounter = 0;
const uid = () => `track-${++idCounter}-${Date.now()}`;
const formatBytes = (b) => {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(1) + ' MB';
};
const createTrack = () => ({
  id: uid(), artistName: '', releaseTitle: '', featuringArtist: '',
  mp3File: null, progress: 0, status: 'idle', errorMsg: '', errors: {},
});

/* ── ICONS ── */
const Ico = ({ d, size=16, color='currentColor', fill='none', sw=2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color}
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    {typeof d === 'string' ? <path d={d}/> : d}
  </svg>
);

const IcoMusic = ({size=22,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
  </svg>

/* ── GLOBAL COVER ART ── */
function GlobalCoverArt({ coverPreview, onCoverSelect }) {
  const inputRef = useRef();
  return (
    <div className="card" style={{animationDelay:'0.08s'}}>
      <div className="section-head">
        <div className="section-icon">
          <IcoImage size={15} color="var(--accent-light)" />
        </div>
        <div>
          <div className="section-title">Cover Art</div>
          <div className="section-desc">Applies to all tracks on this release</div>
        </div>
      </div>
      <div className="cover-row">
        <div className="cover-thumb" onClick={() => inputRef.current.click()}>
          {coverPreview
            ? <img src={coverPreview} alt="Cover" />
            : <div className="cover-placeholder">
                <IcoMusic size={24} color="#2a2a2a" />
                <div className="cover-placeholder-text">Cover</div>
              </div>
          }
          <div className="cover-overlay">
            <IcoEdit size={13} color="white" />
            <div className="cover-overlay-text">Change</div>
          </div>
        </div>
        <div className="cover-info">
          <div className="cover-info-title">Release Cover</div>
          <div className="cover-info-sub">
            3000 × 3000 px recommended · JPG or PNG<br/>
            Square format · min 1400 × 1400 px
          </div>
          <button className="cover-upload-btn" onClick={() => inputRef.current.click()}>
            <IcoImage size={12} />
            {coverPreview ? 'Change Image' : 'Upload Image'}
          </button>
          {coverPreview && (
            <div className="cover-set-badge">
              <IcoCheck size={12} color="var(--success)" /> Cover set
            </div>
          )}
        </div>
      </div>
      <input ref={inputRef} type="file" accept="image/*"
        onChange={e => e.target.files[0] && onCoverSelect(e.target.files[0])} />
    </div>
  );
}

/* ── FILE DROP ZONE ── */
function FileZone({ mp3File, onFileSelect, error, disabled }) {
  const inputRef = useRef();
  const [drag, setDrag] = useState(false);
  const handleDrop = (e) => {
    e.preventDefault(); setDrag(false);
    if (disabled) return;
    const f = e.dataTransfer.files[0];
    if (f) onFileSelect(f);
  };
  return (
    <div className="field col-full">
      <label>
        <IcoHeadphones size={11} color="currentColor" />
        MP3 File <div className="req-dot" title="Required"></div>
      </label>
      <div
        className={`file-zone${drag ? ' drag-over' : ''}`}
        onClick={() => !disabled && inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); !disabled && setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={handleDrop}
      >
        {mp3File ? (
          <div className="file-selected">
            <IcoHeadphones size={28} color="var(--accent-light)" />
            <div className="file-name">{mp3File.name}</div>
            <div className="file-size">{formatBytes(mp3File.size)}</div>
          </div>
        ) : (
          <>
            <div className="file-zone-icon"><IcoUpload size={28} /></div>
            <div className="file-zone-text">Drop your MP3 here or click to browse</div>
            <div className="file-zone-sub">MP3 only · max 10 MB per track</div>
          </>
        )}
      </div>
      {error && <div className="field-error"><IcoAlert size={12} color="var(--danger)" /> {error}</div>}
      <input ref={inputRef} type="file" accept=".mp3,audio/mpeg"
        onChange={e => e.target.files[0] && onFileSelect(e.target.files[0])} />
    </div>
  );
}

/* ── TRACK CARD ── */
function TrackCard({ track, index, onUpdate, onRemove, canRemove, coverFile }) {
  const disabled = track.status === 'uploading' || track.status === 'success';
  const set = (field, value) => onUpdate(track.id, { [field]: value });

  const validateFile = (file) => {
    if (!file.type.includes('mp3') && !file.name.toLowerCase().endsWith('.mp3'))
      return 'Only MP3 files are accepted.';
    if (file.size > 10 * 1024 * 1024) return 'File exceeds the 10 MB limit.';
    return null;
  };

  const handleFileSelect = (file) => {
    const err = validateFile(file);
    if (err) onUpdate(track.id, { errors: { ...track.errors, mp3: err } });
    else onUpdate(track.id, { mp3File: file, errors: { ...track.errors, mp3: null } });
  };

  const validate = () => {
    const errs = {};
    if (!track.artistName.trim()) errs.artistName = 'Required';
    if (!track.releaseTitle.trim()) errs.releaseTitle = 'Required';
    if (!track.mp3File) errs.mp3 = 'Please select an MP3 file.';
    return errs;
  };

  const sendEmailNotification = async (fileUrl, coverUrl) => {
    try {
      const res = await fetch("https://formspree.io/f/mojbrkgn", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          _subject: `New Upload: ${track.releaseTitle} by ${track.artistName}`,
          _replyto: "noreply@444music.com",
          "Artist Name": track.artistName,
          "Release Title": track.releaseTitle,
          "Featuring Artist": track.featuringArtist || "None",
          "Download Link": fileUrl,
          "Cover Art Link": coverUrl || "No cover uploaded",
        }),
      });
      if (!res.ok) console.error("Formspree error:", await res.text());
    } catch (e) {
      console.warn("Email notification failed:", e);
    }
  };

  const handleUpload = async () => {
    const errs = validate();
    if (Object.keys(errs).length > 0) { onUpdate(track.id, { errors: errs }); return; }
    onUpdate(track.id, { status: 'uploading', progress: 0, errorMsg: '', errors: {} });

    try {
      const mp3Ext = track.mp3File.name.split('.').pop();
      const mp3Path = `tracks/${Date.now()}_${Math.random().toString(36).slice(2)}.${mp3Ext}`;

      let simulatedProgress = 0;
      const progressInterval = setInterval(() => {
        simulatedProgress = Math.min(simulatedProgress + Math.random() * 18 + 5, 82);
        onUpdate(track.id, { progress: Math.round(simulatedProgress) });
      }, 120);

      const { error: mp3Err } = await supabase.storage
        .from('music-uploads')
        .upload(mp3Path, track.mp3File, { contentType: 'audio/mpeg', upsert: false });

      clearInterval(progressInterval);
      if (mp3Err) throw new Error(mp3Err.message);
      onUpdate(track.id, { progress: 90 });

      const { data: { publicUrl: fileUrl } } = supabase.storage
        .from('music-uploads').getPublicUrl(mp3Path);

      let coverUrl = null;
      if (coverFile) {
        const covExt = coverFile.name.split('.').pop();
        const covPath = `covers/${Date.now()}_${Math.random().toString(36).slice(2)}.${covExt}`;
        const { error: covErr } = await supabase.storage
          .from('music-uploads').upload(covPath, coverFile, { upsert: false });
        if (!covErr) {
          const { data: { publicUrl } } = supabase.storage
            .from('music-uploads').getPublicUrl(covPath);
          coverUrl = publicUrl;
        }
      }

      onUpdate(track.id, { progress: 95 });

      const { error: dbErr } = await supabase.from('tracks').insert({
        artist_name:     track.artistName.trim(),
        release_title:   track.releaseTitle.trim(),
        featuring_artist: track.featuringArtist.trim() || null,
        file_url:  fileUrl,
        cover_url: coverUrl,
      });

      if (dbErr) throw new Error(dbErr.message);
      await sendEmailNotification(fileUrl, coverUrl);
      onUpdate(track.id, { progress: 100, status: 'success' });
      setTimeout(() => { window.location.href = 'averagee.html'; }, 1500);

    } catch (err) {
      onUpdate(track.id, {
        status: 'error',
        errorMsg: err.message || 'Upload failed. Please try again.',
        progress: 0
      });
    }
  };

  return (
    <div className="card" style={{animationDelay: `${0.12 + index * 0.06}s`}}>
      <div className="card-header">
        <span className="track-badge">Track {String(index + 1).padStart(2, '0')}</span>
        {canRemove && track.status !== 'uploading' && (
          <button className="remove-btn" onClick={() => onRemove(track.id)} title="Remove track">
            <IcoX size={11} />
          </button>
        )}
      </div>

      <div className="section-head" style={{marginBottom:'20px'}}>
        <div className="section-icon">
          <IcoHeadphones size={15} color="var(--accent-light)" />
        </div>
        <div>
          <div className="section-title">Track Details</div>
          <div className="section-desc">Artist name, release title and audio file</div>
        </div>
      </div>

      <div className="grid">
        <div className="field">
          <label>Artist Name <div className="req-dot"></div></label>
          <input type="text" placeholder="e.g. Burna Boy" value={track.artistName}
            disabled={disabled} onChange={e => set('artistName', e.target.value)} />
          {track.errors.artistName && (
            <div className="field-error"><IcoAlert size={12} color="var(--danger)" /> {track.errors.artistName}</div>
          )}
        </div>

        <div className="field">
          <label>Release Title <div className="req-dot"></div></label>
          <input type="text" placeholder="e.g. Abundance" value={track.releaseTitle}
            disabled={disabled} onChange={e => set('releaseTitle', e.target.value)} />
          {track.errors.releaseTitle && (
            <div className="field-error"><IcoAlert size={12} color="var(--danger)" /> {track.errors.releaseTitle}</div>
          )}
        </div>

        <div className="field col-full">
          <label>Featuring Artist <span className="opt-tag">— optional</span></label>
          <input type="text" placeholder="Leave blank if none"
            value={track.featuringArtist} disabled={disabled}
            onChange={e => set('featuringArtist', e.target.value)} />
        </div>

        <FileZone mp3File={track.mp3File} onFileSelect={handleFileSelect}
          error={track.errors.mp3} disabled={disabled} />

        {(track.status === 'uploading' || track.status === 'success') && (
          <div className="progress-wrap col-full">
            <div className="progress-label">
              <span>{track.status === 'success' ? 'Complete' : 'Uploading'}</span>
              <span>{track.progress}%</span>
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{ width: `${track.progress}%` }} />
            </div>
          </div>
        )}

        {track.status === 'error' && track.errorMsg && (
          <div className="error-banner">
            <IcoAlert size={13} color="var(--danger)" />
            <span>{track.errorMsg}</span>
          </div>
        )}

        {track.status === 'success' && (
          <div className="success-banner">
            <IcoCheck size={18} color="var(--success)" />
            <div>
              <div className="success-text">Upload complete</div>
              <div className="success-sub">Redirecting to your dashboard…</div>
            </div>
          </div>
        )}

        {track.status !== 'success' && (
          <button className="upload-btn" onClick={handleUpload} disabled={disabled}>
            {track.status === 'uploading'
              ? <><div className="spinner" /> Uploading — {track.progress}%</>
              : <><IcoArrowRight size={15} /> Upload Track</>
            }
          </button>
        )}
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [tracks, setTracks] = useState([createTrack()]);
  const [coverFile, setCoverFile] = useState(null);
  const [coverPreview, setCoverPreview] = useState(null);

  const updateTrack = useCallback((id, patch) => {
    setTracks(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t));
  }, []);

  const removeTrack = useCallback((id) => {
    setTracks(prev => prev.filter(t => t.id !== id));
  }, []);

  const addTrack = () => setTracks(prev => [...prev, createTrack()]);

  const handleCoverSelect = (file) => {
    setCoverFile(file);
    setCoverPreview(URL.createObjectURL(file));
  };

  return (
    <div className="wrapper">

      {/* HEADER */}
      <header className="header">
        <div className="logo">
          <div className="logo-mark">444</div>
          MusicDistro
        </div>
        <div className="header-badge">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
          </svg>
          Secure Portal
        </div>
      </header>

      {/* PAGE TITLE */}
      <div className="page-header">
        <h1 className="page-title">Upload Your <span>Music</span></h1>
        <p className="page-sub">
          Distribute to 150+ platforms
          <span className="page-sub-dot"></span>
          Release in 24–48 hrs
          <span className="page-sub-dot"></span>
          Keep 100% royalties
        </p>
      </div>

      {/* CONTENT */}
      <div className="main">
        <GlobalCoverArt coverPreview={coverPreview} onCoverSelect={handleCoverSelect} />

        {tracks.map((track, i) => (
          <TrackCard
            key={track.id} track={track} index={i}
            onUpdate={updateTrack} onRemove={removeTrack}
            canRemove={tracks.length > 1}
            coverFile={coverFile}
          />
        ))}

        <button className="add-track-btn" onClick={addTrack}>
          <IcoPlus size={13} /> Add Another Track
        </button>

        <div className="footer-note">
          <div className="footer-item"><IcoLock /><span>256-bit SSL Encrypted</span></div>
          <div className="footer-item"><IcoShield /><span>Stored on Supabase</span></div>
          <div className="footer-item"><IcoGlobe /><span>GDPR Compliant</span></div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
