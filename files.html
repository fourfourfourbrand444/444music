<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>444Music — Upload Release</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #060608;
  --bg1:       #0a0a0f;
  --bg2:       #0f0f16;
  --bg3:       #141420;
  --bg4:       #1a1a28;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.10);
  --border3:   rgba(255,255,255,0.16);
  --accent:    #7c5cbf;
  --accent2:   #9b7de0;
  --accent3:   #c4a8ff;
  --gold:      #e8b84b;
  --gold2:     #f5d080;
  --green:     #3dd68c;
  --red:       #f06464;
  --text:      #f0f0f0;
  --text2:     #a0a0b8;
  --text3:     #606080;
  --r:         12px;
  --r2:        18px;
  --r3:        24px;
  --t:         0.22s cubic-bezier(0.4,0,0.2,1);
  --font:      'Outfit', sans-serif;
  --mono:      'DM Mono', monospace;
}

html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* BG */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 40%,black 20%,transparent 100%)}
.bg-glow{position:absolute;top:-20%;left:30%;width:40%;height:60%;
  background:radial-gradient(ellipse,rgba(124,92,191,0.08) 0%,transparent 70%);
  filter:blur(40px)}

#root{position:relative;z-index:1}

.page{max-width:680px;margin:0 auto;padding:0 0 100px}

/* HEADER */
.hdr{height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:1px solid var(--border);
  background:rgba(6,6,8,0.9);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;margin-bottom:36px}
.hdr-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1rem;letter-spacing:0.04em}
.hdr-mark{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:900;color:#fff;letter-spacing:0;
  box-shadow:0 4px 14px rgba(124,92,191,0.4)}
.hdr-pill{display:flex;align-items:center;gap:6px;
  background:rgba(232,184,75,0.06);border:1px solid rgba(232,184,75,0.18);
  border-radius:999px;padding:4px 12px;
  font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold)}

/* PAGE TITLE */
.ptitle{padding:0 20px;margin-bottom:28px}
.ptitle h1{font-size:clamp(1.8rem,5vw,2.5rem);font-weight:900;letter-spacing:-0.04em;line-height:1.05;margin-bottom:6px}
.ptitle h1 em{font-style:normal;
  background:linear-gradient(135deg,var(--accent3),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ptitle p{font-size:0.82rem;color:var(--text2);letter-spacing:0.01em}

.main{padding:0 20px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);
  margin-bottom:12px;overflow:hidden;position:relative;
  transition:border-color var(--t),box-shadow var(--t)}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent2) 40%,var(--accent3) 60%,transparent)}

/* COVER CARD */
.cover-card{padding:24px}
.cover-sec-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;
  padding-bottom:16px;border-bottom:1px solid var(--border)}
.cover-sec-icon{width:32px;height:32px;border-radius:8px;
  background:rgba(124,92,191,0.08);border:1px solid rgba(124,92,191,0.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cover-sec-label{font-size:0.88rem;font-weight:700;letter-spacing:0.02em}
.cover-req{font-size:0.62rem;color:var(--red);font-weight:600;letter-spacing:0.08em;margin-top:2px;text-transform:uppercase}

.cover-body{display:flex;align-items:center;gap:20px}
.cover-thumb{position:relative;width:96px;height:96px;border-radius:12px;
  overflow:hidden;flex-shrink:0;cursor:pointer;
  border:2px dashed var(--border2);
  background:var(--bg3);transition:border-color var(--t),box-shadow var(--t)}
.cover-thumb:hover{border-color:var(--accent2);box-shadow:0 0 24px rgba(155,125,224,0.25)}
.cover-thumb.has-img{border-style:solid;border-color:var(--border3)}
.cover-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.cover-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.cover-ph-icon{width:28px;height:28px;opacity:0.2}
.cover-ph-text{font-size:0.5rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3)}
.cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  opacity:0;transition:opacity var(--t)}
.cover-thumb:hover .cover-overlay{opacity:1}
.cover-ov-text{font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#fff}

.cover-right{flex:1;min-width:0}
.cover-title{font-size:0.9rem;font-weight:700;margin-bottom:4px}
.cover-sub{font-size:0.72rem;color:var(--text3);line-height:1.6;margin-bottom:14px}
.cover-btn{display:inline-flex;align-items:center;gap:7px;
  background:transparent;border:1px solid var(--border2);color:var(--text);
  border-radius:999px;padding:7px 16px;
  font-family:var(--font);font-size:0.7rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;transition:all var(--t)}
.cover-btn:hover{border-color:var(--accent2);color:var(--accent3);background:rgba(155,125,224,0.06)}
.cover-set{display:flex;align-items:center;gap:5px;margin-top:10px;
  font-size:0.65rem;font-weight:600;color:var(--green);letter-spacing:0.06em}
.cover-err{display:flex;align-items:center;gap:5px;margin-top:8px;
  font-size:0.65rem;font-weight:600;color:var(--red);letter-spacing:0.04em}

/* TRACKLIST */
.tracklist-head{display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;margin-bottom:10px}
.tracklist-label{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3)}
.tracklist-count{font-size:0.7rem;font-weight:600;color:var(--accent2)}

/* TRACK ROW (collapsed) */
.track-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  margin-bottom:8px;overflow:hidden;position:relative;
  transition:border-color var(--t)}
.track-row.expanded{border-color:var(--border3);box-shadow:0 8px 40px rgba(0,0,0,0.4)}
.track-row.done{border-color:rgba(61,214,140,0.25)}
.track-row.has-err{border-color:rgba(240,100,100,0.3)}

.track-collapsed{display:flex;align-items:center;gap:14px;
  padding:14px 16px;cursor:pointer;user-select:none;
  transition:background var(--t)}
.track-collapsed:hover{background:rgba(255,255,255,0.02)}

.track-num{width:28px;height:28px;border-radius:8px;flex-shrink:0;
  background:rgba(124,92,191,0.08);border:1px solid rgba(124,92,191,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:800;color:var(--accent2);font-family:var(--mono)}
.track-num.done{background:rgba(61,214,140,0.08);border-color:rgba(61,214,140,0.25);color:var(--green)}
.track-num.has-err{background:rgba(240,100,100,0.08);border-color:rgba(240,100,100,0.25);color:var(--red)}

.track-info{flex:1;min-width:0}
.track-name{font-size:0.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-name.placeholder{color:var(--text3);font-weight:500}
.track-meta{font-size:0.68rem;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.track-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.track-status-dot{width:7px;height:7px;border-radius:50%;background:var(--border2)}
.track-status-dot.done{background:var(--green)}
.track-status-dot.has-err{background:var(--red)}
.track-status-dot.uploading{background:var(--accent2);animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

.chevron{transition:transform var(--t);color:var(--text3)}
.chevron.open{transform:rotate(180deg)}

.remove-x{width:24px;height:24px;border-radius:6px;
  background:rgba(240,100,100,0.05);border:1px solid rgba(240,100,100,0.12);
  color:rgba(240,100,100,0.4);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);flex-shrink:0}
.remove-x:hover{background:rgba(240,100,100,0.12);border-color:rgba(240,100,100,0.35);color:var(--red)}

/* TRACK EXPANDED FORM */
.track-form{padding:0 16px 18px;border-top:1px solid var(--border)}
.form-divider{height:1px;background:var(--border);margin:0 -16px 18px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col-full{grid-column:1/-1}
@media(max-width:480px){.grid{grid-template-columns:1fr}}

.field{display:flex;flex-direction:column;gap:6px}
.field label{display:flex;align-items:center;gap:5px;
  font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
.req{width:5px;height:5px;border-radius:50%;background:var(--accent2);flex-shrink:0}
.field input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-family:var(--font);font-size:0.88rem;
  padding:11px 13px;outline:none;width:100%;
  transition:border-color var(--t),background var(--t),box-shadow var(--t)}
.field input::placeholder{color:var(--text3);font-size:0.82rem}
.field input:hover{border-color:var(--border2);background:var(--bg4)}
.field input:focus{border-color:var(--accent);background:var(--bg4);box-shadow:0 0 0 3px rgba(124,92,191,0.12)}
.field input:disabled{opacity:0.4;cursor:not-allowed}
.ferr{font-size:0.62rem;font-weight:600;color:var(--red);display:flex;align-items:center;gap:4px}

/* FILE ZONE */
.file-zone{border:1px dashed rgba(124,92,191,0.22);border-radius:var(--r);
  padding:22px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:7px;cursor:pointer;text-align:center;min-height:110px;background:var(--bg1);
  transition:all var(--t);position:relative;overflow:hidden}
.file-zone:hover,.file-zone.drag{border-color:var(--accent2);background:rgba(124,92,191,0.04)}
.file-zone-icon{color:var(--text3);transition:color var(--t)}
.file-zone:hover .file-zone-icon,.file-zone.drag .file-zone-icon{color:var(--accent2)}
.file-zone-text{font-size:0.78rem;font-weight:600;color:var(--text2)}
.file-zone-sub{font-size:0.65rem;color:var(--text3)}
.file-sel{display:flex;flex-direction:column;align-items:center;gap:4px}
.file-name{font-size:0.8rem;font-weight:700;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:0.62rem;color:var(--accent2);font-family:var(--mono)}

/* DONE BTN */
.done-btn{width:100%;margin-top:14px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border2);
  color:var(--text);border-radius:var(--r);padding:11px;
  font-family:var(--font);font-size:0.78rem;font-weight:700;letter-spacing:0.06em;
  cursor:pointer;transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:7px}
.done-btn:hover{border-color:var(--green);color:var(--green);background:rgba(61,214,140,0.05)}

/* ADD TRACK */
.add-track{width:100%;background:transparent;
  border:1px dashed rgba(124,92,191,0.18);color:var(--text3);
  border-radius:var(--r2);padding:14px;
  font-family:var(--font);font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all var(--t);
  display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px}
.add-track:hover{border-color:rgba(124,92,191,0.4);color:var(--accent3);background:rgba(124,92,191,0.04)}

/* PROGRESS */
.prog-wrap{margin-top:10px}
.prog-label{display:flex;justify-content:space-between;
  font-size:0.62rem;font-weight:600;color:var(--text3);margin-bottom:6px;
  letter-spacing:0.06em;text-transform:uppercase}
.prog-track{height:3px;background:rgba(124,92,191,0.12);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:999px;transition:width 0.15s ease;position:relative}
.prog-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:24px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35));
  animation:shimmer 1s ease infinite}
@keyframes shimmer{0%,100%{opacity:0}50%{opacity:1}}

/* UPLOAD ALL BTN */
.upload-all-wrap{margin-top:8px;margin-bottom:0}
.upload-all{width:100%;
  background:linear-gradient(135deg,var(--accent2) 0%,var(--accent) 50%,#5a3fa0 100%);
  color:#fff;border:none;border-radius:var(--r2);
  padding:16px 24px;
  font-family:var(--font);font-size:0.85rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:transform var(--t),box-shadow var(--t),filter var(--t);
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 28px rgba(124,92,191,0.4);position:relative;overflow:hidden}
.upload-all::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 60%);
  opacity:0;transition:opacity var(--t)}
.upload-all:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 36px rgba(124,92,191,0.55);filter:brightness(1.08)}
.upload-all:hover:not(:disabled)::before{opacity:1}
.upload-all:active:not(:disabled){transform:translateY(0)}
.upload-all:disabled{opacity:0.35;cursor:not-allowed}

/* BANNERS */
.success-banner{background:rgba(61,214,140,0.05);border:1px solid rgba(61,214,140,0.2);
  border-radius:var(--r);padding:14px 16px;
  display:flex;align-items:center;gap:12px;margin-top:12px}
.success-text{font-size:0.85rem;font-weight:700;color:var(--green)}
.success-sub{font-size:0.68rem;color:rgba(61,214,140,0.5);margin-top:2px}
.err-banner{background:rgba(240,100,100,0.05);border:1px solid rgba(240,100,100,0.2);
  border-radius:var(--r);padding:12px 14px;
  display:flex;align-items:flex-start;gap:8px;
  font-size:0.75rem;color:var(--red);line-height:1.5;margin-top:10px}

/* GLOBAL PROGRESS */
.global-prog{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);
  padding:20px;margin-bottom:12px}
.gp-title{font-size:0.88rem;font-weight:700;margin-bottom:4px}
.gp-sub{font-size:0.72rem;color:var(--text2);margin-bottom:16px}
.gp-track-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.gp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gp-dot.idle{background:var(--border2)}
.gp-dot.uploading{background:var(--accent2);animation:pulse 1s ease infinite}
.gp-dot.done{background:var(--green)}
.gp-dot.error{background:var(--red)}
.gp-name{font-size:0.78rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gp-pct{font-size:0.68rem;color:var(--text3);font-family:var(--mono);flex-shrink:0}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);
  border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

input[type="file"]{display:none}

@media(max-width:380px){
  .main,.ptitle{padding-left:14px;padding-right:14px}
  .hdr{padding:0 14px}
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const SUPABASE_URL = 'https://uaylyvdheqaxvsidkaxu.supabase.co';

const IcoMusic  = ({s=24}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;
const IcoEdit   = ({s=12}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
const IcoUp     = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
const IcoHead   = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>;

/* ── COVER ART CARD ── */
function CoverCard({ preview, onSelect, error }) {
  const ref = useRef();
  return (
    <div className="card cover-card">
      <div className="cover-sec-head">
        <div className="cover-sec-icon"><IcoImg s={15} /></div>
        <div>
          <div className="cover-sec-label">Release Cover Art</div>
          <div className="cover-req">★ Required for all releases</div>
        </div>
      </div>
      <div className="cover-body">
        <div className={`cover-thumb${preview?' has-img':''}`} onClick={()=>ref.current.click()}>
          {preview
            ? <img src={preview} alt="Cover"/>
            : <div className="cover-ph">
                <svg className="cover-ph-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <div className="cover-ph-text">No Cover</div>
              </div>
          }
          <div className="cover-overlay">
            <IcoEdit s={14}/>
            <div className="cover-ov-text">{preview?'Change':'Upload'}</div>
          </div>
        </div>
        <div className="cover-right">
          <div className="cover-title">Album / Single Cover</div>
          <div className="cover-sub">3000×3000 px · JPG or PNG · Square format<br/>Min 1400×1400 px for store approval</div>
          <button className="cover-btn" onClick={()=>ref.current.click()}>
            <IcoImg s={12}/> {preview?'Change Image':'Upload Image'}
          </button>
          {preview && <div className="cover-set"><IcoCheck s={12} c="var(--green)"/> Cover art set</div>}
          {error && <div className="cover-err"><IcoAlert s={12}/> {error}</div>}
        </div>
      </div>
      <input ref={ref} type="file" accept="image/*" onChange={e=>e.target.files[0]&&onSelect(e.target.files[0])}/>
    </div>
  );
}

/* ── FILE ZONE ── */
function FileZone({ file, onSelect, error, disabled }) {
  const ref = useRef();
  const [drag, setDrag] = useState(false);
  const drop = e => { e.preventDefault(); setDrag(false); if(!disabled&&e.dataTransfer.files[0]) onSelect(e.dataTransfer.files[0]); };
  return (
    <div className="field col-full">
      <label><IcoHead s={11}/> Audio File <div className="req"/></label>
      <div className={`file-zone${drag?' drag':''}`}
        onClick={()=>!disabled&&ref.current.click()}
        onDragOver={e=>{e.preventDefault();!disabled&&setDrag(true)}}
        onDragLeave={()=>setDrag(false)} onDrop={drop}>
        {file ? (
          <div className="file-sel">
            <IcoHead s={26}/>
            <div className="file-name">{file.name}</div>
            <div className="file-size">{fmtBytes(file.size)}</div>
          </div>
        ) : (
          <>
            <div className="file-zone-icon"><IcoUp s={26}/></div>
            <div className="file-zone-text">Drop MP3 here or tap to browse</div>
            <div className="file-zone-sub">MP3 only · max 50 MB</div>
          </>
        )}
      </div>
      {error && <div className="ferr"><IcoAlert s={11}/> {error}</div>}
      <input ref={ref} type="file" accept=".mp3,audio/mpeg" onChange={e=>e.target.files[0]&&onSelect(e.target.files[0])}/>
    </div>
  );
}

/* ── SINGLE TRACK ROW ── */
function TrackRow({ track, index, expanded, onToggle, onUpdate, onRemove, canRemove, uploading }) {
  const disabled = uploading || track.status==='success';
  const set = (f,v) => onUpdate(track.id,{[f]:v});

  const validateFile = f => {
    if(!f.type.includes('mp3')&&!f.name.toLowerCase().endsWith('.mp3')) return 'Only MP3 files accepted.';
    if(f.size > 50*1024*1024) return 'File exceeds 50 MB limit.';
    return null;
  };
  const handleFile = f => {
    const e = validateFile(f);
    if(e) onUpdate(track.id,{errors:{...track.errors,mp3:e}});
    else onUpdate(track.id,{mp3File:f,errors:{...track.errors,mp3:null}});
  };

  const isDone    = track.status==='success';
  const hasErr    = Object.values(track.errors).some(Boolean)||track.errorMsg;
  const isUploading = track.status==='uploading';

  const numClass  = isDone?'done':hasErr?'has-err':'';
  const rowClass  = `track-row${expanded?' expanded':''}${isDone?' done':''}${hasErr?' has-err':''}`;
  const dotClass  = `track-status-dot${isDone?' done':isUploading?' uploading':hasErr?' has-err':''}`;

  const displayName = track.releaseTitle.trim()||track.artistName.trim()||`Track ${index+1}`;
  const displayMeta = [
    track.artistName.trim()&&track.artistName,
    track.mp3File&&track.mp3File.name,
  ].filter(Boolean).join(' · ') || 'Tap to add details';

  return (
    <div className={rowClass}>
      {/* COLLAPSED ROW */}
      <div className="track-collapsed" onClick={onToggle}>
        <div className={`track-num${numClass?' '+numClass:''}`}>
          {isDone ? <IcoCheck s={13} c="var(--green)"/> : String(index+1).padStart(2,'0')}
        </div>
        <div className="track-info">
          <div className={`track-name${!track.releaseTitle&&!track.artistName?' placeholder':''}`}>{displayName}</div>
          <div className="track-meta">{displayMeta}</div>
        </div>
        <div className="track-actions">
          {(isUploading||isDone) && (
            <div style={{display:'flex',alignItems:'center',gap:5}}>
              <div className={dotClass}/>
              {isUploading&&<span style={{fontSize:'0.65rem',color:'var(--accent2)',fontFamily:'var(--mono)'}}>{track.progress}%</span>}
            </div>
          )}
          {!isUploading&&!isDone&&<div className={dotClass}/>}
          {canRemove&&!disabled&&(
            <button className="remove-x" onClick={e=>{e.stopPropagation();onRemove(track.id)}} title="Remove">
              <IcoX s={10}/>
            </button>
          )}
          <div className={`chevron${expanded?' open':''}`}><IcoChev s={14}/></div>
        </div>
      </div>

      {/* EXPANDED FORM */}
      {expanded && (
        <div className="track-form">
          <div className="form-divider"/>
          <div className="grid">
            <div className="field">
              <label>Artist Name <div className="req"/></label>
              <input type="text" placeholder="e.g. Burna Boy" value={track.artistName}
                disabled={disabled} onChange={e=>set('artistName',e.target.value)}/>
              {track.errors.artistName&&<div className="ferr"><IcoAlert s={11}/> {track.errors.artistName}</div>}
            </div>
            <div className="field">
              <label>Track Title <div className="req"/></label>
              <input type="text" placeholder="e.g. Abundance" value={track.releaseTitle}
                disabled={disabled} onChange={e=>set('releaseTitle',e.target.value)}/>
              {track.errors.releaseTitle&&<div className="ferr"><IcoAlert s={11}/> {track.errors.releaseTitle}</div>}
            </div>
            <div className="field col-full">
              <label>Featuring <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,fontSize:'0.62rem',color:'var(--text3)'}}>— optional</span></label>
              <input type="text" placeholder="Leave blank if none" value={track.featuring}
                disabled={disabled} onChange={e=>set('featuring',e.target.value)}/>
            </div>
            <FileZone file={track.mp3File} onSelect={handleFile} error={track.errors.mp3} disabled={disabled}/>
            {isDone&&(
              <div className="success-banner col-full" style={{gridColumn:'1/-1',marginTop:0}}>
                <IcoCheck s={18} c="var(--green)"/>
                <div><div className="success-text">Track uploaded ✓</div></div>
              </div>
            )}
            {track.errorMsg&&(
              <div className="err-banner" style={{gridColumn:'1/-1',marginTop:0}}>
                <IcoAlert s={13}/><span>{track.errorMsg}</span>
              </div>
            )}
          </div>
          {!isDone&&(
            <button className="done-btn" onClick={onToggle}>
              <IcoCheck s={14} c="currentColor"/> Done — Collapse
            </button>
          )}
        </div>
      )}

      {/* PROGRESS BAR (always visible when uploading) */}
      {isUploading&&(
        <div style={{padding:'0 16px 14px'}}>
          <div className="prog-wrap">
            <div className="prog-label"><span>Uploading</span><span>{track.progress}%</span></div>
            <div className="prog-track"><div className="prog-fill" style={{width:`${track.progress}%`}}/></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── APP ── */
function App() {
  const [tracks, setTracks]       = useState([mkTrack()]);
  const [coverFile, setCoverFile] = useState(null);
  const [coverPrev, setCoverPrev] = useState(null);
  const [coverErr, setCoverErr]   = useState('');
  const [expanded, setExpanded]   = useState(new Set([''])); // store ids
  const [uploading, setUploading] = useState(false);
  const [allDone, setAllDone]     = useState(false);
  const [globalErr, setGlobalErr] = useState('');

  // auto-expand first track on mount
  useEffect(()=>{
    if(tracks.length>0) setExpanded(new Set([tracks[0].id]));
  },[]);

  const update = useCallback((id,patch) => {
    setTracks(p=>p.map(t=>t.id===id?{...t,...patch}:t));
  },[]);

  const remove = useCallback(id => {
    setTracks(p=>p.filter(t=>t.id!==id));
    setExpanded(p=>{const s=new Set(p);s.delete(id);return s});
  },[]);

  const addTrack = () => {
    const t = mkTrack();
    setTracks(p=>[...p,t]);
    setExpanded(p=>new Set([...p,t.id]));
  };

  const toggleExpand = id => {
    setExpanded(p=>{
      const s=new Set(p);
      if(s.has(id)) s.delete(id); else s.add(id);
      return s;
    });
  };

  const handleCover = f => {
    setCoverFile(f);
    setCoverPrev(URL.createObjectURL(f));
    setCoverErr('');
  };

  const validateAll = () => {
    let valid = true;
    if(!coverFile){ setCoverErr('Cover art is required before uploading.'); valid=false; }
    else setCoverErr('');

    const updated = tracks.map(t=>{
      const errs={};
      if(!t.artistName.trim()) errs.artistName='Required';
      if(!t.releaseTitle.trim()) errs.releaseTitle='Required';
      if(!t.mp3File) errs.mp3='Please select an MP3 file.';
      if(Object.keys(errs).length>0){ valid=false; return {...t,errors:errs}; }
      return t;
    });
    setTracks(updated);
    // expand tracks with errors
    const errIds = updated.filter(t=>Object.keys(t.errors).length>0).map(t=>t.id);
    if(errIds.length>0) setExpanded(p=>new Set([...p,...errIds]));
    return valid;
  };

  const sendEmail = async (trackData, fileUrl, coverUrl) => {
    try {
      await fetch("https://formspree.io/f/mojbrkgn",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          _subject:`New Upload: ${trackData.releaseTitle} by ${trackData.artistName}`,
          "Artist Name":trackData.artistName,
          "Release Title":trackData.releaseTitle,
          "Featuring":trackData.featuring||"None",
          "Download Link":fileUrl,
          "Cover Art Link":coverUrl||"N/A",
        })
      });
    } catch(e){ console.warn('Email failed',e); }
  };

  const uploadAll = async () => {
    if(!validateAll()) return;
    setUploading(true);
    setGlobalErr('');

    // upload cover once
    let coverUrl = null;
    if(coverFile){
      const ext = coverFile.name.split('.').pop();
      const path = `covers/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {error:ce} = await supabase.storage.from('music-uploads').upload(path,coverFile,{upsert:false});
      if(!ce){
        const {data:{publicUrl}} = supabase.storage.from('music-uploads').getPublicUrl(path);
        coverUrl = publicUrl;
      }
    }

    let anyErr = false;

    for(const track of tracks){
      if(track.status==='success') continue;
      update(track.id,{status:'uploading',progress:0,errorMsg:'',errors:{}});

      try{
        const ext  = track.mp3File.name.split('.').pop();
        const path = `tracks/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

        // simulated progress
        let sim=0;
        const iv = setInterval(()=>{
          sim=Math.min(sim+Math.random()*15+5,80);
          update(track.id,{progress:Math.round(sim)});
        },120);

        const {error:me} = await supabase.storage.from('music-uploads')
          .upload(path,track.mp3File,{contentType:'audio/mpeg',upsert:false});
        clearInterval(iv);
        if(me) throw new Error(me.message);

        update(track.id,{progress:88});
        const {data:{publicUrl:fileUrl}} = supabase.storage.from('music-uploads').getPublicUrl(path);

        update(track.id,{progress:94});
        const {error:de} = await supabase.from('tracks').insert({
          artist_name:    track.artistName.trim(),
          release_title:  track.releaseTitle.trim(),
          featuring_artist: track.featuring.trim()||null,
          file_url:  fileUrl,
          cover_url: coverUrl,
        });
        if(de) throw new Error(de.message);

        await sendEmail(track,fileUrl,coverUrl);
        update(track.id,{progress:100,status:'success'});

      }catch(err){
        anyErr=true;
        update(track.id,{status:'error',errorMsg:err.message||'Upload failed. Try again.',progress:0});
      }
    }

    setUploading(false);
    if(!anyErr){
      setAllDone(true);
      setTimeout(()=>{ window.location.href='averagee.html'; },2000);
    } else {
      setGlobalErr('Some tracks failed. Check the errors above and try again.');
    }
  };

  const completedCount = tracks.filter(t=>t.status==='success').length;
  const totalCount     = tracks.length;

  return (
    <div className="page">
      {/* HEADER */}
      <header className="hdr">
        <div className="hdr-logo">
          <div className="hdr-mark">444</div>
          Music
        </div>
        <div className="hdr-pill">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
          </svg>
          Secure Upload
        </div>
      </header>

      {/* TITLE */}
      <div className="ptitle">
        <h1>Submit Your <em>Release</em></h1>
        <p>Upload singles, EPs or albums — all tracks sent together in one submission</p>
      </div>

      <div className="main">

        {/* COVER */}
        <CoverCard preview={coverPrev} onSelect={handleCover} error={coverErr}/>

        {/* TRACKLIST */}
        <div className="tracklist-head">
          <div className="tracklist-label">Tracklist</div>
          <div className="tracklist-count">{completedCount}/{totalCount} ready</div>
        </div>

        {tracks.map((track,i)=>(
          <TrackRow
            key={track.id} track={track} index={i}
            expanded={expanded.has(track.id)}
            onToggle={()=>toggleExpand(track.id)}
            onUpdate={update} onRemove={remove}
            canRemove={tracks.length>1}
            uploading={uploading}
          />
        ))}

        {/* ADD TRACK */}
        {!uploading&&!allDone&&(
          <button className="add-track" onClick={addTrack}>
            <IcoPlus s={13}/> Add Another Track
          </button>
        )}

        {/* GLOBAL PROGRESS WHEN UPLOADING */}
        {uploading&&(
          <div className="global-prog">
            <div className="gp-title">Uploading your release…</div>
            <div className="gp-sub">Please don't close this page</div>
            {tracks.map(t=>(
              <div className="gp-track-row" key={t.id}>
                <div className={`gp-dot${t.status==='success'?' done':t.status==='uploading'?' uploading':t.status==='error'?' error':''}`}/>
                <div className="gp-name">{t.releaseTitle||`Track`}</div>
                <div className="gp-pct">
                  {t.status==='success'?'✓ Done':t.status==='uploading'?`${t.progress}%`:t.status==='error'?'✗ Error':'Waiting'}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ALL DONE */}
        {allDone&&(
          <div className="success-banner" style={{marginBottom:16}}>
            <IcoCheck s={20} c="var(--green)"/>
            <div>
              <div className="success-text">All tracks uploaded successfully! 🎉</div>
              <div className="success-sub">Redirecting to your dashboard…</div>
            </div>
          </div>
        )}

        {/* GLOBAL ERROR */}
        {globalErr&&(
          <div className="err-banner" style={{marginBottom:12}}>
            <IcoAlert s={13}/><span>{globalErr}</span>
          </div>
        )}

        {/* SINGLE UPLOAD ALL BUTTON */}
        {!allDone&&(
          <div className="upload-all-wrap">
            <button className="upload-all" onClick={uploadAll} disabled={uploading}>
              {uploading
                ? <><div className="spinner"/> Uploading {completedCount}/{totalCount} tracks…</>
                : <><IcoUp s={18}/> Submit {totalCount} Track{totalCount>1?'s':''} to 444Music</>
              }
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
