<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>444Music — Upload Release</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════
   444Music — mirrors upload_screen.dart 1:1
   Fonts:  Bebas Neue  → headings / labels  (GoogleFonts.bebasNeue)
           Nunito      → body text          (GoogleFonts.nunito)
   Palette pulled directly from the Flutter constants.
   ════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --black:       #000000;
  --black1:      #0A0A0A;
  --black2:      #111111;
  --black3:      #1A1A1A;
  --black4:      #222222;
  --white:       #FFFFFF;
  --white70:     rgba(255,255,255,0.70);
  --white40:     rgba(255,255,255,0.40);
  --white20:     rgba(255,255,255,0.20);
  --white10:     rgba(255,255,255,0.10);
  --white06:     rgba(255,255,255,0.06);
  --grey:        #888888;
  --greyDark:    #444444;
  --green:       #22C55E;
  --greenDim:    rgba(34,197,94,0.12);
  --greenBorder: rgba(34,197,94,0.20);
  --red:         #EF4444;
  --redDim:      rgba(239,68,68,0.09);
  --redBorder:   rgba(239,68,68,0.20);
  --amber:       #F59E0B;
  --amberDim:    rgba(245,158,11,0.09);
  --amberBorder: rgba(245,158,11,0.20);
  --font-head: 'Bebas Neue', sans-serif;
  --font-body: 'Nunito', sans-serif;
}

html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--black);color:var(--white);min-height:100vh}

.app-shell{max-width:640px;margin:0 auto;min-height:100vh}

/* ── TOP BAR ─────────────────────────────────────────────────── */
.top-bar{
  position:sticky;top:0;z-index:200;background:var(--black);
  border-bottom:1px solid var(--white10);
}
.top-bar-inner{
  height:64px;display:flex;align-items:center;padding:0 22px;
  padding-top:env(safe-area-inset-top);
}
.back-btn{
  width:38px;height:38px;border-radius:12px;flex-shrink:0;
  background:var(--white06);border:1px solid var(--white10);
  display:flex;align-items:center;justify-content:center;color:var(--white);
  cursor:pointer;
}
.back-btn svg{width:16px;height:16px}
.top-bar-title{
  font-family:var(--font-head);font-size:20px;font-weight:400;letter-spacing:1.5px;
  margin-left:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.secure-badge{
  margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0;
  background:var(--white06);border:1px solid var(--white10);border-radius:99px;padding:5px 10px;
  font-size:10px;font-weight:600;color:var(--grey);
}
.secure-badge svg{width:10px;height:10px}

.step-track{display:flex;align-items:center;padding:14px 22px;gap:0;overflow-x:auto}
.step-item{display:flex;align-items:center;gap:8px;font-family:var(--font-head);font-size:15px;font-weight:400;letter-spacing:1px;color:var(--greyDark);flex-shrink:0}
.step-item.active{color:var(--white)}
.step-num{width:24px;height:24px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-family:var(--font-body);font-size:11px;font-weight:800;flex-shrink:0}
.step-item.active .step-num{background:var(--white);border-color:var(--white);color:var(--black)}
.step-connector{flex:1;height:1px;min-width:14px;max-width:60px;margin:0 8px;background:var(--white10)}

/* ── COVER (hero, matches _buildCoverSection) ───────────────── */
.cover-hero{
  position:relative;width:100%;height:320px;background:var(--black1);cursor:pointer;overflow:hidden;
}
@media(max-width:480px){.cover-hero{height:240px}}
.cover-hero img{width:100%;height:100%;object-fit:cover;display:block}
.cover-empty{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.cover-empty-icon{
  width:72px;height:72px;border-radius:18px;background:var(--black3);border:1px solid var(--white10);
  display:flex;align-items:center;justify-content:center;
}
.cover-empty-icon svg{width:32px;height:32px;color:var(--greyDark)}
.cover-empty-title{font-family:var(--font-head);font-size:18px;letter-spacing:1px;color:var(--grey);margin-top:16px}
.cover-empty-sub{font-size:12px;font-weight:500;color:var(--greyDark);margin-top:6px}
.cover-gradient{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.8) 100%);
  opacity:0;transition:opacity .15s;
}
.cover-hero.has-img .cover-gradient{opacity:1}
.cover-badge-top{
  position:absolute;top:16px;right:16px;
  padding:5px 10px;border-radius:99px;background:rgba(0,0,0,0.7);border:1px solid var(--white10);
  font-family:var(--font-body);font-size:9px;font-weight:800;letter-spacing:1.2px;color:var(--grey);
}
.cover-hero.has-img .cover-badge-top{color:var(--green)}
.cover-tags{position:absolute;bottom:16px;left:16px;right:16px;display:flex;align-items:center;opacity:0}
.cover-hero.has-img .cover-tags{opacity:1}
.pill-tag{
  display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:99px;
  background:rgba(0,0,0,0.6);border:1px solid var(--white20);font-size:11px;font-weight:600;
}
.pill-tag svg{width:12px;height:12px}
.cover-tags .pill-tag:first-child{color:var(--green)}
.cover-tags .pill-tag:last-child{margin-left:auto;color:var(--white70)}
.cover-err-float{
  position:absolute;bottom:60px;left:16px;padding:5px 10px;border-radius:8px;
  background:var(--redDim);border:1px solid var(--redBorder);font-size:11px;font-weight:600;color:var(--red);
  display:none;
}

/* ── CONTENT ─────────────────────────────────────────────────── */
.content{padding:32px 22px 0}
.tracklist-head{margin-bottom:14px}
.tracklist-title{font-family:var(--font-head);font-size:18px;font-weight:400;letter-spacing:2px;color:var(--greyDark)}
.tracklist-count{font-size:12px;font-weight:600;color:var(--grey);margin-top:2px}

/* ── TRACK ROW (collapsible, matches _buildTrackRow) ────────── */
.track-row{
  margin-bottom:10px;border-radius:16px;background:var(--black2);
  border:1px solid var(--white10);overflow:hidden;transition:border-color .15s;
}
.track-row.expanded{border-color:var(--white20)}
.track-row.done{border-color:var(--greenBorder)}
.track-row.has-err{border-color:var(--redBorder)}

.track-head{display:flex;align-items:center;padding:14px 16px;cursor:pointer}
.track-num{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;background:var(--white06);border:1px solid var(--white10);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--white70);
}
.track-num.done{background:var(--greenDim);border-color:var(--greenBorder);color:var(--green)}
.track-num.has-err{background:var(--redDim);border-color:var(--redBorder);color:var(--red)}
.track-num svg{width:16px;height:16px}
.track-meta{flex:1;min-width:0;margin-left:12px}
.track-name{font-size:14px;font-weight:700;color:var(--greyDark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-name.filled{color:var(--white)}
.track-sub{font-size:11px;font-weight:500;color:var(--greyDark);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-sub.uploading{color:var(--white70)}

.track-remove{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;background:var(--redDim);border:1px solid var(--redBorder);
  color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:8px;
}
.track-remove svg{width:13px;height:13px}

.status-dot{width:7px;height:7px;border-radius:50%;background:var(--white10);flex-shrink:0;margin-left:8px}
.status-dot.done{background:var(--green)}
.status-dot.err{background:var(--red)}
.status-dot.uploading{background:var(--white70);animation:pulse 0.9s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.75)}}

.chevron{width:20px;height:20px;flex-shrink:0;margin-left:8px;color:var(--greyDark);transition:transform .2s}
.track-row.expanded .chevron{transform:rotate(180deg)}

.track-progress{padding:0 16px 12px}
.track-progress .prog-label{display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:var(--grey);letter-spacing:.5px;margin-bottom:6px}
.track-progress .prog-track{height:3px;background:var(--white06);border-radius:99px;overflow:hidden}
.track-progress .prog-fill{height:100%;background:var(--white);border-radius:99px;transition:width .15s}

.track-body{padding:16px;border-top:1px solid var(--white10)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:420px){.grid2{grid-template-columns:1fr}}

.field{display:flex;flex-direction:column;gap:6px}
.field-label{display:flex;align-items:center;gap:4px;font-family:var(--font-head);font-size:13px;font-weight:400;letter-spacing:1.5px;color:var(--greyDark)}
.req-dot{width:5px;height:5px;border-radius:50%;background:var(--white40);flex-shrink:0}
.field input{
  background:var(--black3);border:1px solid var(--white10);border-radius:10px;color:var(--white);
  font-family:var(--font-body);font-size:13px;font-weight:600;padding:11px 13px;outline:none;width:100%;
  transition:border-color .15s;
}
.field input::placeholder{color:var(--greyDark);font-weight:400}
.field input:focus{border-color:var(--white40)}
.field input:disabled{background:var(--black3);border-color:var(--white06);opacity:0.55}
.field.has-err input{border-color:var(--redBorder)}
.ferr{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--red)}
.ferr svg{width:11px;height:11px;flex-shrink:0}

.mp3-zone-wrap{margin-top:14px}
.mp3-zone-head{display:flex;align-items:center;margin-bottom:6px}
.mp3-badge{
  margin-left:auto;display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;
  background:var(--amberDim);border:1px solid var(--amberBorder);font-family:var(--font-head);font-size:10px;
  letter-spacing:1px;color:var(--amber);
}
.mp3-badge svg{width:10px;height:10px}
.mp3-zone{
  border:1px solid var(--white10);border-radius:12px;background:var(--black3);padding:20px;cursor:pointer;transition:border-color .15s;
}
.mp3-zone.drag,.mp3-zone.has-file{border-color:var(--white20)}
.mp3-zone.has-err{border-color:var(--redBorder);border-width:1.5px}
.mp3-empty{display:flex;flex-direction:column;align-items:center;text-align:center}
.mp3-empty-icon{width:52px;height:52px;border-radius:14px;background:var(--black4);border:1px solid var(--white10);display:flex;align-items:center;justify-content:center}
.mp3-empty-icon svg{width:24px;height:24px;color:var(--greyDark)}
.mp3-empty-title{font-family:var(--font-head);font-size:16px;letter-spacing:1px;color:var(--grey);margin-top:12px}
.mp3-empty-sub{font-size:11px;font-weight:500;color:var(--greyDark);margin-top:4px}
.format-pills{display:flex;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.fpill{padding:3px 7px;border-radius:5px;font-size:9px;font-weight:700;border:1px solid var(--greyDark);color:var(--greyDark)}
.fpill.ok{background:var(--greenDim);border-color:var(--greenBorder);color:var(--green)}

.mp3-filled{display:flex;align-items:center}
.mp3-file-icon{width:40px;height:40px;border-radius:10px;background:var(--black4);border:1px solid var(--white10);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mp3-file-icon svg{width:18px;height:18px;color:var(--white70)}
.mp3-file-meta{flex:1;min-width:0;margin-left:12px}
.mp3-file-name{font-size:13px;font-weight:700;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mp3-file-size{font-size:11px;font-weight:500;color:var(--grey);margin-top:1px}
.mp3-swap{width:16px;height:16px;color:var(--greyDark);flex-shrink:0}

.err-banner{
  display:flex;align-items:flex-start;gap:8px;padding:12px 14px;border-radius:10px;
  background:var(--redDim);border:1px solid var(--redBorder);margin-top:12px;
}
.err-banner svg{width:16px;height:16px;color:var(--red);flex-shrink:0;margin-top:1px}
.err-banner span{font-size:12px;font-weight:600;color:var(--red);line-height:1.5}

.done-banner{display:flex;align-items:center;gap:8px;padding:12px;border-radius:10px;background:var(--greenDim);border:1px solid var(--greenBorder);margin-top:12px}
.done-banner svg{width:16px;height:16px;color:var(--green);flex-shrink:0}
.done-banner span{font-size:13px;font-weight:600;color:var(--green)}

.collapse-btn{
  width:100%;margin-top:14px;padding:12px;border-radius:10px;background:var(--white06);border:1px solid var(--white10);
  display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;
}
.collapse-btn svg{width:14px;height:14px;color:var(--grey)}
.collapse-btn span{font-size:12px;font-weight:700;color:var(--grey)}

/* ── ADD TRACK ───────────────────────────────────────────────── */
.add-track{
  width:100%;padding:14px;border-radius:14px;background:transparent;border:1px solid var(--white10);
  display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-bottom:24px;transition:all .12s;
}
.add-track:active{background:var(--white06);border-color:var(--white20)}
.add-track svg{width:16px;height:16px;color:var(--grey)}
.add-track span{font-family:var(--font-head);font-size:14px;letter-spacing:1.5px;color:var(--grey)}

/* ── GLOBAL UPLOAD PANEL ─────────────────────────────────────── */
.upload-panel{padding:18px;border-radius:16px;background:var(--black2);border:1px solid var(--white10);margin-bottom:20px;display:none}
.upload-panel-title{font-family:var(--font-head);font-size:20px;letter-spacing:1px}
.upload-panel-sub{font-size:12px;font-weight:500;color:var(--grey);margin-top:4px;margin-bottom:16px}
.up-row{display:flex;align-items:center;margin-bottom:8px}
.up-dot{width:7px;height:7px;border-radius:50%;background:var(--greyDark);flex-shrink:0}
.up-dot.uploading{background:var(--white70);animation:pulse 0.9s ease infinite}
.up-dot.done{background:var(--green)}
.up-dot.error{background:var(--red)}
.up-name{flex:1;min-width:0;margin-left:10px;font-size:13px;font-weight:600;color:var(--white70);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up-pct{font-size:12px;font-weight:700}

.success-banner{display:none;align-items:center;padding:16px;border-radius:14px;background:var(--greenDim);border:1px solid var(--greenBorder);margin-bottom:20px}
.success-banner svg{width:22px;height:22px;color:var(--green);flex-shrink:0}
.success-banner-text{margin-left:12px}
.success-banner-title{font-family:var(--font-head);font-size:18px;letter-spacing:1px;color:var(--green)}
.success-banner-sub{font-size:12px;font-weight:500;color:var(--green);margin-top:2px}

.global-err{display:none;align-items:flex-start;gap:8px;padding:12px 14px;border-radius:10px;background:var(--redDim);border:1px solid var(--redBorder);margin-bottom:16px}
.global-err svg{width:16px;height:16px;color:var(--red);flex-shrink:0;margin-top:1px}
.global-err span{font-size:12px;font-weight:600;color:var(--red);line-height:1.5}

/* ── SUBMIT ──────────────────────────────────────────────────── */
.submit-btn{
  width:100%;padding:17px;border-radius:14px;background:var(--white);border:1px solid var(--white);
  display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;transition:filter .12s;
}
.submit-btn:active{filter:brightness(0.9)}
.submit-btn:disabled{background:var(--black3);border-color:var(--white10);cursor:not-allowed}
.submit-btn svg{width:18px;height:18px;color:var(--black)}
.submit-btn span{font-family:var(--font-head);font-size:14px;letter-spacing:1.2px;color:var(--black)}
.submit-btn:disabled span{color:var(--grey)}
.spin{width:16px;height:16px;border:2px solid var(--white10);border-top-color:var(--grey);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.footer-note{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:12px}
.footer-note svg{width:11px;height:11px;color:var(--greyDark)}
.footer-note span{font-size:11px;font-weight:500;color:var(--greyDark)}

.bottom-pad{height:40px}
input[type="file"]{display:none}
</style>
</head>
<body>

<div class="app-shell">

  <header class="top-bar">
    <div class="top-bar-inner">
      <button type="button" class="back-btn" onclick="history.back()" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span class="top-bar-title">UPLOAD RELEASE</span>
      <div class="secure-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Secure
      </div>
    </div>
  </header>

  <div class="step-track">
    <div class="step-item active"><div class="step-num">1</div><span>Upload Files</span></div>
    <div class="step-connector"></div>
    <div class="step-item"><div class="step-num">2</div><span>Release Info</span></div>
    <div class="step-connector"></div>
    <div class="step-item"><div class="step-num">3</div><span>Select Stores</span></div>
  </div>

  <!-- COVER HERO -->
  <div class="cover-hero" id="coverHero">
    <div class="cover-empty" id="coverEmpty">
      <div class="cover-empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </div>
      <div class="cover-empty-title">TAP TO ADD COVER ART</div>
      <div class="cover-empty-sub">3000×3000 px · JPG or PNG</div>
    </div>
    <div class="cover-gradient"></div>
    <div class="cover-badge-top" id="coverBadge">REQUIRED</div>
    <div class="cover-tags" id="coverTags">
      <div class="pill-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Cover art set</div>
      <div class="pill-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Change</div>
    </div>
    <div class="cover-err-float" id="coverErr"></div>
    <input type="file" id="coverInput" accept="image/*">
  </div>

  <div class="content">
    <div class="tracklist-head">
      <div class="tracklist-title">TRACKLIST</div>
      <div class="tracklist-count" id="trackCount">0/1 ready</div>
    </div>

    <div id="tracksContainer"></div>

    <button type="button" class="add-track" id="addTrackBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>ADD ANOTHER TRACK</span>
    </button>

    <div class="upload-panel" id="uploadPanel">
      <div class="upload-panel-title">UPLOADING YOUR RELEASE…</div>
      <div class="upload-panel-sub">Please don't close this page</div>
      <div id="upRows"></div>
    </div>

    <div class="success-banner" id="successBanner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div class="success-banner-text">
        <div class="success-banner-title">ALL TRACKS UPLOADED!</div>
        <div class="success-banner-sub">Redirecting to next step…</div>
      </div>
    </div>

    <div class="global-err" id="globalErr">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="globalErrText"></span>
    </div>

    <button type="button" class="submit-btn" id="submitBtn">
      <svg id="submitIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span id="submitLabel">SUBMIT 1 TRACK TO 444MUSIC</span>
    </button>

    <div class="footer-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      <span>Secured · Powered by Cloudinary</span>
    </div>

    <div class="bottom-pad"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════
     LOGIC — mirrors upload_screen.dart exactly:
     - Same Firebase project (auth guard only, no Firestore writes here)
     - Same Cloudinary cloud/preset/folders the app posts to
       (dlbgqtvqg / glmamp2y, folder=covers | tracks)
     - Track model: artistName, releaseTitle, featuring (optional),
       mp3File, progress, status, errorMsg, errors, fileUrl
     - On success, hands off exactly what the app passes as Navigator
       arguments to /release-info: paymentReference, coverUrl, audioFiles
       (as ?ref=&cover=&audio= query params, since this is a web page)
     ════════════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }               from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
  authDomain:        "usersubmissionsportal.firebaseapp.com",
  projectId:         "usersubmissionsportal",
  storageBucket:     "usersubmissionsportal.firebasestorage.app",
  messagingSenderId: "734783502459",
  appId:             "1:734783502459:web:cfa2cc5de6976003b24ade"
};
initializeApp(firebaseConfig);
const auth = getAuth();
onAuthStateChanged(auth, user => {
  if (!user) window.location.href = "login.html";
});

// ── CLOUDINARY — same cloud + preset the Flutter app uploads to ──
const CLOUDINARY_URL    = "https://api.cloudinary.com/v1_1/dlbgqtvqg/auto/upload";
const CLOUDINARY_PRESET = "glmamp2y";

function uploadToCloudinary(file, folder, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("POST", CLOUDINARY_URL, true);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable && onProgress) onProgress(Math.round((e.loaded / e.total) * 100));
    };
    xhr.onload = () => {
      try {
        const res = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300 && res.secure_url) resolve(res.secure_url);
        else reject(new Error(res.error?.message || "Upload failed."));
      } catch (e) { reject(new Error("Upload failed — invalid response.")); }
    };
    xhr.onerror = () => reject(new Error("Network error during upload."));
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", CLOUDINARY_PRESET);
    fd.append("folder", folder);
    xhr.send(fd);
  });
}

function fmtBytes(b){ return b < 1024*1024 ? (b/1024).toFixed(1)+' KB' : (b/(1024*1024)).toFixed(1)+' MB'; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── STATE ────────────────────────────────────────────────────────
let _id = 0;
const mkTrack = () => ({
  id: `t${++_id}`, artistName:'', releaseTitle:'', featuring:'',
  mp3File:null, mp3FileName:null, progress:0, status:'idle',
  errorMsg:'', errors:{}, fileUrl:null,
});

let tracks    = [mkTrack()];
let expanded  = new Set([tracks[0].id]);
let coverFile = null, coverUrl = null;
let uploading = false, allDone = false, globalError = '';

const coverHero   = document.getElementById('coverHero');
const coverEmpty  = document.getElementById('coverEmpty');
const coverInput  = document.getElementById('coverInput');
const coverBadge  = document.getElementById('coverBadge');
const coverErr    = document.getElementById('coverErr');
const tracksContainer = document.getElementById('tracksContainer');
const trackCount  = document.getElementById('trackCount');
const addTrackBtn = document.getElementById('addTrackBtn');
const submitBtn   = document.getElementById('submitBtn');
const submitLabel = document.getElementById('submitLabel');
const submitIcon  = document.getElementById('submitIcon');
const uploadPanel = document.getElementById('uploadPanel');
const upRows      = document.getElementById('upRows');
const successBanner = document.getElementById('successBanner');
const globalErr   = document.getElementById('globalErr');
const globalErrText = document.getElementById('globalErrText');

// ── COVER ART ────────────────────────────────────────────────────
coverHero.addEventListener('click', () => coverInput.click());
coverInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  coverFile = f;
  coverErr.style.display = 'none';
  const reader = new FileReader();
  reader.onload = ev => {
    coverEmpty.style.display = 'none';
    let img = coverHero.querySelector('img');
    if (!img) { img = document.createElement('img'); coverHero.insertBefore(img, coverHero.firstChild); }
    img.src = ev.target.result;
    coverHero.classList.add('has-img');
    coverBadge.textContent = '✓ SET';
  };
  reader.readAsDataURL(f);
});

// ── TRACKS ───────────────────────────────────────────────────────
function completedCount(){ return tracks.filter(t => t.status === 'success').length; }

function updateSubmitLabel(){
  if (uploading) return;
  submitLabel.textContent = `SUBMIT ${tracks.length} TRACK${tracks.length > 1 ? 'S' : ''} TO 444MUSIC`;
}

function renderTracks() {
  tracksContainer.innerHTML = '';
  tracks.forEach((t, i) => tracksContainer.appendChild(buildTrackRow(t, i)));
  trackCount.textContent = `${completedCount()}/${tracks.length} ready`;
  updateSubmitLabel();
}

function buildTrackRow(t, i) {
  const isExpanded  = expanded.has(t.id);
  const isDone      = t.status === 'success';
  const isUploading = t.status === 'uploading';
  const hasErr      = Object.values(t.errors).some(Boolean) || !!t.errorMsg;

  const displayName = t.releaseTitle.trim() || t.artistName.trim() || `Track ${i + 1}`;
  const hasName     = !!(t.releaseTitle.trim() || t.artistName.trim());

  const row = document.createElement('div');
  row.className = 'track-row' + (isExpanded ? ' expanded' : '') + (isDone ? ' done' : '') + (hasErr ? ' has-err' : '');

  const numInner = isDone
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
    : String(i + 1).padStart(2, '0');

  const subText = t.mp3FileName
    ? escHtml(t.mp3FileName)
    : isUploading ? `Uploading ${Math.round(t.progress)}%…` : 'Tap to add details';

  row.innerHTML = `
    <div class="track-head" data-toggle="${t.id}">
      <div class="track-num ${isDone ? 'done' : (hasErr ? 'has-err' : '')}">${numInner}</div>
      <div class="track-meta">
        <div class="track-name ${hasName ? 'filled' : ''}">${escHtml(displayName)}</div>
        <div class="track-sub ${isUploading ? 'uploading' : ''}">${subText}</div>
      </div>
      ${tracks.length > 1 && !uploading && !isDone ? `<button type="button" class="track-remove" data-remove="${t.id}" aria-label="Remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : ''}
      <div class="status-dot ${isDone ? 'done' : (hasErr ? 'err' : (isUploading ? 'uploading' : ''))}"></div>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

    ${isUploading ? `
    <div class="track-progress">
      <div class="prog-label"><span>UPLOADING</span><span>${Math.round(t.progress)}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${t.progress}%"></div></div>
    </div>` : ''}

    ${isExpanded ? `
    <div class="track-body">
      <div class="grid2">
        <div class="field ${t.errors.artistName ? 'has-err' : ''}">
          <label class="field-label">Artist Name<div class="req-dot"></div></label>
          <input type="text" placeholder="e.g. Burna Boy" data-field="artistName" data-id="${t.id}" value="${escHtml(t.artistName)}" ${uploading || isDone ? 'disabled' : ''}>
          ${t.errors.artistName ? `<div class="ferr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${t.errors.artistName}</div>` : ''}
        </div>
        <div class="field ${t.errors.releaseTitle ? 'has-err' : ''}">
          <label class="field-label">Track Title<div class="req-dot"></div></label>
          <input type="text" placeholder="e.g. Abundance" data-field="releaseTitle" data-id="${t.id}" value="${escHtml(t.releaseTitle)}" ${uploading || isDone ? 'disabled' : ''}>
          ${t.errors.releaseTitle ? `<div class="ferr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${t.errors.releaseTitle}</div>` : ''}
        </div>
      </div>

      <div class="field" style="margin-top:14px">
        <label class="field-label">Featuring</label>
        <input type="text" placeholder="Leave blank if none" data-field="featuring" data-id="${t.id}" value="${escHtml(t.featuring)}" ${uploading || isDone ? 'disabled' : ''}>
      </div>

      <div class="mp3-zone-wrap">
        <div class="mp3-zone-head">
          <label class="field-label">Audio File<div class="req-dot"></div></label>
          <div class="mp3-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>MP3 ONLY</div>
        </div>
        <div class="mp3-zone ${t.mp3FileName ? 'has-file' : ''} ${t.errors.mp3 ? 'has-err' : ''}" data-zone="${t.id}">
          ${t.mp3FileName ? `
            <div class="mp3-filled">
              <div class="mp3-file-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg></div>
              <div class="mp3-file-meta">
                <div class="mp3-file-name">${escHtml(t.mp3FileName)}</div>
                <div class="mp3-file-size">${t.mp3File ? fmtBytes(t.mp3File.size) : ''}</div>
              </div>
              <svg class="mp3-swap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            </div>` : `
            <div class="mp3-empty">
              <div class="mp3-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
              <div class="mp3-empty-title">TAP TO SELECT MP3</div>
              <div class="mp3-empty-sub">Only .mp3 files are accepted · max 50 MB</div>
              <div class="format-pills">
                <div class="fpill ok">MP3 ✓</div>
                <div class="fpill">WAV ✗</div>
                <div class="fpill">Images ✗</div>
                <div class="fpill">Docs ✗</div>
              </div>
            </div>`}
        </div>
        ${t.errors.mp3 ? `<div class="ferr" style="margin-top:6px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${t.errors.mp3}</div>` : ''}
      </div>

      ${t.errorMsg ? `<div class="err-banner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>${escHtml(t.errorMsg)}</span></div>` : ''}

      ${isDone ? `<div class="done-banner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>Track uploaded successfully</span></div>` : ''}

      ${!isDone ? `<div class="collapse-btn" data-toggle="${t.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>Done — Collapse</span></div>` : ''}
    </div>` : ''}
  `;

  row.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', ev => {
      if (ev.target.closest('[data-remove]') || ev.target.closest('input')) return;
      const id = el.dataset.toggle;
      if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
      renderTracks();
    });
  });

  row.querySelectorAll('input[data-field]').forEach(inp => {
    inp.addEventListener('input', e => {
      const track = tracks.find(x => x.id === e.target.dataset.id);
      if (track) track[e.target.dataset.field] = e.target.value;
    });
  });

  const zone = row.querySelector('.mp3-zone');
  if (zone) {
    const fileInput = document.createElement('input');
    fileInput.type = 'file'; fileInput.accept = '.mp3,audio/mpeg';
    zone.appendChild(fileInput);
    zone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleTrackFile(t.id, e.target.files[0]));
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); handleTrackFile(t.id, e.dataTransfer.files[0]); });
  }

  const removeBtn = row.querySelector('[data-remove]');
  if (removeBtn) removeBtn.addEventListener('click', () => {
    tracks = tracks.filter(x => x.id !== t.id);
    expanded.delete(t.id);
    renderTracks();
  });

  return row;
}

function handleTrackFile(id, file) {
  if (!file) return;
  const t = tracks.find(x => x.id === id);
  if (!t) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'mp3') {
    t.errors.mp3 = `.${ext} files are not accepted. Please select an MP3 file only.`;
    renderTracks(); return;
  }
  if (file.size > 50 * 1024 * 1024) {
    t.errors.mp3 = 'File exceeds 50 MB limit.';
    renderTracks(); return;
  }
  t.mp3File = file; t.mp3FileName = file.name;
  delete t.errors.mp3;
  renderTracks();
}

addTrackBtn.addEventListener('click', () => {
  const nt = mkTrack();
  tracks.push(nt);
  expanded.add(nt.id);
  renderTracks();
});

// ── VALIDATION ───────────────────────────────────────────────────
function validateAll() {
  let valid = true;
  if (!coverFile) {
    coverErr.textContent = 'Cover art is required.';
    coverErr.style.display = 'block';
    valid = false;
  }
  tracks.forEach(t => {
    t.errors = {};
    if (!t.artistName.trim())   { t.errors.artistName   = 'Required'; valid = false; }
    if (!t.releaseTitle.trim()) { t.errors.releaseTitle = 'Required'; valid = false; }
    if (!t.mp3File)             { t.errors.mp3           = 'Please select an MP3 file.'; valid = false; }
    if (Object.keys(t.errors).length) expanded.add(t.id);
  });
  renderTracks();
  return valid;
}

// ── UPLOAD ALL ───────────────────────────────────────────────────
submitBtn.addEventListener('click', async () => {
  globalErr.style.display = 'none';
  if (!validateAll()) return;

  uploading = true; globalError = '';
  submitBtn.disabled = true;
  submitIcon.style.display = 'none';
  const spinner = document.createElement('span');
  spinner.className = 'spin';
  submitBtn.insertBefore(spinner, submitBtn.firstChild);
  uploadPanel.style.display = 'block';
  renderUploadPanel();
  renderTracks();

  try {
    if (coverFile) {
      updateUpRow('cover', 'Cover Art', 'uploading', 0);
      coverUrl = await uploadToCloudinary(coverFile, 'covers', pct => updateUpRow('cover', 'Cover Art', 'uploading', pct));
      updateUpRow('cover', 'Cover Art', 'done', 100);
    }

    let anyError = false;
    for (const t of tracks) {
      if (t.status === 'success') continue;
      t.status = 'uploading'; t.progress = 0; t.errorMsg = '';
      updateUpRow(t.id, t.releaseTitle || 'Track', 'uploading', 0);
      renderTracks();
      try {
        t.fileUrl = await uploadToCloudinary(t.mp3File, 'tracks', pct => {
          t.progress = pct;
          updateUpRow(t.id, t.releaseTitle || 'Track', 'uploading', pct);
          renderTracks();
        });
        t.status = 'success'; t.progress = 100;
        updateUpRow(t.id, t.releaseTitle || 'Track', 'done', 100);
        renderTracks();
      } catch (e) {
        anyError = true;
        t.status = 'error';
        t.errorMsg = 'Upload failed. Check connection and retry.';
        updateUpRow(t.id, t.releaseTitle || 'Track', 'error', 0);
        renderTracks();
      }
    }

    uploading = false;

    if (!anyError) {
      allDone = true;
      successBanner.style.display = 'flex';
      const audioFiles = tracks
        .filter(t => t.fileUrl)
        .map(t => ({ title: t.releaseTitle.trim(), artist: t.artistName.trim(), url: t.fileUrl }));
      const existing = new URLSearchParams(window.location.search);
      const ref = existing.get('ref');
      const params = new URLSearchParams();
      if (ref) params.set('ref', ref);
      if (coverUrl) params.set('cover', coverUrl);
      params.set('audio', JSON.stringify(audioFiles));
      setTimeout(() => { window.location.href = `release-info.html?${params.toString()}`; }, 1800);
    } else {
      globalErrText.textContent = 'Some tracks failed. Check errors and retry.';
      globalErr.style.display = 'flex';
      submitBtn.disabled = false;
      submitIcon.style.display = 'inline';
      spinner.remove();
      updateSubmitLabel();
      renderTracks();
    }
  } catch (err) {
    uploading = false;
    globalErrText.textContent = err.message || 'Upload failed. Please try again.';
    globalErr.style.display = 'flex';
    submitBtn.disabled = false;
    submitIcon.style.display = 'inline';
    spinner.remove();
    updateSubmitLabel();
    renderTracks();
  }
});

const upState = {};
function renderUploadPanel() {
  Object.keys(upState).forEach(k => delete upState[k]);
  drawUpPanel();
}
function updateUpRow(id, name, status, pct) {
  upState[id] = { name, status, pct };
  drawUpPanel();
}
function drawUpPanel() {
  upRows.innerHTML = Object.values(upState).map(row => {
    const dotClass = row.status === 'done' ? 'done' : row.status === 'error' ? 'error' : row.status === 'uploading' ? 'uploading' : '';
    const label = row.status === 'done' ? '✓ Done' : row.status === 'error' ? '✗ Error' : row.status === 'uploading' ? `${Math.round(row.pct)}%` : 'Waiting';
    const color = row.status === 'done' ? 'var(--green)' : row.status === 'error' ? 'var(--red)' : 'var(--white70)';
    return `
    <div class="up-row">
      <div class="up-dot ${dotClass}"></div>
      <div class="up-name">${escHtml(row.name)}</div>
      <div class="up-pct" style="color:${color}">${label}</div>
    </div>`;
  }).join('');
}

renderTracks();
</script>

</body>
</html>
