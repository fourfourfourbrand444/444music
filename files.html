<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>444Music — Distribution Upload</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #0f0f18;
    --card: #13131e;
    --card-hover: #161624;
    --border: #1e1e2e;
    --border-bright: #2a2a3e;
    --purple: #7c3aed;
    --purple-light: #9d6bff;
    --purple-dim: rgba(124,58,237,0.15);
    --purple-glow: rgba(124,58,237,0.3);
    --text: #e8e8f0;
    --text-muted: #6b6b85;
    --text-dim: #3d3d55;
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    background: rgba(10,10,15,0.8);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--purple) 0%, #4f46e5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    color: white;
  }

  .header-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--purple-light);
    background: var(--purple-dim);
    border: 1px solid rgba(124,58,237,0.3);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }

  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }

  .page-title {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
    line-height: 1.1;
  }

  .page-subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
    margin-bottom: 2.5rem;
    letter-spacing: 0.02em;
  }

  .track-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1.25rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .track-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,58,237,0.4), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .track-card:focus-within::before { opacity: 1; }
  .track-card:focus-within { border-color: var(--border-bright); box-shadow: 0 0 0 1px rgba(124,58,237,0.1), 0 8px 32px rgba(0,0,0,0.4); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .track-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--purple-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--purple-dim);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(124,58,237,0.2);
  }

  .remove-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.15s;
    line-height: 1;
  }

  .remove-btn:hover { border-color: var(--error); color: var(--error); background: rgba(239,68,68,0.08); }

  .card-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 580px) { .card-body { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  label span.req { color: var(--purple-light); margin-left: 3px; }
  label span.opt { color: var(--text-dim); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 4px; font-size: 0.68rem; }

  input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 0.9rem;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
    width: 100%;
  }

  input[type="text"]:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
  }

  input[type="text"]::placeholder { color: var(--text-dim); }

  .media-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 1rem;
    margin-top: 0.25rem;
  }

  @media (max-width: 420px) { .media-row { grid-template-columns: 1fr; } }

  .cover-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .cover-wrap:hover { border-color: var(--purple); }

  .cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .cover-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cover-wrap:hover .cover-overlay { opacity: 1; }

  .cover-overlay-icon { font-size: 1.4rem; }
  .cover-overlay-text { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; color: white; text-transform: uppercase; }

  .file-zone {
    border: 1.5px dashed var(--border-bright);
    border-radius: 12px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    min-height: 120px;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .file-zone:hover, .file-zone.drag-over {
    border-color: var(--purple);
    background: var(--purple-dim);
  }

  .file-zone-icon { font-size: 1.6rem; opacity: 0.6; }
  .file-zone-text { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
  .file-zone-sub { font-size: 0.7rem; font-family: 'DM Mono', monospace; color: var(--text-dim); }

  .file-selected {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .file-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-size {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--purple-light);
  }

  .field-error {
    font-size: 0.7rem;
    color: var(--error);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .progress-wrap {
    grid-column: 1 / -1;
    margin-top: 0.5rem;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple) 0%, var(--purple-light) 100%);
    border-radius: 999px;
    transition: width 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  .upload-btn {
    grid-column: 1 / -1;
    margin-top: 0.5rem;
    background: linear-gradient(135deg, var(--purple) 0%, #4f46e5 100%);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.75rem 1.5rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(124,58,237,0.3);
  }

  .upload-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,58,237,0.4); }
  .upload-btn:active:not(:disabled) { transform: translateY(0); }
  .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .success-banner {
    grid-column: 1 / -1;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.25);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 0.5rem;
  }

  .success-icon { font-size: 1.3rem; }
  .success-text { font-size: 0.82rem; font-weight: 600; color: var(--success); }
  .success-sub { font-size: 0.7rem; font-family: 'DM Mono', monospace; color: rgba(16,185,129,0.6); margin-top: 2px; }

  .add-track-btn {
    width: 100%;
    background: transparent;
    border: 1.5px dashed var(--border-bright);
    color: var(--text-muted);
    border-radius: 16px;
    padding: 1.1rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 0.5rem;
  }

  .add-track-btn:hover { border-color: var(--purple); color: var(--purple-light); background: var(--purple-dim); }

  .add-icon { font-size: 1.1rem; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
  }

  .footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); flex-shrink: 0; }

  .error-banner {
    grid-column: 1 / -1;
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 0.78rem;
    color: var(--error);
    font-family: 'DM Mono', monospace;
    margin-top: 0.25rem;
  }

  input[type="file"] { display: none; }

  .cover-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .cover-placeholder-icon { opacity: 0.4; }
  .cover-placeholder-text { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

  .global-cover-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  @media (max-width: 500px) { .global-cover-section { flex-direction: column; align-items: flex-start; } }

  .global-cover-img-wrap {
    position: relative;
    width: 110px;
    height: 110px;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .global-cover-img-wrap:hover { border-color: var(--purple); }

  .global-cover-info { flex: 1; }
  .global-cover-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; }
  .global-cover-sub { font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; }

  .global-cover-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    color: var(--text);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .global-cover-btn:hover { border-color: var(--purple); color: var(--purple-light); background: var(--purple-dim); }

  .cover-set-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--success);
    margin-top: 8px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

// ─── Supabase Setup ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://uaylyvdheqaxvsidkaxu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6RTU8FDXWed6qs0Oh-F0GA_6Tb3U4RL';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── Utilities ─────────────────────────────────────────────────────────────────
let idCounter = 0;
const uid = () => `track-${++idCounter}-${Date.now()}`;
const formatBytes = (b) => {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(1) + ' MB';
};
const createTrack = () => ({
  id: uid(), artistName: '', releaseTitle: '', featuringArtist: '',
  mp3File: null, progress: 0, status: 'idle', errorMsg: '', errors: {},
});

// ─── SVG Icons ─────────────────────────────────────────────────────────────────
const IconImage = ({size=18,color='currentColor'}) => (

  </svg>

const IconArrowUp = ({size=16,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>

const IconEdit = ({size=14,color='currentColor'}) => (

// ─── Global Cover Art Section ──────────────────────────────────────────────────
function GlobalCoverArt({ coverPreview, onCoverSelect }) {
  const inputRef = useRef();
  return (
    <div className="global-cover-section">
      <div className="global-cover-img-wrap" onClick={() => inputRef.current.click()}>
        {coverPreview ? (
          <img src={coverPreview} alt="Cover Art" className="cover-img" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} />
        ) : (
          <div className="cover-placeholder">
            <div className="cover-placeholder-icon"><IconMusic size={28} color="rgba(255,255,255,0.35)" /></div>
            <div className="cover-placeholder-text">Cover</div>
          </div>
        )}
        <div className="cover-overlay">
          <IconEdit size={16} color="white" />
          <div className="cover-overlay-text">Replace</div>
        </div>
      </div>
      <div className="global-cover-info">
        <div className="global-cover-title">Release Cover Art</div>
        <div className="global-cover-sub">
          Applies to all tracks in this upload.<br/>
          Recommended: 3000×3000px, JPG or PNG.
        </div>
        <button className="global-cover-btn" onClick={() => inputRef.current.click()}>
          <IconImage size={15} />
          {coverPreview ? 'Change Cover Art' : 'Upload Cover Art'}
        </button>
        {coverPreview && (
          <div className="cover-set-badge">
            <IconCheck size={13} color="var(--success)" /> Cover art set
          </div>
        )}
      </div>
      <input ref={inputRef} type="file" accept="image/*"
        onChange={e => e.target.files[0] && onCoverSelect(e.target.files[0])} />
    </div>
  );
}

// ─── File Zone Component ────────────────────────────────────────────────────────
function FileZone({ mp3File, onFileSelect, error, disabled }) {
  const inputRef = useRef();
  const [drag, setDrag] = useState(false);
  const handleDrop = (e) => {
    e.preventDefault(); setDrag(false);
    if (disabled) return;
    const f = e.dataTransfer.files[0];
    if (f) onFileSelect(f);
  };
  return (
    <div className="field full">
      <label>MP3 File <span className="req">*</span></label>
      <div
        className={`file-zone${drag ? ' drag-over' : ''}`}
        onClick={() => !disabled && inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); !disabled && setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={handleDrop}
      >
        {mp3File ? (
          <div className="file-selected">
            <IconHeadphones size={22} color="var(--purple-light)" />
            <div className="file-name">{mp3File.name}</div>
            <div className="file-size">{formatBytes(mp3File.size)}</div>
          </div>
        ) : (
          <>
            <div style={{opacity:0.45}}><IconFolder size={22} color="var(--text-muted)" /></div>
            <div className="file-zone-text">Drop MP3 here or click to browse</div>
            <div className="file-zone-sub">MP3 only · max 10MB</div>
          </>
        )}
      </div>
      {error && <div className="field-error"><IconAlert size={13} color="var(--error)" /> {error}</div>}
      <input ref={inputRef} type="file" accept=".mp3,audio/mpeg"
        onChange={e => e.target.files[0] && onFileSelect(e.target.files[0])} />
    </div>
  );
}

// ─── Track Card ─────────────────────────────────────────────────────────────────
function TrackCard({ track, index, onUpdate, onRemove, canRemove, coverFile, coverPreview }) {
  const disabled = track.status === 'uploading' || track.status === 'success';
  const set = (field, value) => onUpdate(track.id, { [field]: value });

  const validateFile = (file) => {
    if (!file.type.includes('mp3') && !file.name.toLowerCase().endsWith('.mp3'))
      return 'Only MP3 files are allowed.';
    if (file.size > 10 * 1024 * 1024) return 'File exceeds 10MB limit.';
    return null;
  };

  const handleFileSelect = (file) => {
    const err = validateFile(file);
    if (err) onUpdate(track.id, { errors: { ...track.errors, mp3: err } });
    else onUpdate(track.id, { mp3File: file, errors: { ...track.errors, mp3: null } });
  };

  const validate = () => {
    const errs = {};
    if (!track.artistName.trim()) errs.artistName = 'Artist name is required.';
    if (!track.releaseTitle.trim()) errs.releaseTitle = 'Release title is required.';
    if (!track.mp3File) errs.mp3 = 'Please select an MP3 file.';
    return errs;
  };

  const handleUpload = async () => {
    const errs = validate();
    if (Object.keys(errs).length > 0) { onUpdate(track.id, { errors: errs }); return; }
    onUpdate(track.id, { status: 'uploading', progress: 0, errorMsg: '', errors: {} });

    try {
      const mp3Ext = track.mp3File.name.split('.').pop();
      const mp3Path = `tracks/${Date.now()}_${Math.random().toString(36).slice(2)}.${mp3Ext}`;

      let simulatedProgress = 0;
      const progressInterval = setInterval(() => {
        simulatedProgress = Math.min(simulatedProgress + Math.random() * 8, 88);
        onUpdate(track.id, { progress: Math.round(simulatedProgress) });
      }, 200);

      // ✅ FIXED: was 'music uploads' (space), now 'music-uploads' (hyphen)
      const { error: mp3Err } = await supabase.storage
        .from('music-uploads')
        .upload(mp3Path, track.mp3File, { contentType: 'audio/mpeg', upsert: false });

      clearInterval(progressInterval);
      if (mp3Err) throw new Error(mp3Err.message);

      onUpdate(track.id, { progress: 92 });

      // ✅ FIXED: was 'music uploads' (space), now 'music-uploads' (hyphen)
      const { data: { publicUrl: fileUrl } } = supabase.storage
        .from('music-uploads').getPublicUrl(mp3Path);

      let coverUrl = null;
      if (coverFile) {
        const covExt = coverFile.name.split('.').pop();
        const covPath = `covers/${Date.now()}_${Math.random().toString(36).slice(2)}.${covExt}`;
        // ✅ FIXED: was 'music uploads' (space), now 'music-uploads' (hyphen)
        const { error: covErr } = await supabase.storage
          .from('music-uploads').upload(covPath, coverFile, { upsert: false });
        if (!covErr) {
          const { data: { publicUrl } } = supabase.storage
            .from('music-uploads').getPublicUrl(covPath);
          coverUrl = publicUrl;
        }
      }

      onUpdate(track.id, { progress: 96 });

      const { error: dbErr } = await supabase.from('tracks').insert({
        artist_name: track.artistName.trim(),
        release_title: track.releaseTitle.trim(),
        featuring_artist: track.featuringArtist.trim() || null,
        file_url: fileUrl,
        cover_url: coverUrl,
      });

      if (dbErr) throw new Error(dbErr.message);

      onUpdate(track.id, { progress: 100, status: 'success' });
      setTimeout(() => { window.location.href = 'wey.html'; }, 1500);

    } catch (err) {
      onUpdate(track.id, { status: 'error', errorMsg: err.message || 'Upload failed. Please try again.', progress: 0 });
    }
  };

  return (
    <div className="track-card">
      <div className="card-header">
        <div className="track-number">Track {String(index + 1).padStart(2, '0')}</div>
        {canRemove && track.status !== 'uploading' && (
          <button className="remove-btn" onClick={() => onRemove(track.id)} title="Remove track">
            <IconX size={13} />
          </button>
        )}
      </div>

      <div className="card-body">
        <div className="field">
          <label>Artist Name <span className="req">*</span></label>
          <input type="text" placeholder="e.g. Burna Boy" value={track.artistName}
            disabled={disabled} onChange={e => set('artistName', e.target.value)} />
          {track.errors.artistName && <div className="field-error"><IconAlert size={13} color="var(--error)" /> {track.errors.artistName}</div>}
        </div>

        <div className="field">
          <label>Release Title <span className="req">*</span></label>
          <input type="text" placeholder="e.g. Abundance" value={track.releaseTitle}
            disabled={disabled} onChange={e => set('releaseTitle', e.target.value)} />
          {track.errors.releaseTitle && <div className="field-error"><IconAlert size={13} color="var(--error)" /> {track.errors.releaseTitle}</div>}
        </div>

        <div className="field full">
          <label>Featuring Artist <span className="opt">optional</span></label>
          <input type="text" placeholder="e.g. Wizkid (leave blank if none)"
            value={track.featuringArtist} disabled={disabled}
            onChange={e => set('featuringArtist', e.target.value)} />
        </div>

        <FileZone mp3File={track.mp3File} onFileSelect={handleFileSelect}
          error={track.errors.mp3} disabled={disabled} />

        {(track.status === 'uploading' || track.status === 'success') && (
          <div className="progress-wrap">
            <div className="progress-label">
              <span>{track.status === 'success' ? 'Complete' : 'Uploading…'}</span>
              <span>{track.progress}%</span>
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{ width: `${track.progress}%` }} />
            </div>
          </div>
        )}

        {track.status === 'error' && track.errorMsg && (
          <div className="error-banner">
            <IconAlert size={14} color="var(--error)" style={{flexShrink:0}} /> {track.errorMsg}
          </div>
        )}

        {track.status === 'success' && (
          <div className="success-banner">
            <div className="success-icon"><IconCheck size={20} color="var(--success)" /></div>
            <div>
              <div className="success-text">Uploaded Successfully</div>
              <div className="success-sub">Redirecting to your dashboard…</div>
            </div>
          </div>
        )}

        {track.status !== 'success' && (
          <button className="upload-btn" onClick={handleUpload} disabled={disabled}>
            {track.status === 'uploading' ? (
              <><div className="spinner" /> Uploading — {track.progress}%</>
            ) : (
              <><IconArrowUp size={15} /> Upload Track</>
            )}
          </button>
        )}
      </div>
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [tracks, setTracks] = useState([createTrack()]);
  const [coverFile, setCoverFile] = useState(null);
  const [coverPreview, setCoverPreview] = useState(null);

  const updateTrack = useCallback((id, patch) => {
    setTracks(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t));
  }, []);

  const removeTrack = useCallback((id) => {
    setTracks(prev => prev.filter(t => t.id !== id));
  }, []);

  const addTrack = () => setTracks(prev => [...prev, createTrack()]);

  const handleCoverSelect = (file) => {
    setCoverFile(file);
    setCoverPreview(URL.createObjectURL(file));
  };

  return (
    <div>
      <header className="header">
        <div className="logo">
          <div className="logo-mark">444</div>
          MusicDistro
        </div>
        <div className="header-badge">Distribution Portal</div>
      </header>

      <main className="main">
        <h1 className="page-title">Upload Your Music</h1>
        <p className="page-subtitle">
          distribute to 150+ platforms globally — release in 24–48 hrs
        </p>

        <GlobalCoverArt coverPreview={coverPreview} onCoverSelect={handleCoverSelect} />

        {tracks.map((track, i) => (
          <TrackCard
            key={track.id}
            track={track}
            index={i}
            onUpdate={updateTrack}
            onRemove={removeTrack}
            canRemove={tracks.length > 1}
            coverFile={coverFile}
            coverPreview={coverPreview}
          />
        ))}

        <button className="add-track-btn" onClick={addTrack}>
          <IconPlus size={16} />
          Add Another Track
        </button>

        <div className="footer-note">
          <div className="footer-dot" />
          <IconShield size={13} color="var(--text-dim)" style={{flexShrink:0}} />
          Files are encrypted in transit and stored securely on Supabase. Max 10MB per track.
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
