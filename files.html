<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>444Music — Distribution Upload</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #030303;
    --surface: #080808;
    --card: #0d0d0d;
    --border: #161616;
    --border-mid: #202020;
    --accent: #6d28d9;
    --accent-hover: #7c3aed;
    --accent-dim: rgba(109,40,217,0.12);
    --text: #f0f0f0;
    --text-muted: #555;
    --text-sub: #333;
    --success: #22c55e;
    --error: #ef4444;
    --radius: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #root { position: relative; }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: white;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .header-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-muted);
    border: 1px solid var(--border-mid);
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* MAIN */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 5rem;
  }

  .page-title {
    font-size: clamp(1.35rem, 5vw, 1.9rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.35rem;
    line-height: 1.15;
    color: var(--text);
  }

  .page-subtitle {
    color: var(--text-muted);
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 2rem;
    letter-spacing: 0.02em;
  }

  /* COVER SECTION */
  .global-cover-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }

  @media (max-width: 440px) {
    .global-cover-section { flex-direction: column; align-items: flex-start; gap: 1rem; }
  }

  .global-cover-img-wrap {
    position: relative;
    width: 90px;
    height: 90px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border-mid);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .global-cover-img-wrap:hover { border-color: var(--accent); }

  .cover-placeholder {
    width: 100%; height: 100%;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .cover-placeholder-text {
    font-size: 0.5rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #333;
  }

  .cover-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    opacity: 0; transition: opacity 0.2s;
  }
  .global-cover-img-wrap:hover .cover-overlay { opacity: 1; }
  .cover-overlay-text { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.08em; color: white; text-transform: uppercase; }

  .global-cover-info { flex: 1; min-width: 0; }
  .global-cover-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 3px; color: var(--text); }
  .global-cover-sub { font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); margin-bottom: 10px; line-height: 1.6; }

  .global-cover-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent;
    border: 1px solid var(--border-mid);
    color: var(--text);
    border-radius: 6px;
    padding: 0.42rem 0.9rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .global-cover-btn:hover { border-color: var(--accent); color: #a78bfa; }

  .cover-set-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
    color: var(--success); margin-top: 7px;
  }

  /* TRACK CARD */
  .track-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .track-card:focus-within { border-color: var(--border-mid); }

  .card-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 1.1rem;
  }

  .track-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .remove-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted);
    width: 26px; height: 26px; border-radius: 5px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .remove-btn:hover { border-color: var(--error); color: var(--error); background: rgba(239,68,68,0.07); }

  /* FORM GRID */
  .card-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.85rem;
  }
  @media (max-width: 500px) { .card-body { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 0.67rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted);
  }
  label span.req { color: var(--accent-hover); margin-left: 2px; }
  label span.opt { color: var(--text-sub); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 4px; font-size: 0.63rem; }

  input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.6rem 0.8rem;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none; width: 100%;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(109,40,217,0.1);
  }
  input[type="text"]::placeholder { color: var(--text-sub); }

  /* FILE ZONE */
  .file-zone {
    border: 1px dashed var(--border-mid);
    border-radius: 8px;
    padding: 1.1rem;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; cursor: pointer;
    transition: all 0.2s; text-align: center;
    min-height: 100px; background: var(--surface);
  }
  .file-zone:hover, .file-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .file-zone-text { font-size: 0.77rem; font-weight: 500; color: var(--text-muted); }
  .file-zone-sub { font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; color: var(--text-sub); }

  .file-selected { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .file-name { font-size: 0.78rem; font-weight: 600; color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-size { font-size: 0.63rem; font-family: 'JetBrains Mono', monospace; color: #a78bfa; }

  .field-error {
    font-size: 0.65rem; color: var(--error);
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; gap: 4px;
  }

  /* PROGRESS */
  .progress-wrap { grid-column: 1 / -1; margin-top: 0.25rem; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted); margin-bottom: 5px;
  }
  .progress-track { height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.15s ease;
  }

  /* BUTTONS */
  .upload-btn {
    grid-column: 1 / -1;
    margin-top: 0.25rem;
    background: var(--accent);
    color: white; border: none;
    border-radius: 8px;
    padding: 0.7rem 1.25rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem; font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    width: 100%;
  }
  .upload-btn:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
  .upload-btn:active:not(:disabled) { transform: translateY(0); }
  .upload-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* BANNERS */
  .success-banner {
    grid-column: 1 / -1;
    background: rgba(34,197,94,0.06);
    border: 1px solid rgba(34,197,94,0.2);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    display: flex; align-items: center; gap: 10px;
    margin-top: 0.25rem;
  }
  .success-text { font-size: 0.8rem; font-weight: 600; color: var(--success); }
  .success-sub { font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; color: rgba(34,197,94,0.5); margin-top: 2px; }

  .error-banner {
    grid-column: 1 / -1;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.18);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    font-size: 0.75rem; color: var(--error);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 0.25rem;
    display: flex; align-items: flex-start; gap: 7px;
  }

  /* ADD TRACK */
  .add-track-btn {
    width: 100%; background: transparent;
    border: 1px dashed var(--border-mid);
    color: var(--text-muted);
    border-radius: var(--radius);
    padding: 0.9rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 0.25rem;
  }
  .add-track-btn:hover { border-color: var(--accent); color: #a78bfa; background: var(--accent-dim); }

  /* FOOTER */
  .footer-note {
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    color: var(--text-sub);
    font-size: 0.65rem;
    font-family: 'JetBrains Mono', monospace;
  }

  /* SPINNER */
  .spinner {
    width: 14px; height: 14px;
    border: 1.5px solid rgba(255,255,255,0.25);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  input[type="file"] { display: none; }

  /* MOBILE TWEAKS */
  @media (max-width: 380px) {
    .main { padding: 1.5rem 1rem 4rem; }
    .header { padding: 0 1rem; }
    .track-card, .global-cover-section { padding: 1rem; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

const SUPABASE_URL = 'https://uaylyvdheqaxvsidkaxu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6RTU8FDXWed6qs0Oh-F0GA_6Tb3U4RL';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let idCounter = 0;
const uid = () => `track-${++idCounter}-${Date.now()}`;
const formatBytes = (b) => {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(1) + ' MB';
};
const createTrack = () => ({
  id: uid(), artistName: '', releaseTitle: '', featuringArtist: '',
  mp3File: null, progress: 0, status: 'idle', errorMsg: '', errors: {},
});

// Icons
const IconImage = ({size=16,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
);
const IconMusic = ({size=22,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
  </svg>
);
const IconHeadphones = ({size=20,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
    <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
    <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
  </svg>
);
const IconCheck = ({size=15,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);
const IconAlert = ({size=13,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
);
const IconPlus = ({size=15,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
);
const IconX = ({size=13,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
);
const IconArrowUp = ({size=15,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
  </svg>
);
const IconEdit = ({size=13,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </svg>
);
const IconShield = ({size=13,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
  </svg>
);
const IconUpload = ({size=13,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
);

// Global Cover
function GlobalCoverArt({ coverPreview, onCoverSelect }) {
  const inputRef = useRef();
  return (
    <div className="global-cover-section">
      <div className="global-cover-img-wrap" onClick={() => inputRef.current.click()}>
        {coverPreview ? (
          <img src={coverPreview} alt="Cover" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} />
        ) : (
          <div className="cover-placeholder">
            <IconMusic size={22} color="#2a2a2a" />
            <div className="cover-placeholder-text">Cover</div>
          </div>
        )}
        <div className="cover-overlay">
          <IconEdit size={13} color="white" />
          <div className="cover-overlay-text">Change</div>
        </div>
      </div>
      <div className="global-cover-info">
        <div className="global-cover-title">Cover Art</div>
        <div className="global-cover-sub">Applies to all tracks · 3000×3000px recommended · JPG or PNG</div>
        <button className="global-cover-btn" onClick={() => inputRef.current.click()}>
          <IconImage size={13} />
          {coverPreview ? 'Change Image' : 'Upload Image'}
        </button>
        {coverPreview && (
          <div className="cover-set-badge">
            <IconCheck size={12} color="var(--success)" /> Cover set
          </div>
        )}
      </div>
      <input ref={inputRef} type="file" accept="image/*"
        onChange={e => e.target.files[0] && onCoverSelect(e.target.files[0])} />
    </div>
  );
}

// File Zone
function FileZone({ mp3File, onFileSelect, error, disabled }) {
  const inputRef = useRef();
  const [drag, setDrag] = useState(false);
  const handleDrop = (e) => {
    e.preventDefault(); setDrag(false);
    if (disabled) return;
    const f = e.dataTransfer.files[0];
    if (f) onFileSelect(f);
  };
  return (
    <div className="field full">
      <label>MP3 File <span className="req">*</span></label>
      <div
        className={`file-zone${drag ? ' drag-over' : ''}`}
        onClick={() => !disabled && inputRef.current.click()}
        onDragOver={e => { e.preventDefault(); !disabled && setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={handleDrop}
      >
        {mp3File ? (
          <div className="file-selected">
            <IconHeadphones size={18} color="#a78bfa" />
            <div className="file-name">{mp3File.name}</div>
            <div className="file-size">{formatBytes(mp3File.size)}</div>
          </div>
        ) : (
          <>
            <IconUpload size={18} color="#333" />
            <div className="file-zone-text">Drop MP3 here or click to browse</div>
            <div className="file-zone-sub">MP3 only · max 10MB</div>
          </>
        )}
      </div>
      {error && <div className="field-error"><IconAlert size={12} color="var(--error)" /> {error}</div>}
      <input ref={inputRef} type="file" accept=".mp3,audio/mpeg"
        onChange={e => e.target.files[0] && onFileSelect(e.target.files[0])} />
    </div>
  );
}

// Track Card
function TrackCard({ track, index, onUpdate, onRemove, canRemove, coverFile }) {
  const disabled = track.status === 'uploading' || track.status === 'success';
  const set = (field, value) => onUpdate(track.id, { [field]: value });

  const validateFile = (file) => {
    if (!file.type.includes('mp3') && !file.name.toLowerCase().endsWith('.mp3'))
      return 'Only MP3 files are allowed.';
    if (file.size > 10 * 1024 * 1024) return 'File exceeds 10MB limit.';
    return null;
  };

  const handleFileSelect = (file) => {
    const err = validateFile(file);
    if (err) onUpdate(track.id, { errors: { ...track.errors, mp3: err } });
    else onUpdate(track.id, { mp3File: file, errors: { ...track.errors, mp3: null } });
  };

  const validate = () => {
    const errs = {};
    if (!track.artistName.trim()) errs.artistName = 'Required';
    if (!track.releaseTitle.trim()) errs.releaseTitle = 'Required';
    if (!track.mp3File) errs.mp3 = 'Please select an MP3 file.';
    return errs;
  };

  // ✅ UPDATED: Formspree email notification (no backend needed)
  const sendEmailNotification = async (fileUrl, coverUrl) => {
    try {
      const res = await fetch("https://formspree.io/f/mojbrkgn", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
       body: JSON.stringify({
  _subject: `New Upload: ${track.releaseTitle} by ${track.artistName}`,
  _replyto: "noreply@444music.com",  // ← add this
  "Artist Name": track.artistName,
  "Release Title": track.releaseTitle,
  "Featuring Artist": track.featuringArtist || "None",
  "Download Link": fileUrl,
  "Cover Art Link": coverUrl || "No cover uploaded",
}),
      });
      if (!res.ok) {
        const text = await res.text();
        console.error("Formspree error:", text);
      }
    } catch (e) {
      console.warn("Email notification failed:", e);
    }
  };

  const handleUpload = async () => {
    const errs = validate();
    if (Object.keys(errs).length > 0) { onUpdate(track.id, { errors: errs }); return; }
    onUpdate(track.id, { status: 'uploading', progress: 0, errorMsg: '', errors: {} });

    try {
      const mp3Ext = track.mp3File.name.split('.').pop();
      const mp3Path = `tracks/${Date.now()}_${Math.random().toString(36).slice(2)}.${mp3Ext}`;

      let simulatedProgress = 0;
      const progressInterval = setInterval(() => {
        simulatedProgress = Math.min(simulatedProgress + Math.random() * 18 + 5, 82);
        onUpdate(track.id, { progress: Math.round(simulatedProgress) });
      }, 120);

      const { error: mp3Err } = await supabase.storage
        .from('music-uploads')
        .upload(mp3Path, track.mp3File, { contentType: 'audio/mpeg', upsert: false });

      clearInterval(progressInterval);
      if (mp3Err) throw new Error(mp3Err.message);

      onUpdate(track.id, { progress: 90 });

      const { data: { publicUrl: fileUrl } } = supabase.storage
        .from('music-uploads').getPublicUrl(mp3Path);

      let coverUrl = null;
      if (coverFile) {
        const covExt = coverFile.name.split('.').pop();
        const covPath = `covers/${Date.now()}_${Math.random().toString(36).slice(2)}.${covExt}`;
        const { error: covErr } = await supabase.storage
          .from('music-uploads').upload(covPath, coverFile, { upsert: false });
        if (!covErr) {
          const { data: { publicUrl } } = supabase.storage
            .from('music-uploads').getPublicUrl(covPath);
          coverUrl = publicUrl;
        }
      }

      onUpdate(track.id, { progress: 95 });

      const { error: dbErr } = await supabase.from('tracks').insert({
        artist_name: track.artistName.trim(),
        release_title: track.releaseTitle.trim(),
        featuring_artist: track.featuringArtist.trim() || null,
        file_url: fileUrl,
        cover_url: coverUrl,
      });

      if (dbErr) throw new Error(dbErr.message);

      await sendEmailNotification(fileUrl, coverUrl);

      onUpdate(track.id, { progress: 100, status: 'success' });
      setTimeout(() => { window.location.href = 'averagee.html'; }, 1500);

    } catch (err) {
      onUpdate(track.id, { status: 'error', errorMsg: err.message || 'Upload failed. Please try again.', progress: 0 });
    }
  };

  return (
    <div className="track-card">
      <div className="card-header">
        <span className="track-number">Track {String(index + 1).padStart(2, '0')}</span>
        {canRemove && track.status !== 'uploading' && (
          <button className="remove-btn" onClick={() => onRemove(track.id)} title="Remove">
            <IconX size={12} />
          </button>
        )}
      </div>

      <div className="card-body">
        <div className="field">
          <label>Artist Name <span className="req">*</span></label>
          <input type="text" placeholder="e.g. Burna Boy" value={track.artistName}
            disabled={disabled} onChange={e => set('artistName', e.target.value)} />
          {track.errors.artistName && <div className="field-error"><IconAlert /> {track.errors.artistName}</div>}
        </div>

        <div className="field">
          <label>Release Title <span className="req">*</span></label>
          <input type="text" placeholder="e.g. Abundance" value={track.releaseTitle}
            disabled={disabled} onChange={e => set('releaseTitle', e.target.value)} />
          {track.errors.releaseTitle && <div className="field-error"><IconAlert /> {track.errors.releaseTitle}</div>}
        </div>

        <div className="field full">
          <label>Featuring Artist <span className="opt">optional</span></label>
          <input type="text" placeholder="Leave blank if none"
            value={track.featuringArtist} disabled={disabled}
            onChange={e => set('featuringArtist', e.target.value)} />
        </div>

        <FileZone mp3File={track.mp3File} onFileSelect={handleFileSelect}
          error={track.errors.mp3} disabled={disabled} />

        {(track.status === 'uploading' || track.status === 'success') && (
          <div className="progress-wrap">
            <div className="progress-label">
              <span>{track.status === 'success' ? 'Complete' : 'Uploading'}</span>
              <span>{track.progress}%</span>
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{ width: `${track.progress}%` }} />
            </div>
          </div>
        )}

        {track.status === 'error' && track.errorMsg && (
          <div className="error-banner">
            <IconAlert size={13} color="var(--error)" style={{flexShrink:0,marginTop:'1px'}} />
            <span>{track.errorMsg}</span>
          </div>
        )}

        {track.status === 'success' && (
          <div className="success-banner">
            <IconCheck size={16} color="var(--success)" />
            <div>
              <div className="success-text">Upload complete</div>
              <div className="success-sub">Redirecting…</div>
            </div>
          </div>
        )}

        {track.status !== 'success' && (
          <button className="upload-btn" onClick={handleUpload} disabled={disabled}>
            {track.status === 'uploading' ? (
              <><div className="spinner" /> Uploading — {track.progress}%</>
            ) : (
              <><IconArrowUp size={14} /> Upload Track</>
            )}
          </button>
        )}
      </div>
    </div>
  );
}

// App
function App() {
  const [tracks, setTracks] = useState([createTrack()]);
  const [coverFile, setCoverFile] = useState(null);
  const [coverPreview, setCoverPreview] = useState(null);

  const updateTrack = useCallback((id, patch) => {
    setTracks(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t));
  }, []);

  const removeTrack = useCallback((id) => {
    setTracks(prev => prev.filter(t => t.id !== id));
  }, []);

  const addTrack = () => setTracks(prev => [...prev, createTrack()]);

  const handleCoverSelect = (file) => {
    setCoverFile(file);
    setCoverPreview(URL.createObjectURL(file));
  };

  return (
    <div>
      <header className="header">
        <div className="logo">
          <div className="logo-mark">444</div>
          MusicDistro
        </div>
        <div className="header-badge">Distribution Portal</div>
      </header>

      <main className="main">
        <h1 className="page-title">Upload Your Music</h1>
        <p className="page-subtitle">distribute to 150+ platforms · release in 24–48 hrs</p>

        <GlobalCoverArt coverPreview={coverPreview} onCoverSelect={handleCoverSelect} />

        {tracks.map((track, i) => (
          <TrackCard
            key={track.id} track={track} index={i}
            onUpdate={updateTrack} onRemove={removeTrack}
            canRemove={tracks.length > 1}
            coverFile={coverFile}
          />
        ))}

        <button className="add-track-btn" onClick={addTrack}>
          <IconPlus size={14} /> Add Another Track
        </button>

        <div className="footer-note">
          <IconShield size={12} color="#222" />
          Files encrypted in transit · stored on Supabase · max 10MB per track
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
