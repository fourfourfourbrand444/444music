<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading...</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p0: #0d0a1a;
      --p1: #150f2e;
      --p2: #1e1545;
      --accent: #8b5cf6;
      --accent2: #a78bfa;
      --accent3: #c4b5fd;
      --glow: rgba(139,92,246,0.45);
      --text: #f0ebff;
      --muted: rgba(196,181,253,0.55);
    }

    html, body {
      height: 100%;
      background: var(--p0);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── Gradient mesh background ── */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(109,40,217,0.28) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139,92,246,0.20) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 55% 45%, rgba(167,139,250,0.10) 0%, transparent 50%),
        var(--p0);
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(60px);
      pointer-events: none; z-index: 0;
    }
    .orb-1 {
      width: min(480px, 70vw); height: min(480px, 70vw);
      top: -15%; left: -10%;
      background: radial-gradient(circle, rgba(109,40,217,0.35), transparent 70%);
      animation: drift1 8s ease-in-out infinite;
    }
    .orb-2 {
      width: min(360px, 55vw); height: min(360px, 55vw);
      bottom: -10%; right: -5%;
      background: radial-gradient(circle, rgba(139,92,246,0.28), transparent 70%);
      animation: drift2 10s ease-in-out infinite;
    }
    .orb-3 {
      width: min(200px, 35vw); height: min(200px, 35vw);
      top: 50%; left: 60%;
      background: radial-gradient(circle, rgba(196,181,253,0.15), transparent 70%);
      animation: drift1 6s ease-in-out infinite reverse;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(30px,-30px) scale(1.06); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-20px,20px) scale(1.04); }
    }

    /* ── Stage ── */
    .stage {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      gap: 2.5rem;
    }

    /* ── Logo / Brand mark ── */
    .brand {
      display: flex; align-items: center; gap: 0.75rem;
      animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      border-radius: 14px;
      display: grid; place-items: center;
      box-shadow: 0 0 24px var(--glow), 0 2px 8px rgba(0,0,0,0.4);
      position: relative; overflow: hidden;
    }
    .brand-icon::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
    }
    .brand-icon svg { width: 24px; height: 24px; fill: white; position: relative; z-index: 1; }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem; font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* ── Central content ── */
    .content {
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
      gap: 1rem;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 0%, var(--accent3) 55%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.9s .1s cubic-bezier(.22,1,.36,1) both;
    }

    .sub {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.01em;
      max-width: 320px;
      animation: fadeUp 0.9s .2s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Spinner ── */
    .spinner-wrap {
      position: relative; width: 72px; height: 72px;
      animation: fadeUp 0.9s .3s cubic-bezier(.22,1,.36,1) both;
    }
    .ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }
    .ring-outer {
      border-top-color: var(--accent);
      border-right-color: rgba(139,92,246,0.3);
      animation: spin 1.1s linear infinite;
      box-shadow: 0 0 16px var(--glow);
    }
    .ring-inner {
      inset: 10px;
      border-bottom-color: var(--accent3);
      border-left-color: rgba(196,181,253,0.25);
      animation: spin 0.75s linear infinite reverse;
    }
    .ring-dot {
      inset: 22px;
      border-top-color: rgba(167,139,250,0.7);
      animation: spin 1.6s linear infinite;
    }
    .ring-core {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 12px var(--accent2), 0 0 24px var(--glow);
      animation: pulse-core 1.5s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-core {
      0%,100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 0.6; transform: translate(-50%,-50%) scale(0.7); }
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: min(320px, 80vw);
      animation: fadeUp 0.9s .4s cubic-bezier(.22,1,.36,1) both;
    }
    .progress-track {
      width: 100%; height: 3px;
      background: rgba(139,92,246,0.15);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      border-radius: 99px;
      box-shadow: 0 0 8px var(--glow);
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-bar::after {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 40px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
      border-radius: 99px;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .progress-label {
      display: flex; justify-content: space-between;
      margin-top: 0.6rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    #pct { color: var(--accent3); font-variant-numeric: tabular-nums; }

    /* ── Dots indicator ── */
    .dots {
      display: flex; gap: 6px;
      animation: fadeUp 0.9s .5s cubic-bezier(.22,1,.36,1) both;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      opacity: 0.3;
    }
    .dot:nth-child(1) { animation: blink 1.4s .0s ease-in-out infinite; }
    .dot:nth-child(2) { animation: blink 1.4s .2s ease-in-out infinite; }
    .dot:nth-child(3) { animation: blink 1.4s .4s ease-in-out infinite; }
    @keyframes blink {
      0%,100% { opacity: 0.25; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.4); box-shadow: 0 0 6px var(--glow); }
    }

    /* ── Fade-out overlay ── */
    .fade-out {
      position: fixed; inset: 0; z-index: 99;
      background: var(--p0);
      opacity: 0; pointer-events: none;
      transition: opacity 0.55s ease;
    }
    .fade-out.active { opacity: 1; pointer-events: all; }

    /* ── Utility animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 400px) {
      .spinner-wrap { width: 60px; height: 60px; }
      .ring-inner { inset: 8px; }
      .ring-dot   { inset: 18px; }
      .ring-core  { width: 7px; height: 7px; }
    }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="fade-out" id="fadeOut"></div>

  <main class="stage">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="brand-name">Studio</span>
    </div>

    <div class="content">
      <h1 class="headline">Getting things<br>ready for you</h1>
      <p class="sub">Hang tight — this will only take a moment.</p>
    </div>

    <div class="spinner-wrap">
      <div class="ring ring-outer"></div>
      <div class="ring ring-inner"></div>
      <div class="ring ring-dot"></div>
      <div class="ring-core"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-bar" id="bar"></div>
      </div>
      <div class="progress-label">
        <span>Loading</span>
        <span id="pct">0%</span>
      </div>
    </div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </main>

  <script>
    const bar    = document.getElementById('bar');
    const pct    = document.getElementById('pct');
    const fadeEl = document.getElementById('fadeOut');

    let progress = 0;
    const duration = 2800; // ms total
    const start    = performance.now();

    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    function tick(now) {
      const elapsed = now - start;
      const raw     = Math.min(elapsed / duration, 1);
      progress      = ease(raw) * 100;

      bar.style.width = progress + '%';
      pct.textContent = Math.round(progress) + '%';

      if (raw < 1) {
        requestAnimationFrame(tick);
      } else {
        bar.style.width = '100%';
        pct.textContent = '100%';
        setTimeout(() => {
          fadeEl.classList.add('active');
          setTimeout(() => { window.location.href = 'home.html'; }, 580);
        }, 260);
      }
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
