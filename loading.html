<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading... • 444Music</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070707;
      --surface: #111111;
      --border: rgba(255,255,255,0.1);
      --text: #f5f5f5;
      --muted: #7a7a7a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    /* subtle grain, matches homepage */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .stage {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      gap: 2.25rem;
    }

    /* Brand mark */
    .brand {
      display: flex; align-items: center; gap: 0.65rem;
      animation: fadeUp 0.6s ease both;
    }
    .brand-icon {
      width: 42px; height: 42px;
      background: var(--text);
      border-radius: 11px;
      display: grid; place-items: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 18px;
      color: #000;
    }
    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem; font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    /* Simple single spinner ring */
    .spinner {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.12);
      border-top-color: var(--text);
      animation: spin 0.85s linear infinite;
      animation-delay: 0.15s;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s both, spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .headline {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.6rem);
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--text);
      text-align: center;
      animation: fadeUp 0.6s ease 0.05s both;
    }

    .sub {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 400;
      text-align: center;
      margin-top: -0.9rem;
      animation: fadeUp 0.6s ease 0.15s both;
    }

    /* Progress bar */
    .progress-wrap {
      width: min(260px, 78vw);
      animation: fadeUp 0.6s ease 0.2s both;
    }
    .progress-track {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--text);
      border-radius: 99px;
      width: 0%;
      transition: width 0.25s ease;
    }
    .progress-label {
      display: flex; justify-content: space-between;
      margin-top: 0.55rem;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    #pct { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Fade-out on complete */
    .fade-out {
      position: fixed; inset: 0; z-index: 99;
      background: var(--bg);
      opacity: 0; pointer-events: none;
      transition: opacity 0.45s ease;
    }
    .fade-out.active { opacity: 1; pointer-events: all; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="fade-out" id="fadeOut"></div>

  <main class="stage">

    <div class="brand">
      <div class="brand-icon">4</div>
      <span class="brand-name">444Music</span>
    </div>

    <div class="spinner"></div>

    <div>
      <h1 class="headline">Getting things ready</h1>
      <p class="sub">Just a moment.</p>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-bar" id="bar"></div>
      </div>
      <div class="progress-label">
        <span>Loading</span>
        <span id="pct">0%</span>
      </div>
    </div>

  </main>

  <script>
    const bar    = document.getElementById('bar');
    const pct    = document.getElementById('pct');
    const fadeEl = document.getElementById('fadeOut');

    let progress = 0;
    const duration = 1800; // ms total — kept short and simple
    const start    = performance.now();

    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    function tick(now) {
      const elapsed = now - start;
      const raw     = Math.min(elapsed / duration, 1);
      progress      = ease(raw) * 100;

      bar.style.width = progress + '%';
      pct.textContent = Math.round(progress) + '%';

      if (raw < 1) {
        requestAnimationFrame(tick);
      } else {
        bar.style.width = '100%';
        pct.textContent = '100%';
        setTimeout(() => {
          fadeEl.classList.add('active');
          setTimeout(() => { window.location.href = 'home.html'; }, 460);
        }, 200);
      }
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
