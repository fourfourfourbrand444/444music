<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>444Music</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070707;
      --white: #ffffff;
      --muted: #7a7a7a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .stage {
      position: relative; z-index: 1;
      height: 100dvh; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ═══ LOADING SCREEN — logo only, no text ═══ */
    #loadScreen {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #loadScreen.hide {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }

    .logo-wrap {
      position: relative;
      width: 132px; height: 132px;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.5s ease both, breathe 1.9s ease-in-out 0.5s infinite;
    }

    .logo-wrap img {
      width: 60px; height: auto;
      filter: brightness(0) invert(1);
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: logoIn 0.5s ease 0.1s both;
    }

    /* fallback mark if the image fails to load */
    .logo-fallback {
      position: absolute; z-index: 2;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 34px;
      color: var(--white);
      display: none;
      opacity: 0;
      animation: logoIn 0.5s ease 0.1s both;
    }

    /* progress ring around the logo */
    .ring-svg {
      position: absolute; inset: 0;
      transform: rotate(-90deg);
      z-index: 1;
    }
    .ring-track { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 1.5; }
    .ring-fill  {
      fill: none; stroke: var(--white); stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 377;
      stroke-dashoffset: 377;
      transition: stroke-dashoffset 0.2s linear;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.045); }
    }

    /* ═══ SUCCESS SCREEN ═══ */
    #successScreen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px;
      opacity: 0;
      transform: scale(0.97);
      pointer-events: none;
      transition: opacity 0.55s ease 0.1s, transform 0.55s ease 0.1s;
    }
    #successScreen.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: all;
    }

    .check-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.16);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .check-circle svg { width: 30px; height: 30px; }
    .check-circle path {
      fill: none;
      stroke: var(--white);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
    }
    #successScreen.show .check-circle path {
      animation: draw 0.5s ease 0.35s forwards;
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    .success-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.2px;
      color: var(--white);
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s ease 0.55s, transform 0.4s ease 0.55s;
    }
    #successScreen.show .success-text {
      opacity: 1;
      transform: translateY(0);
    }

    .success-link {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease, opacity 0.4s ease 0.65s, transform 0.4s ease 0.65s;
      opacity: 0;
      transform: translateY(6px);
    }
    #successScreen.show .success-link {
      opacity: 1;
      transform: translateY(0);
    }
    .success-link:hover { color: var(--white); border-color: var(--white); }
  </style>
</head>
<body>

  <main class="stage">

    <div id="loadScreen">
      <div class="logo-wrap">
        <svg class="ring-svg" viewBox="0 0 132 132">
          <circle class="ring-track" cx="66" cy="66" r="60"></circle>
          <circle class="ring-fill" id="ringFill" cx="66" cy="66" r="60"></circle>
        </svg>
        <img src="https://www.444musicdistro.com/black.png" alt=""
             onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex';">
        <div class="logo-fallback">4</div>
      </div>
    </div>

    <div id="successScreen">
      <div class="check-circle">
        <svg viewBox="0 0 24 24"><path d="M4 12.5L9.5 18L20 6"></path></svg>
      </div>
      <div class="success-text">Account Created Successfully</div>
      <a href="home.html" class="success-link">Continue →</a>
    </div>

  </main>

  <script>
    const ring = document.getElementById('ringFill');
    const loadScreen = document.getElementById('loadScreen');
    const successScreen = document.getElementById('successScreen');
    const CIRCUMFERENCE = 377;

    let progress = 0;
    const duration = 1900;
    const start = performance.now();

    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    function tick(now) {
      const elapsed = now - start;
      const raw = Math.min(elapsed / duration, 1);
      progress = ease(raw);

      ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

      if (raw < 1) {
        requestAnimationFrame(tick);
      } else {
        setTimeout(() => {
          loadScreen.classList.add('hide');
          successScreen.classList.add('show');
        }, 150);

        // auto-continue after showing success briefly
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 2600);
      }
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
