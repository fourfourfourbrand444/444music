<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>444Music Analytics Manager</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6fb;
margin:0;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.search{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.artist{
font-size:18px;
font-weight:bold;
}

.email{
color:#777;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
margin-top:10px;
}

input{
padding:8px;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px 16px;
background:#ff2e63;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

@media(max-width:600px){

body{
padding:15px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Analytics Manager</h1>

<input id="search" class="search" placeholder="Search artist email (min 3 letters)">

<div id="results"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";


/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* GLOBAL DATA */

let analyticsData = [];


/* LOAD ANALYTICS */

async function loadAnalytics(){

const snap = await getDocs(collection(db,"analytics"));

analyticsData = [];

snap.forEach(docSnap=>{

analyticsData.push({
id: docSnap.id,
...docSnap.data()
});

});

console.log("Analytics Loaded:",analyticsData);

}

await loadAnalytics();


/* SEARCH */

const searchInput = document.getElementById("search");
const results = document.getElementById("results");

searchInput.addEventListener("input",()=>{

const value = searchInput.value.toLowerCase();

results.innerHTML="";

if(value.length < 3) return;

const filtered = analyticsData.filter(a =>
a.email && a.email.toLowerCase().includes(value)
);

filtered.forEach(a=>{

const card = document.createElement("div");
card.className="card";

card.innerHTML = `

<div class="artist">${a.name || "Artist"}</div>
<div class="email">${a.email}</div>

<div class="grid">

<div>
<label>Total Streams</label>
<input id="total-${a.id}" value="${a.totalStreams || 0}">
</div>

<div>
<label>Spotify</label>
<input id="spotify-${a.id}" value="${a.spotifyStreams || 0}">
</div>

<div>
<label>Apple Music</label>
<input id="apple-${a.id}" value="${a.appleStreams || 0}">
</div>

<div>
<label>YouTube</label>
<input id="youtube-${a.id}" value="${a.youtubeStreams || 0}">
</div>

</div>

<button onclick="saveAnalytics('${a.id}')">Save</button>

`;

results.appendChild(card);

});

});


/* SAVE FUNCTION */

window.saveAnalytics = async function(id){

const total = document.getElementById(`total-${id}`).value;
const spotify = document.getElementById(`spotify-${id}`).value;
const apple = document.getElementById(`apple-${id}`).value;
const youtube = document.getElementById(`youtube-${id}`).value;

try{

await updateDoc(doc(db,"analytics",id),{

totalStreams:Number(total),
spotifyStreams:Number(spotify),
appleStreams:Number(apple),
youtubeStreams:Number(youtube)

});

alert("Streams updated successfully");

}catch(err){

alert("Error updating streams");

console.error(err);

}

}

</script>

</body>
</html>
