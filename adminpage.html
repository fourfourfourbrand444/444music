<!DOCTYPE html>
<html>
<head>
<title>Artist Analytics Editor</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
padding:40px;
}

h1{
margin-bottom:20px;
}

.search{
padding:10px;
width:300px;
margin-bottom:30px;
border:none;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
}

input{
width:100px;
background:#1a1a1a;
border:1px solid #333;
color:white;
padding:6px;
}

button{
background:#00c853;
border:none;
padding:8px 12px;
border-radius:5px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Artist Analytics Editor</h1>

<input class="search" id="search" placeholder="Search artist">

<table>

<thead>
<tr>
<th>Artist</th>
<th>Total</th>
<th>Spotify</th>
<th>Apple</th>
<th>YouTube</th>
<th>Country 1</th>
<th>Country 2</th>
<th>Country 3</th>
<th>Save</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "usersubmissionsportal.firebaseapp.com",
  projectId: "usersubmissionsportal",
  storageBucket: "usersubmissionsportal.appspot.com",
  messagingSenderId: "734783502459",
  appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("tableBody");

const users = await getDocs(collection(db,"users"));

users.forEach(async(userDoc)=>{

const user = userDoc.data();
const uid = userDoc.id;

const analyticsSnap = await getDoc(doc(db,"analytics",uid));
const analytics = analyticsSnap.data();

const row = document.createElement("tr");

row.innerHTML = `

<td>${user.name || user.email}</td>

<td><input id="total-${uid}" value="${analytics?.totalStreams || 0}"></td>

<td><input id="spotify-${uid}" value="${analytics?.spotifyStreams || 0}"></td>

<td><input id="apple-${uid}" value="${analytics?.appleStreams || 0}"></td>

<td><input id="youtube-${uid}" value="${analytics?.youtubeStreams || 0}"></td>

<td><input id="c1-${uid}" value="${analytics?.topCountry1 || ""}"></td>

<td><input id="c2-${uid}" value="${analytics?.topCountry2 || ""}"></td>

<td><input id="c3-${uid}" value="${analytics?.topCountry3 || ""}"></td>

<td><button onclick="save('${uid}')">Save</button></td>

`;

table.appendChild(row);

});

window.save = async(uid)=>{

await updateDoc(doc(db,"analytics",uid),{

totalStreams:Number(document.getElementById(`total-${uid}`).value),
spotifyStreams:Number(document.getElementById(`spotify-${uid}`).value),
appleStreams:Number(document.getElementById(`apple-${uid}`).value),
youtubeStreams:Number(document.getElementById(`youtube-${uid}`).value),

topCountry1:document.getElementById(`c1-${uid}`).value,
topCountry2:document.getElementById(`c2-${uid}`).value,
topCountry3:document.getElementById(`c3-${uid}`).value

});

alert("Updated");

};


document.getElementById("search").addEventListener("input",function(){

const term=this.value.toLowerCase();

document.querySelectorAll("#tableBody tr").forEach(row=>{

row.style.display=row.innerText.toLowerCase().includes(term)?"":"none";

});

});

</script>

</body>
</html>
