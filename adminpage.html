<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>444Music Admin • Analytics</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-bottom:25px;
font-size:16px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:12px;
margin-bottom:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.artist{
font-size:18px;
font-weight:bold;
}

.fields{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
}

button{
background:#ff2e63;
border:none;
padding:10px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="container">

<h1><i class="fa-solid fa-sliders"></i> Analytics Manager</h1>

<input type="text" id="search" class="search"
placeholder="Search artist or email...">

<div id="artists"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import { getFirestore, collection, getDocs, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("artists");

let artists=[];

async function loadArtists(){

const snap = await getDocs(collection(db,"analytics"));

snap.forEach(docSnap=>{

const data = docSnap.data();

artists.push({
id:docSnap.id,
...data
});

});

renderArtists(artists);

}

function renderArtists(list){

container.innerHTML="";

list.forEach(a=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`

<div class="artist">${a.artistName}</div>
<div>${a.email}</div>

<div class="fields">

<div>
<label>Total Streams</label>
<input id="streams-${a.id}" type="number" value="${a.totalStreams || 0}">
</div>

<div>
<label>Spotify</label>
<input id="spotify-${a.id}" type="number" value="${a.spotifyStreams || 0}">
</div>

<div>
<label>Apple</label>
<input id="apple-${a.id}" type="number" value="${a.appleStreams || 0}">
</div>

<div>
<label>YouTube</label>
<input id="youtube-${a.id}" type="number" value="${a.youtubeStreams || 0}">
</div>

<div>
<label>Total Releases</label>
<input id="releases-${a.id}" type="number" value="${a.totalReleases || 0}">
</div>

</div>

<button onclick="save('${a.id}')">
<i class="fa-solid fa-floppy-disk"></i> Save
</button>

`;

container.appendChild(div);

});

}

window.save = async function(id){

const ref = doc(db,"analytics",id);

await updateDoc(ref,{
totalStreams:Number(document.getElementById(`streams-${id}`).value),
spotifyStreams:Number(document.getElementById(`spotify-${id}`).value),
appleStreams:Number(document.getElementById(`apple-${id}`).value),
youtubeStreams:Number(document.getElementById(`youtube-${id}`).value),
totalReleases:Number(document.getElementById(`releases-${id}`).value)
});

alert("Analytics Updated");

}

document.getElementById("search").addEventListener("input",function(){

const value=this.value.toLowerCase();

const filtered = artists.filter(a=>
(a.artistName || "").toLowerCase().includes(value) ||
(a.email || "").toLowerCase().includes(value)
);

renderArtists(filtered);

});

loadArtists();

</script>

</body>
</html>
