<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to 444Music</title>

<link rel="stylesheet" href="s.css">

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">

<div class="card">

<div class="success-icon">
<i class="ri-checkbox-circle-fill"></i>
</div>

<h1>Account Created Successfully</h1>
<p class="subtitle">Start your music journey with 444Music Distribution</p>
<div class="artist-badge">
<i class="ri-verified-badge-fill"></i>
Verified Artist Account Activated
</div>

<div class="progress-box">

<div class="step completed">
<i class="ri-user-line"></i>
Account Setup
</div>

<div class="step completed">
<i class="ri-shield-check-line"></i>
Security Verified
</div>

<div class="step">
<i class="ri-music-2-line"></i>
Upload First Release
</div>

</div>

<div class="benefits">
  <div class="benefit">
<i class="ri-global-line"></i>
<span>Worldwide distribution</span>
</div>

<div class="benefit">
<i class="ri-money-dollar-circle-line"></i>
<span>Keep your royalties</span>
</div>

<div class="benefit">
<i class="ri-bar-chart-box-line"></i>
<span>Real-time analytics</span>
</div>

</div>

<button class="btn" onclick="goHome()">
<i class="ri-home-4-line"></i> Go to Dashboard
</button>

<p class="redirect">Redirecting in a few seconds...</p>

</div>
</div>
<script>
function goHome(){
window.location.href = "home.html";
}

setTimeout(()=>{
window.location.href = "home.html";
},6000);


/* confetti */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*6+2,
speed:Math.random()*3+1
});
}

function update(){
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{
ctx.fillStyle="rgba(180,100,255,0.8)";
ctx.fillRect(p.x,p.y,p.size,p.size);

p.y += p.speed;

if(p.y > canvas.height){
p.y = -10;
}
});

requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
