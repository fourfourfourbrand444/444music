<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Created • 444Music</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #06080f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Outfit', sans-serif;
  padding: 20px;
}

/* card */
.card {
  position: relative;
  width: 100%;
  max-width: 370px;
  background: #0b0d18;
  border: 1px solid rgba(99,120,255,0.18);
  border-radius: 20px;
  padding: 40px 28px 32px;
  text-align: center;
  overflow: hidden;
  opacity: 0;
  transform: translateY(18px);
  animation: cardIn 0.55s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
}
@keyframes cardIn { to { opacity:1; transform:translateY(0); } }

/* top edge accent line */
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(99,120,255,0.6), transparent);
}

/* brand */
.brand {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; margin-bottom: 32px;
}
.brand-mark {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: #3d4fff;
  display: flex; align-items: center; justify-content: center;
}
.brand-mark i { font-size: 12px; color: #fff; }
.brand-name {
  font-size: 11px; font-weight: 600;
  color: #3a3d55; letter-spacing: 2.5px; text-transform: uppercase;
}

/* icon */
.icon-wrap {
  position: relative;
  width: 88px; height: 88px;
  margin: 0 auto 24px;
}

.icon-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1px solid rgba(99,120,255,0.4);
  animation: expand 2.8s ease-out infinite;
}
.icon-ring-2 { animation-delay: 1.4s; }
@keyframes expand {
  0%   { transform: scale(1);    opacity: 0.5; }
  100% { transform: scale(1.85); opacity: 0; }
}

.icon-bg {
  position: relative; z-index: 2;
  width: 88px; height: 88px; border-radius: 50%;
  background: #0f1225;
  border: 1px solid rgba(99,120,255,0.22);
  display: flex; align-items: center; justify-content: center;
  animation: bob 4s ease-in-out infinite;
}
@keyframes bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* particle canvas over icon */
#pcv {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 220px; height: 220px;
  pointer-events: none; z-index: 1;
}

/* sparkles */
.sp {
  position: absolute; border-radius: 50%;
  background: #818cf8; z-index: 4; pointer-events: none;
}
.s1{width:4px;height:4px;top:-4px;left:calc(50% - 2px);animation:sp 3.0s 1.1s ease-in-out infinite;}
.s2{width:3px;height:3px;top:12px;right:-6px;           animation:sp 2.8s 1.6s ease-in-out infinite;}
.s3{width:4px;height:4px;bottom:-3px;left:14px;         animation:sp 3.2s 2.0s ease-in-out infinite;}
.s4{width:3px;height:3px;bottom:10px;right:-5px;        animation:sp 2.6s 0.7s ease-in-out infinite;}
.s5{width:3px;height:3px;top:22px;left:-7px;            animation:sp 3.1s 1.4s ease-in-out infinite; background:#a5b4fc;}
.s6{width:4px;height:4px;top:-7px;left:26px;            animation:sp 2.9s 2.3s ease-in-out infinite;}
@keyframes sp {
  0%,100%{opacity:0;transform:scale(0.3);}
  45%,55%{opacity:1;transform:scale(1);}
}

/* SVG shield-check */
.shield-svg { width: 40px; height: 40px; }

.shield-path {
  fill: none;
  stroke: url(#sGrad);
  stroke-width: 2.5;
  stroke-linejoin: round;
  stroke-dasharray: 200;
  stroke-dashoffset: 200;
  animation: drawShield 0.8s ease 0.4s forwards;
}
@keyframes drawShield { to { stroke-dashoffset: 0; } }

.shield-check {
  fill: none;
  stroke: #a5b4fc;
  stroke-width: 2.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 40;
  stroke-dashoffset: 40;
  animation: drawCheck 0.45s ease 0.9s forwards;
}
@keyframes drawCheck { to { stroke-dashoffset: 0; } }

/* text */
h2 {
  font-size: 20px; font-weight: 700;
  color: #eeeeff; margin-bottom: 7px; letter-spacing: -0.2px;
}
.sub {
  font-size: 13px; color: #3e3f58;
  line-height: 1.6; margin-bottom: 28px; font-weight: 400;
}

/* steps */
.steps {
  display: flex; flex-direction: column; gap: 7px;
  margin-bottom: 28px; text-align: left;
}
.step {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; border-radius: 10px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  font-size: 13px; font-weight: 500; color: #3a3d55;
}
.step.done {
  border-color: rgba(99,120,255,0.18);
}
.step-dot {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #3a3d55;
}
.step.done .step-dot {
  background: rgba(99,120,255,0.15);
  border-color: rgba(99,120,255,0.3);
  color: #818cf8;
}
.step.done { color: #a5b4fc; }

/* divider */
.divider { height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 20px; }

/* button */
.btn {
  width: 100%; padding: 13px; border-radius: 11px;
  background: #3d4fff; border: none; color: #fff;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.1px;
  transition: background 0.2s, box-shadow 0.25s, transform 0.15s;
}
.btn:hover {
  background: #2f3ef0;
  box-shadow: 0 0 26px rgba(61,79,255,0.45);
}
.btn:active { transform: scale(0.98); }

@media(max-width:400px){
  .card{padding:32px 18px 26px;}
  h2{font-size:18px;}
}
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-mark"><i class="ri-music-2-line"></i></div>
    <span class="brand-name">444Music</span>
  </div>

  <div class="icon-wrap">
    <canvas id="pcv"></canvas>
    <div class="icon-ring"></div>
    <div class="icon-ring icon-ring-2"></div>
    <div class="sp s1"></div>
    <div class="sp s2"></div>
    <div class="sp s3"></div>
    <div class="sp s4"></div>
    <div class="sp s5"></div>
    <div class="sp s6"></div>

    <div class="icon-bg">
      <svg class="shield-svg" viewBox="0 0 40 40" fill="none">
        <defs>
          <linearGradient id="sGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#818cf8"/>
          </linearGradient>
        </defs>
        <!-- shield outline -->
        <path class="shield-path"
          d="M20 4 L34 10 L34 22 C34 29 27 35 20 38 C13 35 6 29 6 22 L6 10 Z"/>
        <!-- checkmark inside -->
        <polyline class="shield-check" points="13,21 18,26 28,15"/>
      </svg>
    </div>
  </div>

  <h2>Account Created</h2>
  <p class="sub">Welcome to 444Music. Your artist profile<br>is live and ready to go.</p>

  <div class="steps">
    <div class="step done">
      <div class="step-dot"><i class="ri-user-line"></i></div>
      Account created
    </div>
    <div class="step done">
      <div class="step-dot"><i class="ri-shield-check-line"></i></div>
      Identity verified
    </div>
    <div class="step">
      <div class="step-dot"><i class="ri-upload-cloud-line"></i></div>
      Upload your first release
    </div>
  </div>

  <div class="divider"></div>

  <button class="btn" onclick="window.location.href='home.html'">
    Continue to Dashboard
  </button>

</div>

<script>
(function(){
  const c = document.getElementById('pcv');
  const x = c.getContext('2d');
  c.width = 220; c.height = 220;
  const cx = 110, cy = 110;
  const cols = ['#6366f1','#818cf8','#a5b4fc','#4f46e5','#c7d2fe','#34d399'];

  function r(a,b){ return Math.random()*(b-a)+a; }

  function P(){ this.rst(); }
  P.prototype.rst = function(){
    const angle = r(0, Math.PI*2);
    const dist  = r(38, 68);
    this.x  = cx + Math.cos(angle)*dist;
    this.y  = cy + Math.sin(angle)*dist;
    this.vx = Math.cos(angle)*r(.05,.2);
    this.vy = Math.sin(angle)*r(.05,.2) - r(.1,.35);
    this.rad = r(1,2.5);
    this.life = Math.floor(r(0,110));
    this.maxL = Math.floor(r(80,140));
    this.col  = cols[Math.floor(r(0,cols.length))];
  };
  P.prototype.tick = function(){
    this.x+=this.vx; this.y+=this.vy; this.vy-=.003; this.life++;
    const t = this.life/this.maxL;
    this.a = t<.2 ? t/.2 : t<.7 ? 1 : 1-(t-.7)/.3;
    if(this.life>=this.maxL) this.rst();
  };
  P.prototype.draw = function(){
    x.save(); x.globalAlpha=Math.max(0,this.a)*.8;
    x.fillStyle=this.col; x.shadowColor=this.col; x.shadowBlur=5;
    x.beginPath(); x.arc(this.x,this.y,this.rad,0,Math.PI*2); x.fill(); x.restore();
  };

  const pts = Array.from({length:24}, ()=> new P());
  (function loop(){
    x.clearRect(0,0,220,220);
    pts.forEach(p=>{ p.tick(); p.draw(); });
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
