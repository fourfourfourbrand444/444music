<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Confirmed — 444Music</title>
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
    background: #080808;
  }

  .bg {
    position: fixed;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=1400&q=80');
    background-size: cover;
    background-position: center;
    filter: brightness(0.22) saturate(1.4);
    z-index: 0;
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(88, 28, 135, 0.55) 0%,
      rgba(8, 8, 8, 0.82) 50%,
      rgba(15, 10, 30, 0.92) 100%
    );
    z-index: 1;
  }

  .page {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  .logo {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 3rem;
  }

  .logo span { color: rgba(167, 139, 250, 0.8); }

  .check-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(139, 92, 246, 0.15);
    border: 1.5px solid rgba(139, 92, 246, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.75rem;
    animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .check-wrap svg { display: block; }

  h1 {
    font-family: 'Inter', sans-serif;
    font-size: 1.75rem;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -0.03em;
    margin-bottom: 0.6rem;
    line-height: 1.15;
  }

  .sub {
    font-size: 0.875rem;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    margin-bottom: 2.25rem;
    max-width: 300px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin-bottom: 2.25rem;
  }

  .meta {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 2.5rem;
  }

  .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .meta-label {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.01em;
  }

  .meta-value {
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
  }

  .meta-value.ok {
    color: #a78bfa;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 0.9rem 1.5rem;
    background: #7c3aed;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    border: none;
    border-radius: 500px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
    margin-bottom: 1rem;
  }

  .btn:hover { background: #6d28d9; transform: scale(1.015); }
  .btn:active { transform: scale(0.99); }

  .secure {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 5px;
    justify-content: center;
  }

  .secure svg { opacity: 0.5; }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.6); }
    to   { opacity: 1; transform: scale(1); }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="page">

  <div class="logo">444<span>Music</span> &nbsp;·&nbsp; Distribution</div>

  <div class="check-wrap">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 14.5L11.5 20L22 9" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>Payment confirmed</h1>
  <p class="sub">Your payment went through. Submit your music below to start your distribution.</p>

  <div class="divider"></div>

  <div class="meta">
    <div class="meta-row">
      <span class="meta-label">Status</span>
      <span class="meta-value ok">Approved</span>
    </div>
    <div class="meta-row">
      <span class="meta-label">Processed</span>
      <span class="meta-value" id="ts">—</span>
    </div>
    <div class="meta-row">
      <span class="meta-label">Next step</span>
      <span class="meta-value">Submit your music</span>
    </div>
  </div>

  <a href="https://tally.so/r/NpX0pp" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    Submit your music
  </a>

  <div class="secure">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    Secured by Stripe
  </div>

</div>

<script>
  const d = new Date();
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  const h = d.getHours() % 12 || 12;
  const m = String(d.getMinutes()).padStart(2,'0');
  const ap = d.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('ts').textContent = mo + ' ' + d.getDate() + ', ' + h + ':' + m + ' ' + ap;
</script>

</body>
</html>
