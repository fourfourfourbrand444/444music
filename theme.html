<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>444Music - Upgrade Plan</title>

<link rel="stylesheet" href="theme.css">

<!-- FontAwesome Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>
<body>

<!-- ================= TOP NAV ================= -->
<div class="top-nav">
    <div class="nav-left">
        <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
        <div class="logo">444Music</div>
    </div>
</div>


<!-- ================= SIDEBAR ================= -->
<div class="sidebar" id="sidebar">

    <div class="sidebar-header">
        <div class="logo-big">444Music</div>
        <i class="fas fa-times close-btn" onclick="toggleSidebar()"></i>
    </div>

    <div class="sidebar-links">
        <a href="#"><i class="fas fa-home"></i> Dashboard</a>
        <a href="#"><i class="fas fa-user"></i> Account</a>
        <a href="#"><i class="fas fa-sign-in-alt"></i> Login</a>
        <a href="#"><i class="fas fa-music"></i> Pitch Playlist</a>
        <a href="Register.html"><i class="fas fa-user-plus"></i> Create Account</a>
        <a href="#"><i class="fas fa-question-circle"></i> FAQ</a>
        <a href="#"><i class="fas fa-compact-disc"></i> Our Works</a>
        <a href="#"><i class="fas fa-briefcase"></i> Services</a>

        <div class="dropdown">
            <div class="dropdown-btn" onclick="toggleDropdown()">
                <i class="fas fa-tools"></i> More Tools
                <i class="fas fa-chevron-down arrow"></i>
            </div>
            <div class="dropdown-content" id="dropdownContent">
                <a href="#">Analytics</a>
                <a href="#">Royalty Tracker</a>
                <a href="#">Smart Links</a>
            </div>
        </div>

        <a href="#"><i class="fas fa-headset"></i> Help</a>
        <a href="#"><i class="fas fa-cog"></i> Settings</a>
    </div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>


<!-- ================= YOUR ORIGINAL PAGE ================= -->
<div class="page-content">

    <!-- KEEP YOUR CURRENT DESIGN BELOW EXACTLY AS IT IS -->

    <section class="upgrade-section">
        <h1>Upgrade Your Artist Plan</h1>

        <div class="toggle">
            <button class="active">DEBUT</button>
            <button>SELECT</button>
        </div>

        <div class="big-card">
            <h2>Grow With Advanced Artist Analytics</h2>

            <div class="image-slider">
                <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4" class="slide active">
                <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f" class="slide">
                <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2" class="slide">
            </div>

            <div class="price">
                29.99 GHC – Single Release
            </div>

            <a href="Register.html" class="btn">Get Started</a>
        </div>
    </section>

</div>


<!-- ================= JAVASCRIPT ================= -->
<script>

function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function toggleDropdown(){
    document.getElementById("dropdownContent").classList.toggle("show");
}

/* AUTO IMAGE SLIDER */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3500);

</script>

</body>
</html>
