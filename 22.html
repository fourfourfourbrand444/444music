<!DOCTYPE html>
<html>
<head>
<title>444Music Analytics Generator</title>
</head>

<body>

<h2>444Music Analytics Generator</h2>
<button id="generate">Generate Analytics Collection</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import { 
getFirestore,
collection,
getDocs,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"

};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


document.getElementById("generate").onclick = async ()=>{

const status = document.getElementById("status");

status.innerText="Scanning submissions...";

const submissions = await getDocs(collection(db,"submissions"));

let created = 0;

for(const submission of submissions.docs){

const analyticsRef = doc(db,"analytics",submission.id);

const existing = await getDoc(analyticsRef);

if(!existing.exists()){

await setDoc(analyticsRef,{

totalStreams:0,
spotifyStreams:0,
appleStreams:0,
youtubeStreams:0

});

created++;

}

}

status.innerText = "Finished. "+created+" analytics documents created.";

}

</script>

</body>
</html>
