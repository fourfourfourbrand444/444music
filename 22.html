<!DOCTYPE html>
<html>
<head>
<title>444Music Analytics Generator</title>
</head>

<body>

<h2>Generate Analytics for All Artists</h2>

<button id="generate">Create Analytics</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


document.getElementById("generate").onclick = async ()=>{

const status = document.getElementById("status");

status.innerText = "Scanning submissions...";

const submissionsSnap = await getDocs(collection(db,"submissions"));

let created = 0;

for(const docSnap of submissionsSnap.docs){

const data = docSnap.data();

const uid = data.userId;

if(!uid) continue;

const analyticsRef = doc(db,"analytics",uid);

const analyticsCheck = await getDoc(analyticsRef);

if(!analyticsCheck.exists()){

await setDoc(analyticsRef,{

name: data.artistName || "Artist",
email: data.email || "",

totalStreams: 0,
spotifyStreams: 0,
appleStreams: 0,
youtubeStreams: 0

});

created++;

}

}

status.innerText = "Done! "+created+" analytics documents created.";

}

</script>

</body>
</html>
