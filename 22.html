<!DOCTYPE html>
<html>
<head>
  <title>Create Analytics Documents</title>
</head>

<body>

<h2>Create Analytics for Artists</h2>
<button onclick="createAnalyticsDocs()">Run Script</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
  authDomain: "usersubmissionsportal.firebaseapp.com",
  projectId: "usersubmissionsportal",
  storageBucket: "usersubmissionsportal.firebasestorage.app",
  messagingSenderId: "734783502459",
  appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


async function createAnalyticsDocs() {

  document.getElementById("status").innerText = "Running...";

  const submissionsSnapshot = await getDocs(collection(db, "submissions"));

  const processedEmails = new Set();

  for (const submissionDoc of submissionsSnapshot.docs) {

    const data = submissionDoc.data();

    const email = data.email;

    if (!email || processedEmails.has(email)) continue;

    processedEmails.add(email);

    await setDoc(doc(db, "analytics", email), {

      artistName: data.artistName || "",
      email: email,

      totalStreams: 0,
      totalReleases: 0,

      spotifyStreams: 0,
      appleStreams: 0,
      youtubeStreams: 0

    });

  }

  document.getElementById("status").innerText = "Analytics created successfully!";

}

window.createAnalyticsDocs = createAnalyticsDocs;

</script>

</body>
</html>
