<!DOCTYPE html>
<html>
<head>
<title>Rebuild Analytics</title>
</head>
<body>

<button id="run">Rebuild Analytics</button>
<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("run").onclick = async ()=>{

document.getElementById("status").textContent="Running...";

const submissionsSnap = await getDocs(collection(db,"submissions"));

let count = 0;

for(const submission of submissionsSnap.docs){

const data = submission.data();
const id = submission.id;

await setDoc(doc(db,"analytics",id),{

artistName: data.artistName || "Unknown",
email: data.email || "",

totalStreams: 0,
spotifyStreams: 0,
appleStreams: 0,
youtubeStreams: 0,
totalReleases: 0

});

count++;

}

document.getElementById("status").textContent =
"Analytics rebuilt for "+count+" submissions.";

};

</script>

</body>
</html>
