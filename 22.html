<!DOCTYPE html>
<html>
<head>
<title>Create Analytics From Users</title>
</head>

<body>

<h2>Create Analytics For All Users</h2>
<button onclick="createAnalytics()">Run Script</button>

<p id="status">Idle</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function createAnalytics(){

const status = document.getElementById("status");
status.innerText = "Fetching users...";

try{

const usersSnap = await getDocs(collection(db,"users"));

status.innerText = "Users found: " + usersSnap.size;

for(const userDoc of usersSnap.docs){

const user = userDoc.data();

await addDoc(collection(db,"analytics"),{

artistName: user.name || "",
email: user.email || "",

totalStreams: 0,
totalReleases: 0,

spotifyStreams: 0,
appleStreams: 0,
youtubeStreams: 0

});

console.log("Created analytics for", user.email);

}

status.innerText = "Finished creating analytics for all users!";

}catch(error){

console.error(error);
status.innerText = "Error: " + error.message;

}

}

window.createAnalytics = createAnalytics;

</script>

</body>
</html>
