<!DOCTYPE html>
<html>
<head>
<title>Create Analytics From Users</title>
</head>

<body>

<h2>Create Analytics For All Users</h2>
<button onclick="createAnalytics()">Run Script</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, setDoc, query, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function createAnalytics(){

document.getElementById("status").innerText="Running...";

const usersSnap = await getDocs(collection(db,"users"));

for(const userDoc of usersSnap.docs){

const user = userDoc.data();

const email = user.email;
const name = user.name;

/* check if analytics already exists */

const q = query(
collection(db,"analytics"),
where("email","==",email)
);

const existing = await getDocs(q);

if(!existing.empty){
console.log("Analytics already exists for",email);
continue;
}

/* create analytics document */

await setDoc(doc(collection(db,"analytics")),{

artistName: name || "",
email: email || "",

totalStreams: 0,
totalReleases: 0,

spotifyStreams: 0,
appleStreams: 0,
youtubeStreams: 0

});

console.log("Created analytics for",email);

}

document.getElementById("status").innerText="Finished creating analytics documents!";

}

window.createAnalytics = createAnalytics;

</script>

</body>
</html>
