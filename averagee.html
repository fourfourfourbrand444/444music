<script>
  const countrySelect = document.getElementById('country');
  const flagIcon = document.getElementById('countryFlag');

  function updateFlag() {
    const selected = countrySelect.options[countrySelect.selectedIndex];
    const flag = selected ? selected.getAttribute('data-flag') : '🌍';
    flagIcon.textContent = flag || '🌍';
  }

  countrySelect.addEventListener('change', updateFlag);
  updateFlag();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
  authDomain: "usersubmissionsportal.firebaseapp.com",
  projectId: "usersubmissionsportal",
  storageBucket: "usersubmissionsportal.firebasestorage.app",
  messagingSenderId: "734783502459",
  appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ✅ INITIALIZE EMAILJS */
emailjs.init("mwAZ_hDxmnBqkrTfA");

let currentUser = null;

/* 🔐 AUTH CHECK */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    currentUser = user;
  }
});

/* 📧 EMAIL FUNCTION */
async function sendEmails(data) {

  const templateParams = {
    artist_name: data.artistName,
    release_title: data.releaseTitle,
    release_type: data.releaseType,
    country: data.country,
    genre: data.genre,
    language: data.language,
    release_date: data.releaseDate,
    explicit: data.explicit,
    email: data.email,
    phone: data.phone,
    featuring: data.featuring,
    label: data.label,
    copyright: data.copyright,
    refferal: data.refferal,
    lyrics: data.description
  };

  // 🔹 Admin email
  await emailjs.send("service_ydy0muo", "template_i6qh7ew", templateParams);

  // 🔹 Auto reply to user (if you created second template)
  await emailjs.send("service_ydy0muo", "template_m8g8n9q", templateParams);
}

/* 📝 FORM SUBMIT */
const form = document.getElementById("releaseForm");
const submitBtn = document.getElementById("submitBtn");
const statusMsg = document.getElementById("statusMsg");

let isSubmitting = false;

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (isSubmitting) return;
  if (!currentUser) return;

  isSubmitting = true;

  submitBtn.disabled = true;
  submitBtn.innerText = "Submitting...";
  statusMsg.innerText = "Please wait...";

  const data = {
    artistName: document.getElementById("artistName").value.trim(),
    releaseTitle: document.getElementById("releaseTitle").value.trim(),
    releaseType: document.getElementById("releaseType").value,
    country: document.getElementById("country").value,
    genre: document.getElementById("genre").value.trim(),
    language: document.getElementById("language").value.trim(),
    releaseDate: document.getElementById("releaseDate").value,
    explicit: document.getElementById("explicit").value,
    email: document.getElementById("email").value.trim(),
    phone: document.getElementById("number").value.trim(),
    featuring: document.getElementById("featuring").value.trim(),
    copyright: document.getElementById("copyright").value.trim(),
    label: document.getElementById("label").value.trim(),
    refferal: document.getElementById("refferal").value.trim(),
    description: document.getElementById("description").value.trim(),
    userId: currentUser.uid,
    createdAt: Date.now(),
    status: "Pending"
  };

  try {

    /* ✅ SAVE TO FIRESTORE FIRST */
    await addDoc(collection(db, "submissions"), data);

    /* ✅ THEN SEND EMAIL */
    await sendEmails(data);

    /* ✅ SUCCESS */
    window.location.href = "select.html";

  } catch (error) {

    console.error("Submission Error:", error);

    submitBtn.disabled = false;
    submitBtn.innerText = "Save & Continue";
    statusMsg.innerText = "Something went wrong. Please try again.";

    isSubmitting = false;
  }

});
</script>
