<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artist Insights • 444Music</title>

<link rel="stylesheet" href="insights.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1><i class="fa-solid fa-chart-line"></i> Artist Insights</h1>


<section class="stats">

<div class="card">

<i class="fa-solid fa-headphones"></i>

<h2 id="totalStreams">0</h2>

<p>Total Streams</p>

</div>


<div class="card">

<i class="fa-solid fa-music"></i>

<h2 id="totalReleases">0</h2>

<p>Total Releases</p>

</div>


<div class="card">

<i class="fa-solid fa-globe"></i>

<h2>50+</h2>

<p>Stores Distributed</p>

</div>

</section>



<section class="chart-section">

<h2>Streaming Growth</h2>

<canvas id="streamsChart"></canvas>

</section>



<section class="countries">

<h2>Top Countries</h2>

<div class="country-list">

<div class="country">

<img src="https://flagcdn.com/us.svg">

<span>United States</span>

</div>

<div class="country">

<img src="https://flagcdn.com/gb.svg">

<span>United Kingdom</span>

</div>

<div class="country">

<img src="https://flagcdn.com/ng.svg">

<span>Nigeria</span>

</div>

<div class="country">

<img src="https://flagcdn.com/gh.svg">

<span>Ghana</span>

</div>

</div>

</section>



<section class="stores">

<h2>Top Streaming Stores</h2>

<div class="store-grid">

<div class="store">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg">

<p>Spotify</p>

<span id="spotifyStreams">0</span>

</div>


<div class="store">

<img src="apple-music.svg">

<p>Apple Music</p>

<span id="appleStreams">0</span>

</div>


<div class="store">

<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">

<p>YouTube</p>

<span id="youtubeStreams">0</span>

</div>

</div>

</section>



<section class="top-releases">

<h2>Top Releases</h2>

<div id="topReleases"></div>

</section>


</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBzUD7avh7vJfeSMRl2o9F09_qd-pl0dSg",
authDomain: "usersubmissionsportal.firebaseapp.com",
projectId: "usersubmissionsportal",
storageBucket: "usersubmissionsportal.firebasestorage.app",
messagingSenderId: "734783502459",
appId: "1:734783502459:web:cfa2cc5de6976003b24ade"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


onAuthStateChanged(auth, async (user)=>{

if(!user){
location.href="login.html";
return;
}

const uid = user.uid;


/* =========================
   GET ARTIST SUBMISSIONS
========================= */

const submissionsQuery = query(
collection(db,"submissions"),
where("userId","==",uid)
);

const submissionsSnap = await getDocs(submissionsQuery);


/* TOTAL RELEASES */

document.getElementById("totalReleases").textContent = submissionsSnap.size;


/* =========================
   ANALYTICS DATA
========================= */

const analyticsRef = doc(db,"analytics",uid);

const analyticsSnap = await getDoc(analyticsRef);

if(!analyticsSnap.exists()){

console.log("No analytics document found");

return;

}

const data = analyticsSnap.data();

document.getElementById("totalStreams").textContent = data.totalStreams ?? 0;
document.getElementById("spotifyStreams").textContent = data.spotifyStreams ?? 0;
document.getElementById("appleStreams").textContent = data.appleStreams ?? 0;
document.getElementById("youtubeStreams").textContent = data.youtubeStreams ?? 0;



/* =========================
   TOP RELEASES LIST
========================= */

const container = document.getElementById("topReleases");
container.innerHTML = "";

submissionsSnap.forEach(docSnap=>{

const r = docSnap.data();

const div = document.createElement("div");

div.className="release";

div.innerHTML = `
<i class="fa-solid fa-compact-disc"></i>
<b>${r.releaseTitle || "Untitled Release"}</b>
`;

container.appendChild(div);

});

});


/* =========================
   STREAM CHART
========================= */

const ctx = document.getElementById('streamsChart');

new Chart(ctx,{
type:'line',
data:{
labels:["Jan","Feb","Mar","Apr","May","Jun","Jul"],
datasets:[{
label:"Streams",
data:[200,500,900,1200,1800,2300,3000],
borderColor:"#ff2e63",
tension:.4
}]
}
});

</script>

</body>
</html>
